  .mob-tabs{display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg-surface);border-top:1px solid var(--border-primary);z-index:100}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:none;border:none;color:var(--text-secondary);font-size:.55rem;cursor:pointer;padding:6px 0;min-height:44px;gap:2px;-webkit-tap-highlight-color:transparent}
  .mob-tab.active{color:var(--accent-blue)}
  .mob-tab-icon{font-size:1.3rem}

  /* Game container */
  .game{height:100dvh;height:100vh;padding-bottom:56px}

  /* Main layout: show one panel at a time */
  .main{flex-direction:column;overflow:hidden}

  /* Default: hide all, desk tab shows center */
  .game .left-log,.game .left-panel,.game .right{display:none;overflow-y:auto}
  .game .left{display:flex;flex:1;overflow-y:auto}

  .game[data-tab="desk"] .left{display:flex;flex:1}
  .game[data-tab="desk"] .left-log,.game[data-tab="desk"] .left-panel,.game[data-tab="desk"] .right{display:none}

  .game[data-tab="coders"] .left,.game[data-tab="coders"] .left-log,.game[data-tab="coders"] .left-panel{display:none}
  .game[data-tab="coders"] .right{display:flex;flex-direction:column;flex:1;width:100%;min-width:0;overflow-y:auto}
  .game[data-tab="coders"] .right-roster{display:flex;flex:0 0 auto;max-height:50vh;overflow-y:auto;border:none;border-bottom:1px solid var(--border-secondary)}
  .game[data-tab="coders"] .right-coders{display:block;flex:1;overflow-y:auto;border:none}

  .game[data-tab="upgrades"] .left,.game[data-tab="upgrades"] .left-log,.game[data-tab="upgrades"] .right{display:none}
  .game[data-tab="upgrades"] .left-panel{display:block;flex:1;width:100%;min-width:0;overflow-y:auto;border:none}

  .game[data-tab="log"] .left,.game[data-tab="log"] .left-panel,.game[data-tab="log"] .right{display:none}
  .game[data-tab="log"] .left-log{display:flex;flex-direction:column;flex:1;width:100%;min-width:0;overflow-y:auto;border:none}

  /* Top bar: wrap on small screens */
  .top-bar{flex-wrap:wrap;padding:6px 10px;gap:2px 10px;justify-content:center}
  .stat-val{font-size:1.1rem}
  .stat-lbl{font-size:.6rem}
  #dCat{font-size:.85rem}
  .right-ship{width:100%;border-right:none;border-bottom:1px solid var(--border-secondary)}

  .left{justify-content:flex-start;padding-top:12px}
  .click-info{font-size:1.1rem}
  .click-power{font-size:1.2rem}
  .fame-mult{font-size:1.1rem}

  /* Office sprites: tablet */
  .office-floor{width:260px}
  .coder-sprite{width:22px;height:20px}

  /* Panel overrides */
  .left-panel{width:100%;min-width:0;border-right:none;padding:10px}
  .right{width:100%;min-width:0;border-left:none}
  .right-log{border-right:none}
  .right-coders{border:none}

  /* Scroll behavior: momentum scrolling + overscroll containment */
  .left-panel,.left-log,.right,.right-coders,.right-roster,.log-panel,.st-path{
    -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  }
  .type-tabs{-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}

  /* Touch targets: upgrade rows — min 44px height */
  .up{padding:14px 10px;gap:10px;min-height:44px}
  .up-name{font-size:.9rem}
  .up-desc{font-size:.75rem}
  .up-cost{font-size:.9rem}

  /* Touch targets: buttons — min 44px */
  .eu-toggle,.fu-toggle{width:44px;height:44px;font-size:.9rem}
  .pause-toggle{padding:8px 12px;font-size:.8rem;min-height:44px}
  .qty-btn{padding:10px 0;font-size:.8rem;min-height:44px}
  .qty-bar{gap:6px;margin-bottom:10px}
  .st-btn,.ach-btn{min-height:44px}
  .eng-tab{min-height:44px}

  /* Touch targets: training sub-rows */
  .eu-row,.ru-row,.fu-row{padding:12px 8px;font-size:.85rem;gap:8px;min-height:44px}

  /* Modals: fame tree fullscreen */
  .st-graph{width:100vw;height:100vh;max-width:100vw;max-height:100vh;border-radius:0;-webkit-overflow-scrolling:touch}
  .st-tab{font-size:.7rem;padding:8px;min-height:44px}
  .st-node{width:130px;padding:8px;min-height:44px}
  .st-path{padding:16px 10px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .st-close{font-size:1.3rem;min-width:44px;min-height:44px}
  .st-node{width:120px;padding:6px}
  .st-node .st-name{font-size:.7rem}

  /* Modals: panels responsive */
  .ach-panel{width:calc(100vw - 24px);max-width:400px;max-height:85vh}
  .ach-row{padding:10px;gap:8px}
  .stats-panel{width:calc(100vw - 24px);max-width:480px;max-height:85vh}
  .stats-table{font-size:.65rem}
  .stats-table th,.stats-table td{padding:4px 3px}
  .settings-panel{width:calc(100vw - 24px);max-width:320px}

  /* Banners & toasts: above tab bar */
  .ev-banner{top:0;bottom:auto;max-width:calc(100% - 20px);font-size:.75rem}
  .ev-opt{padding:10px 12px;font-size:.75rem}
  .nyt-banner{top:auto;bottom:60px;max-width:calc(100vw - 20px);font-size:.7rem}
  .toasts{top:auto;bottom:120px}
  .toast{font-size:.75rem}

  /* Ship button */
  .bot{padding:6px 10px}

  /* Slot screen: stack vertically */
  .slot-row{flex-direction:column;gap:10px;align-items:center}
  .slot-btn{width:280px;max-width:90vw}

  /* Log panel adjustments */
  .log-panel{max-height:none}
  .log-hdr{font-size:.85rem}
  .log-entry{font-size:.7rem;padding:4px 0}
}

@media(max-width:480px){
  .office-floor{width:220px}
  .coder-sprite{width:20px;height:18px}
  .stat-val{font-size:1rem}
  #dCat{font-size:.75rem}
  .top-bar{padding:4px 8px;gap:1px 8px}
  .click-info{font-size:.9rem}
  .click-power{font-size:1rem}
  .fame-mult{font-size:.9rem}
}
/* Hi-DPI / large display breakpoints */
@media(min-width:1440px){
  .game{--desk-scale-max:1.3}
  .left-log{width:clamp(200px,12vw,280px)}
  .left-panel{width:clamp(240px,14vw,340px)}
  .right{width:clamp(460px,28vw,700px)}
  .stat-val{font-size:1.5rem}
}

  .game{--desk-scale-max:1.5}

  .screen{width:280px;height:190px}
  .desk{width:380px}
  .office-floor{width:380px}
}

/* ========== ACCESSIBILITY ========== */

/* Reduced motion: kill all transitions and animations */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms!important;
    animation-iteration-count:1!important;
    transition-duration:0.01ms!important;
    scroll-behavior:auto!important;
  }
}

/* Focus-visible outlines for keyboard navigation */
:focus-visible{
  outline:2px solid var(--accent-blue);
  outline-offset:2px;
}
.up:focus-visible,.eng-tab:focus-visible,.st-node:focus-visible,.slot-btn:focus-visible{
  outline:2px solid var(--accent-blue);
  outline-offset:1px;
  z-index:1;
}
/* Suppress outline on mouse click (only show for keyboard) */
:focus:not(:focus-visible){outline:none}

/* High-contrast adjustments for light eras */

// v7.3: Engineer type helpers — single source of truth for resource & list access.
// Coder is the special case: it uses S.loc/S.tLoc/S.coders directly (zero migration).
// Other types live in S.engineers[type].
function engRes(type) {
  if (type === 'coder') return S.loc;
  return (S.engineers && S.engineers[type] && S.engineers[type].res) || 0;
}
function engTRes(type) {
  if (type === 'coder') return S.tLoc;
  return (S.engineers && S.engineers[type] && S.engineers[type].tRes) || 0;
}
function engAddRes(type, v) {
  if (v <= 0) return;
  if (type === 'coder') { S.loc += v; S.tLoc += v; return; }
  if (!S.engineers || !S.engineers[type]) return;
  S.engineers[type].res += v;
  S.engineers[type].tRes += v;
}
function engSubRes(type, v) {
  if (v <= 0) return true;
  if (type === 'coder') {
    if (S.loc < v) return false;
    S.loc -= v; return true;
  }
  if (!S.engineers || !S.engineers[type]) return false;
  if (S.engineers[type].res < v) return false;
  S.engineers[type].res -= v; return true;
}
function engList(type) {
  if (type === 'coder') return S.coders || (S.coders = []);
  if (!S.engineers || !S.engineers[type]) return [];
  return S.engineers[type].list || (S.engineers[type].list = []);
}
function engShipped(type) {
  if (type === 'coder') return S.shipped || 0;
  return (S.engineers && S.engineers[type] && S.engineers[type].shippedSince) || 0;
}
function engShipAt(type) {
  // v10: 10× growth per ship — 500K → 5M → 50M → … → 500T over 10 releases.
  // New types (shippedSince < 2) get floor = 30% of coder's current threshold.
  const s = engShipped(type);
  let base = 500000;
  for (let i = 0; i < s; i++) base *= 10;
  if (type !== 'coder' && s < 2) {
    const gs = S.shipped || 0;
    if (gs > 0) {
      let globalBase = 500000;
      for (let i = 0; i < gs; i++) globalBase *= 10;
      base = Math.max(base, globalBase * 0.3);
    }
  }
  return Math.floor(base * (0.9 ** S.f.franchise));
}
function isUnlocked(type) {
  return Array.isArray(S.unlockedTypes) && S.unlockedTypes.includes(type);
}
function activeType() { return S.activeType || 'coder'; }
function activeTypeMeta() { return ENG_TYPE_MAP[activeType()] || ENG_TYPE_MAP.coder; }
function totalEngineerCount() {
  let n = (S.coders && S.coders.length) || 0;
  if (S.engineers) for (const k in S.engineers) n += (S.engineers[k].list || []).length;
  return n;
}

// v7.3: Type tabs UI — renders one button per engineer type with resource counts.
// Locked types show their unlock year. Clicking an unlocked tab switches activeType.
function renderTypeTabs() {
  if (!_typeTabsEl) _typeTabsEl = document.getElementById('typeTabs');
  if (!_typeTabsEl) return;
  recalcIfDirty();
  _typeTabsEl.innerHTML = '';
  const aType = activeType();
  // v7.5: show only unlocked types + next 2 locked (keeps tab bar manageable with 26 types)
  let lockedShown = 0;
  const MAX_LOCKED = 2;
  for (const meta of ENG_TYPES) {
    const unlocked = isUnlocked(meta.key);
    if (!unlocked) {
      if (lockedShown >= MAX_LOCKED) continue;
      lockedShown++;
    }
    const isActive = aType === meta.key;
    const tab = document.createElement('div');
    tab.className = 'eng-tab' + (isActive ? ' active' : '') + (unlocked ? '' : ' locked');
    tab.setAttribute('role', 'tab');
    tab.tabIndex = 0;
    tab.dataset.type = meta.key;
    if (isActive) tab.style.borderColor = meta.color;
    if (unlocked) {
      const lpsVal = (_C.typeLps && _C.typeLps[meta.key]) || 0;
      tab.innerHTML =
        '<div class="et-name" style="color:' + meta.color + '">' + meta.name + '</div>' +
        '<div class="et-res">' + fmt(engRes(meta.key)) + ' ' + meta.res + '</div>' +
        '<div class="et-lps">' + fmt(lpsVal) + '/s</div>';
      tab.addEventListener('click', () => {
        if (S.activeType === meta.key) return;
        S.activeType = meta.key;
        markDirty();
        renderTypeTabs();
        renderRosterCol();
        // v7.3: invalidate sprite cache + bypass throttle so the office immediately
        // shows the new active type's engineers (not the previous tab's stale ones).
        if (typeof _ofc !== 'undefined') {
          _ofc.spriteCache = [];
          _ofc.lastUpdate = 0;
        }
        updateOfficeSprites();
        renderShipPanel();
      });
    } else {
      tab.innerHTML =
        '<div class="et-name">' + meta.name + '</div>' +
        '<div class="et-locked">\u{1F512} Year ' + (meta.unlockYear - (S.f.goldenParachute || 0)) + '</div>';
    }

(function initTabArrows() {

  S.eu[gi][ui] = tier + 1;
  markDirty();
  log(t('logUpgraded') + ' ' + ta('gen_'+gi+'_name', GEN[gi].name) + ' \u2192 ' + ta('eu_'+ui+'_'+(tier)+'_name', EMP_UPS[ui].tiers[tier].name));
  playSfx('buy');
}

const RELEASE_YEARS = [1980, 1986, 1992, 1996, 1999, 2004, 2010, 2013, 2018, 2024];
function currentYear() { return RELEASE_YEARS[Math.min(S.shipped, RELEASE_YEARS.length - 1)]; }
function yearGap() {
  if (S.shipped <= 0) return 0;
  const i = Math.min(S.shipped, RELEASE_YEARS.length - 1);
  return RELEASE_YEARS[i] - RELEASE_YEARS[Math.max(0, i - 1)];
}

// ========== AUDIO SYSTEM ==========
let audioCtx, musicGain, sfxGain;
let curMusicEra = null, musicNodes = [], musicLoopId = null, _dbgMusicOverride = false;
const N = {
  C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,B3:247,
  C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
  C5:523,D5:587,E5:659,F5:698,G5:784,A5:880
};

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  sfxGain = audioCtx.createGain();
  musicGain.connect(audioCtx.destination);
  sfxGain.connect(audioCtx.destination);
  musicGain.gain.value = S.musicVol;
  sfxGain.gain.value = S.sfxVol;
}
function ensureAudio() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function setMusicVol(v) {
  S.musicVol = v;
  if (musicGain) musicGain.gain.value = v;
  if (v === 0) stopMusic();
}
function setSfxVol(v) {
  S.sfxVol = v;
  if (sfxGain) sfxGain.gain.value = v;
}

// --- SFX ---
function playSfx(type) {
  if (!audioCtx || S.sfxVol === 0) return;
  const t0 = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(sfxGain);
  function osc(freq, wave, start, end, vol) {
    const o = audioCtx.createOscillator();
    const og = audioCtx.createGain();
    o.type = wave;
    o.frequency.value = freq;
    og.gain.setValueAtTime(vol || 0.3, t0 + start);
    og.gain.exponentialRampToValueAtTime(0.001, t0 + end);
    o.connect(og);
    og.connect(g);
    o.start(t0 + start);
    o.stop(t0 + end + 0.01);
  }
  switch (type) {
    case 'click':
      osc(880, 'square', 0, 0.06, 0.15);
      break;
    case 'buy':
      osc(440, 'triangle', 0, 0.12, 0.25);
      osc(660, 'triangle', 0.08, 0.2, 0.25);
      break;
    case 'ship':
      osc(523, 'sawtooth', 0, 0.25, 0.2);
      osc(659, 'sawtooth', 0.15, 0.4, 0.2);
      osc(784, 'sawtooth', 0.3, 0.6, 0.25);
      osc(1047, 'sawtooth', 0.45, 0.9, 0.15);
      break;
    case 'event':
      osc(600, 'square', 0, 0.1, 0.2);
      osc(800, 'square', 0.12, 0.22, 0.2);
      osc(600, 'square', 0.24, 0.34, 0.2);
      osc(800, 'square', 0.36, 0.46, 0.2);
      break;
    case 'achieve':
      [N.C5, N.D5, N.E5, N.G5, N.A5].forEach((f, i) => {
        const dur = i === 4 ? 0.4 : 0.1;
        osc(f, 'triangle', i * 0.09, i * 0.09 + dur, 0.25);
      });
      break;
    case 'milestone':
      [N.C4, N.E4, N.G4, N.C5].forEach((f, i) => {
        osc(f, 'triangle', i * 0.12, i * 0.12 + 0.3, 0.2);
      });
      break;
  }
  g.gain.setValueAtTime(1, t0);
}

const MUSIC_ERAS = [
  { max:1983, id:'early',  build:buildMusic_early },
  { max:1988, id:'chip8',  build:buildMusic_chip8 },
  { max:1993, id:'16bit',  build:buildMusic_16bit },
  { max:1998, id:'fm',     build:buildMusic_fm },
  { max:2003, id:'cd',     build:buildMusic_cd },
  { max:2008, id:'modern', build:buildMusic_modern },
  { max:2013, id:'indie',  build:buildMusic_indie },
  { max:9999, id:'lofi',   build:buildMusic_lofi },
];

function schedNotes(dest, wave, notes, t0, vol) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = wave;
  o.connect(g);
  g.connect(dest);
  let t = t0;
  notes.forEach(n => {
    if (n.f > 0) {
      o.frequency.setValueAtTime(n.f, t);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + n.d * 0.95);
    } else {
      g.gain.setValueAtTime(0.001, t);
    }
    t += n.d;
  });
  o.start(t0);
  o.stop(t + 0.05);
  return { nodes: [o, g], duration: t - t0 };
}

// Era 4: 1994-1998 - FM synthesis / MIDI era
function buildMusic_fm(ctx, dest, t0) {
  const all = [];
  const melody = [
    {f:N.A4,d:.3},{f:N.G4,d:.3},{f:N.E4,d:.3},{f:N.D4,d:.3},
    {f:N.C4,d:.6},{f:0,d:.3},
    {f:N.D4,d:.3},{f:N.E4,d:.3},{f:N.G4,d:.3},{f:N.A4,d:.3},
    {f:N.G4,d:.6},{f:0,d:.3},
    {f:N.E4,d:.3},{f:N.G4,d:.6},{f:N.A4,d:.3},
    {f:N.C5,d:.6},{f:N.A4,d:.3},{f:N.G4,d:.6},{f:0,d:.3},
  ];
  // FM: modulator oscillates carrier's frequency
  const carrier = ctx.createOscillator();
  const modulator = ctx.createOscillator();
  const modGain = ctx.createGain();
  const cGain = ctx.createGain();
  carrier.type = 'sine';
  modulator.type = 'sine';
  modulator.frequency.value = 280;
  modGain.gain.value = 150;
  modulator.connect(modGain);
  modGain.connect(carrier.frequency);
  carrier.connect(cGain);
  cGain.connect(dest);
  let t = t0;
  melody.forEach(n => {
    if (n.f > 0) {
      carrier.frequency.setValueAtTime(n.f, t);
      modulator.frequency.setValueAtTime(n.f * 0.5, t);
      cGain.gain.setValueAtTime(0.08, t);
      cGain.gain.exponentialRampToValueAtTime(0.001, t + n.d * 0.9);
    } else {
      cGain.gain.setValueAtTime(0.001, t);
    }
    t += n.d;
  });
  carrier.start(t0); carrier.stop(t + 0.05);
  modulator.start(t0); modulator.stop(t + 0.05);
  all.push(carrier, modulator, modGain, cGain);
  const dur = t - t0;
  // Bass line
  const bass = [
    {f:N.A3,d:.6},{f:0,d:.6},{f:N.A3,d:.3},{f:N.E3,d:.3},
    {f:N.D3,d:.6},{f:0,d:.6},{f:N.D3,d:.3},{f:N.G3,d:.3},
    {f:N.C3,d:.6},{f:0,d:.3},{f:N.A3,d:.3},
    {f:N.G3,d:.6},{f:N.C3,d:.6},{f:0,d:.3},
  ];
  const rb = schedNotes(dest, 'triangle', bass, t0, 0.08);
  all.push(...rb.nodes);
  return { nodes: all, duration: Math.max(dur, rb.duration) };
}

// Era 5: 1999-2003 - CD-ROM ambient pads
function buildMusic_cd(ctx, dest, t0) {
  const all = [];
  const chords = [
    { notes: [N.C3, N.E3, N.G3], dur: 3 },
    { notes: [N.A3, N.C4, N.E4], dur: 3 },
    { notes: [N.F3, N.A3, N.C4], dur: 3 },
    { notes: [N.G3, N.B3, N.D4], dur: 3 },
  ];
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 800;
  filter.Q.value = 1;
  filter.connect(dest);
  all.push(filter);
  let t = t0;
  chords.forEach(ch => {
    ch.notes.forEach(freq => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.value = freq;
      o.connect(g);
      g.connect(filter);
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.04, t + 0.8);
      g.gain.linearRampToValueAtTime(0.03, t + ch.dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.001, t + ch.dur);
      o.start(t);
      o.stop(t + ch.dur + 0.05);
      all.push(o, g);
    });
    t += ch.dur;
  });
  return { nodes: all, duration: t - t0 };
}

// Era 6: 2004-2008 - Modern electronic
function buildMusic_modern(ctx, dest, t0) {
  const all = [];
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  filter.Q.value = 5;
  filter.connect(dest);
  all.push(filter);
  // Filter sweep
  filter.frequency.setValueAtTime(400, t0);
  filter.frequency.linearRampToValueAtTime(2000, t0 + 4);
  filter.frequency.linearRampToValueAtTime(400, t0 + 8);
  // Synth lead
  const lead = [
    {f:N.A4,d:.25},{f:0,d:.25},{f:N.E4,d:.25},{f:N.G4,d:.25},
    {f:N.A4,d:.5},{f:N.C5,d:.25},{f:N.B4,d:.25},
    {f:N.G4,d:.25},{f:0,d:.25},{f:N.E4,d:.25},{f:N.D4,d:.25},
    {f:N.C4,d:.5},{f:0,d:.5},
    {f:N.E4,d:.25},{f:N.G4,d:.25},{f:N.A4,d:.5},
    {f:N.G4,d:.25},{f:N.E4,d:.25},{f:N.D4,d:.5},
    {f:N.C4,d:.5},{f:N.E4,d:.5},{f:0,d:.5},
  ];
  const rl = schedNotes(filter, 'sawtooth', lead, t0, 0.08);
  all.push(...rl.nodes);
  // Kick pattern (sine pitch drop)
  for (let i = 0; i < 16; i++) {
    const kt = t0 + i * 0.5;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, kt);
    o.frequency.exponentialRampToValueAtTime(40, kt + 0.15);
    g.gain.setValueAtTime(0.15, kt);
    g.gain.exponentialRampToValueAtTime(0.001, kt + 0.2);
    o.connect(g); g.connect(dest);
    o.start(kt); o.stop(kt + 0.25);
    all.push(o, g);
  }
  return { nodes: all, duration: 8 };
}

// Era 7: 2009-2013 - Indie chiptune revival
function buildMusic_indie(ctx, dest, t0) {
  const all = [];
  // Chiptune melody
  const melody = [
    {f:N.C5,d:.2},{f:N.E5,d:.2},{f:N.G5,d:.2},{f:N.E5,d:.2},
    {f:N.C5,d:.2},{f:N.D5,d:.4},{f:0,d:.2},
    {f:N.A4,d:.2},{f:N.C5,d:.2},{f:N.E5,d:.4},
    {f:N.D5,d:.2},{f:N.C5,d:.2},{f:N.A4,d:.4},{f:0,d:.2},
    {f:N.G4,d:.2},{f:N.A4,d:.2},{f:N.C5,d:.4},
    {f:N.E5,d:.2},{f:N.D5,d:.2},{f:N.C5,d:.4},{f:0,d:.4},
  ];
  const r1 = schedNotes(dest, 'square', melody, t0, 0.08);
  all.push(...r1.nodes);
  // Filtered pad behind
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 600;
  filter.connect(dest);
  all.push(filter);
  const padNotes = [
    {notes:[N.C3,N.E3,N.G3],dur:2.5},{notes:[N.A3,N.C4,N.E4],dur:2.5},
    {notes:[N.F3,N.A3,N.C4],dur:2.5},{notes:[N.G3,N.B3,N.D4],dur:2.5},
  ];
  let t = t0;
  padNotes.forEach(ch => {
    ch.notes.forEach(freq => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.value = freq;
      o.connect(g); g.connect(filter);
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.03, t + 0.5);
      g.gain.exponentialRampToValueAtTime(0.001, t + ch.dur);
      o.start(t); o.stop(t + ch.dur + 0.05);
      all.push(o, g);
    });
    t += ch.dur;
  });
  return { nodes: all, duration: Math.max(r1.duration, t - t0) };
}

// Era 8: 2014+ - Lo-fi beats
function buildMusic_lofi(ctx, dest, t0) {
  const all = [];
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 1200;
  filter.Q.value = 0.7;
  filter.connect(dest);
  all.push(filter);
  // Soft melody
  const melody = [
    {f:N.E4,d:.5},{f:N.G4,d:.5},{f:N.A4,d:.75},{f:0,d:.25},
    {f:N.B4,d:.5},{f:N.A4,d:.5},{f:N.G4,d:.75},{f:0,d:.5},
    {f:N.E4,d:.5},{f:N.D4,d:.5},{f:N.C4,d:.75},{f:0,d:.25},
    {f:N.D4,d:.5},{f:N.E4,d:.5},{f:N.G4,d:.75},{f:0,d:.5},
    {f:N.A4,d:.75},{f:N.G4,d:.5},{f:N.E4,d:.75},{f:0,d:.5},
    {f:N.D4,d:.5},{f:N.C4,d:.75},{f:0,d:.75},
  ];
  const rm = schedNotes(filter, 'triangle', melody, t0, 0.08);
  all.push(...rm.nodes);
  // Sine bass
  const bass = [
    {f:N.C3,d:1},{f:0,d:.5},{f:N.A3,d:1},{f:0,d:.5},
    {f:N.F3,d:1},{f:0,d:.5},{f:N.G3,d:1},{f:0,d:.5},
    {f:N.C3,d:1},{f:0,d:.5},{f:N.G3,d:1},{f:0,d:.5},
  ];
  const rb = schedNotes(filter, 'sine', bass, t0, 0.1);
  all.push(...rb.nodes);
  // Vinyl crackle noise
  const bufLen = ctx.sampleRate * 2;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.015;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  noise.loop = true;
  const nf = ctx.createBiquadFilter();
  nf.type = 'highpass'; nf.frequency.value = 1000;
  noise.connect(nf); nf.connect(dest);
  const dur = Math.max(rm.duration, rb.duration);
  noise.start(t0); noise.stop(t0 + dur + 0.05);
  all.push(noise, nf);
  return { nodes: all, duration: dur };
}

// --- MUSIC CONTROLLER ---
function cleanupMusic() {
  musicNodes.forEach(n => { try { n.stop?.(); } catch {} try { n.disconnect(); } catch {} });
  musicNodes = [];
}
function stopMusic() {
  if (musicLoopId) { clearTimeout(musicLoopId); musicLoopId = null; }
  cleanupMusic();
  curMusicEra = null;
}
function startMusicLoop(era) {
  if (!audioCtx || S.musicVol === 0) return;
  const r = era.build(audioCtx, musicGain, audioCtx.currentTime);
  musicNodes = r.nodes;
  musicLoopId = setTimeout(() => {
    cleanupMusic();
    startMusicLoop(era);
  }, (r.duration - 0.1) * 1000);
}
function updateMusic() {
  if (_dbgMusicOverride) return;
  if (!audioCtx || S.musicVol === 0) { if (curMusicEra) stopMusic(); return; }
  const year = currentYear();
  const era = MUSIC_ERAS.find(e => year <= e.max) || MUSIC_ERAS[MUSIC_ERAS.length - 1];
  if (era.id === curMusicEra) return;
  // Crossfade
  if (curMusicEra) {
    const vol = S.musicVol;
    musicGain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    setTimeout(() => {
      stopMusic();
      curMusicEra = era.id;
      musicGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
      musicGain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.5);
      startMusicLoop(era);
    }, 500);
  } else {
    curMusicEra = era.id;
    startMusicLoop(era);
  }
}

function tickEvents(dt) {
  if (isShipping) return;
  if (activeEvent) {
    if (activeEvent.pending) return; // waiting for player choice
    activeEvent.remaining -= dt;
    updateEventBanner();
    if (activeEvent.remaining <= 0) { activeEvent = null; markDirty(); hideEventBanner(); }
  } else {

function ensureEvBanner() {

      const ci = +btn.dataset.choice;
      const c = activeEvent.choices[ci];
      const ei = activeEvent.eIdx;

      markDirty();
      showEventBanner(); updateEventBanner();

    if (currentComputerEra) document.documentElement.classList.remove(currentComputerEra);
    document.documentElement.classList.add(era.cls);
    currentComputerEra = era.cls;
    // Chromium won't recompute var()-based styles when transitions are active on
    // ancestor-inherited custom properties. Briefly kill transitions to force recompute,
    // then re-enable so future non-era property changes still animate.
    const s = document.createElement('style');
    s.textContent = '*{transition:none!important}';
    document.head.appendChild(s);
    void document.body.offsetHeight;          // force synchronous layout
    requestAnimationFrame(() => s.remove());  // re-enable transitions next frame
    updateLogBtnMode();
  }
  for (const idx in perkEls) {
    const el = perkEls[idx];
    if (el) el.classList.toggle('active', S.c[idx] >= 1);

// ========== AUTOCLICKER DETECTION ==========
const _ac = {
  times: [],        // last N click timestamps
  positions: [],    // last N click {x, y}
  untrusted: 0,     // count of isTrusted===false clicks
  strikes: 0,       // accumulated suspicion
  infested: false,   // currently penalized?
  infestEnd: 0,     // when penalty ends (performance.now)
  cooldown: 0,      // grace period after infestation ends
  WINDOW: 40,       // clicks to analyze
  INTERVAL_CV_THRESH: 0.03,  // coefficient of variation below this = bot
  POS_STD_THRESH: 1.5,       // pixel std dev below this = bot
  UNTRUSTED_THRESH: 5,       // untrusted clicks in window = bot
  STRIKE_THRESH: 5,          // strikes before infestation triggers
  INFEST_DUR: 30000,         // 30s penalty
};

function acRecord(e) {
  const now = performance.now();
  _ac.times.push(now);
  _ac.positions.push({ x: e.clientX, y: e.clientY });
  if (_ac.times.length > _ac.WINDOW) _ac.times.shift();
  if (_ac.positions.length > _ac.WINDOW) _ac.positions.shift();
  if (!e.isTrusted) _ac.untrusted++; else _ac.untrusted = Math.max(0, _ac.untrusted - 1);
}

function acCheck() {
  if (_ac.infested || _ac.times.length < _ac.WINDOW) return false;
  const now = performance.now();
  if (_ac.cooldown > now) return false;

  let dominated = false;

  // 1. isTrusted check
  if (_ac.untrusted >= _ac.UNTRUSTED_THRESH) dominated = true;

  // 2. Click interval variance (coefficient of variation)
  if (!dominated) {
    const intervals = [];
    for (let i = 1; i < _ac.times.length; i++) intervals.push(_ac.times[i] - _ac.times[i - 1]);
    const mean = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    if (mean > 0) {
      const variance = intervals.reduce((a, v) => a + (v - mean) ** 2, 0) / intervals.length;
      const cv = Math.sqrt(variance) / mean;
      if (cv < _ac.INTERVAL_CV_THRESH) dominated = true;
    }
  }


  if (dominated) {
    _ac.strikes++;
    if (_ac.strikes >= _ac.STRIKE_THRESH) {
      acTriggerInfestation();
      return true;
    }
  } else {
    _ac.strikes = Math.max(0, _ac.strikes - 1);
  }
  return false;
}

function acTriggerInfestation() {
  _ac.infested = true;
  _ac.infestEnd = performance.now() + _ac.INFEST_DUR;
  _ac.strikes = 0;
  _ac.times.length = 0;
  _ac.positions.length = 0;
  _ac.untrusted = 0;
  log('\uD83D\uDC1B Bug Infestation! Production halted \u2014 bugs are eating your code!');
  toast('\uD83D\uDC1B Bug Infestation! -90% production for 30s');
  playSfx('event');
}

function acTick() {
  if (!_ac.infested) return;
  if (performance.now() >= _ac.infestEnd) {
    _ac.infested = false;
    _ac.cooldown = performance.now() + 15000; // 15s grace after recovery
    log('\uD83D\uDEE0\uFE0F Bugs exterminated! Production restored.');
    toast('\uD83D\uDEE0\uFE0F Bugs exterminated!');
  }
}

function acPenalty() { return _ac.infested ? 0.1 : 1; }

function _aimAcc() {
  const cutoff = performance.now() - 60000;
  let hits = 0, total = 0;
  for (let i = _bub.aimLog.length - 1; i >= 0; i--) {
    if (_bub.aimLog[i].t < cutoff) break;
    total++; if (_bub.aimLog[i].hit) hits++;
  }
  return { hits, total, pct: total > 0 ? (hits / total) * 100 : 0 };
}
function aimbotMul() {
  if (!_bub.aimActive) return 1;
  const a = _aimAcc();
  if (a.total === 0) return 1;
  const diff = _bub.aimSpeed * (28 / _bub.aimSize);
  return 1 + diff * (a.pct / 100) * 0.60;
}
function aimAccUpdate() {
  if (!_bub.aimAccEl) return;
  if (_bub.aimActive) {
    const a = _aimAcc();
    const mul = aimbotMul();
    if (a.total > 0) {
      _bub.aimAccEl.textContent = '\uD83C\uDFAF ' + a.pct.toFixed(1) + '% (' + a.hits + '/' + a.total + ') \u00B7 ' + mul.toFixed(2) + '\u00D7';
    } else {
      _bub.aimAccEl.textContent = '\uD83C\uDFAF 0/0';
    }
    _bub.aimAccEl.classList.add('show');
  } else {
    _bub.aimAccEl.classList.remove('show');
  }
}

function bubbleSpawn() {
  if (_bub.activeEl) return;

function bubbleTick(dt) {
  const interval = _bub.aimActive ? _bub.AIM_INTERVAL / _bub.aimSpeed : _bub.INTERVAL;

  if (_bub.timer >= interval) {
    _bub.timer = 0;
    bubbleSpawn();
  }
  if (_bub.activeMul !== 1 && performance.now() >= _bub.mulEnd) {
    _bub.activeMul = 1;
  }
  // Trim old aim log entries (>60s) and refresh accuracy display
  if (_bub.aimActive && _bub.aimLog.length > 0) {
    const cutoff = performance.now() - 60000;
    while (_bub.aimLog.length > 0 && _bub.aimLog[0].t < cutoff) _bub.aimLog.shift();
    aimAccUpdate();

  // Show/hide aim trainer toggle based on fame unlock

  if (_bub.aimToggleEl) _bub.aimToggleEl.style.display = S.f.aimTrainer ? '' : 'none';
}

function bubbleMul() { return _bub.activeMul * aimbotMul(); }

function doClick(e) {
  acRecord(e);
  if (acCheck()) return; // infestation just triggered, swallow click
  ensureAudio();
  playSfx('click');
  let pw = clickPow() * streakMul * acPenalty() * bubbleMul();
  // Precision Click: +1% of LoC/s per click per level
  if (S.f.clickPrecision) pw += lps() * 0.01 * S.f.clickPrecision * acPenalty() * bubbleMul();
  // Combo Breaker: +0.1% LoC/s per click per streak per level
  if (S.f.streakCombo) pw += lps() * 0.001 * S.f.streakCombo * Math.floor(streakMul) * acPenalty() * bubbleMul();
  // Lucky Click: 8% chance per level of 15× click
  if (S.f.clickLucky && Math.random() < 0.08 * S.f.clickLucky) { pw *= 15; float(e.clientX + 10, e.clientY - 40, '\u2728 LUCKY!'); }
  // v7.3: clicks now generate the active engineer type's resource
  engAddRes(activeType(), pw);
  const nowClick = performance.now();
  ctPush(nowClick);
  lastClickTime = nowClick;
  // Immediate streak response on click
  ctTrim(nowClick - STREAK_WINDOW);
  if (S.f.streakUnlock && _ctN / STREAK_DIV >= 3) {
    const sMax = 2 + S.f.streakPower + 2 * S.f.streakTurbo;
    streakMul = Math.min(sMax, streakMul + 0.08);
    updateThermo();
  }
  scr.classList.add('pulse');
  setTimeout(() => scr.classList.remove('pulse'), 150);
  float(e.clientX - 15, e.clientY - 20, '+' + fmt(pw));
  // Add a line of code to the screen
  const _catKey = CAT_MAP[getLandmark(currentYear()).cat];
  const _cbl = (_catKey && CAT_CODE[_catKey]) || CB_CODE_LINES[Math.min(S.cb, CB_CODE_LINES.length - 1)] || CB_CODE_LINES[0];
  codeVisible.push(_cbl[codeIdx % _cbl.length]);
  codeIdx++;
  if (codeVisible.length > 10) codeVisible.shift();
  scr.textContent = codeVisible.join('\n');
}

let buyQty = 1; // 1, 5, 25, or Infinity (max)

function bulkCost(baseFn, owned, n) {
  let total = 0;
  for (let k = 0; k < n; k++) total += baseFn(owned + k);
  return total;
}
function gBulkCost(i, n) { return bulkCost(k => gCostAt(i, k), S.g[i], n); }
function cBulkCost(i, n) { return bulkCost(k => Math.floor(CLK[i].base * CLK[i].gr ** k), S.c[i], n); }
function maxAfford(costFn, owned) {
  let n = 0, total = 0;
  while (true) {
    const c = costFn(owned + n);
    if (total + c > S.loc) break;
    total += c; n++;
  }
  return n;
}
function gMax(i) { return maxAfford(k => gCostAt(i, k), S.g[i]); }
function cMax(i) { return maxAfford(k => Math.floor(CLK[i].base * CLK[i].gr ** k), S.c[i]); }
function effectiveQty(maxFn, i) { return buyQty === Infinity ? maxFn(i) : Math.min(buyQty, maxFn(i)); }

function buyGen(i) {
  let n = effectiveQty(gMax, i);
  if (buyQty !== Infinity && buyQty > 1 && n < buyQty) return;
  if (n < 1) return;
  const c = gBulkCost(i, n);
  if (S.loc < c) return;
  S.loc -= c;
  const wasZero = S.g[i] === 0;
  S.g[i] += n;
  markDirty();
  const gName = ta('gen_'+i+'_name', GEN[i].name);
  log(t('hired') + (n > 1 ? ' ' + n + '× ' : ': ') + gName);
  playSfx('buy');

// ========== CODER PACK SYSTEM (v6.8) ==========
const FIRST_NAMES = ['Alex','Jordan','Taylor','Morgan','Casey','Riley','Sam','Jamie','Quinn','Avery','Blake','Drew','Reese','Skyler','Rowan','Sage','Finley','Hayden','Kai','Logan','Parker','Emerson','Dakota','Harper','Robin','Eden','Nico','Remy','Tatum','Marlowe','Arden','Bailey','Carson','Devon','Ellis','Frankie','Gray','Indigo','Jesse','Kendall'];
const LAST_NAMES = ['Smith','Chen','Patel','Garcia','Kim','Nguyen','Johnson','Rivera','Lee','Khan','Brown','Park','Singh','Lopez','Ivanov','Fischer','Nakamura','O\u2019Brien','Dubois','Costa','Ng','Rossi','Yamamoto','Kowalski','Andersen','Tanaka','Silva','Hassan','Novak','Berg','Ruiz','Walsh','Morozov','Vega','Suzuki','Hoffmann','Mbeki','Liu','Rahman','Volkov'];
const RARITY_NAMES = ['Common','Uncommon','Rare','Epic','Legendary'];
const RARITY_CLS = ['r-c','r-u','r-r','r-e','r-l'];
const EDU_NAMES = ['Bootcamp','Associate','Bachelor','Master','PhD'];
// Rarity -> edu range [min, max]
const RARITY_EDU = [[0,1],[1,2],[2,3],[3,4],[4,4]];

function rollName() {
  return FIRST_NAMES[Math.floor(Math.random()*FIRST_NAMES.length)] + ' ' +
         LAST_NAMES[Math.floor(Math.random()*LAST_NAMES.length)];
}
function rollRarity() {
  const r = Math.random();
  if (r < 0.60) return 0;
  if (r < 0.85) return 1;
  if (r < 0.95) return 2;
  if (r < 0.99) return 3;
  return 4;
}
function computeTier(edu, exp, seed) {
  const score = edu * 2 + Math.floor(exp / 2);
  const base = Math.floor(score / 2);
  const jitter = seed < 0.33 ? -1 : seed < 0.66 ? 0 : 1;
  return Math.max(0, Math.min(GEN.length - 1, base + jitter));
}
// v7.1: Per-coder production multipliers — rarity + experience
// Commons stay neutral (1.0) so new-player pack feel is unchanged.
// Rare-tier multipliers interact with tier correlation (high rarities land
// in high tiers), so measured buff on a natural roster is ~25% — treated as
// a v7.1 launch bonus for existing saves.
const RARITY_MUL = [1.00, 1.08, 1.22, 1.50, 2.00]; // C, U, R, E, L
function coderProdMul(c) {
  const r = RARITY_MUL[c.rarity] || 1;
  // +1% per year of exp, soft-capped at +50%
  const e = 1 + Math.min(0.50, 0.01 * (c.exp || 0));
  return r * e;
}
// v7.2: Tier set bonuses — same thresholds for every coder tier, applied independently.
// Highest met threshold wins per tier; sum across all tiers becomes _C.tierSynergyMul.
const SET_TIERS = [
  { n: 3,  bonus: 0.05 },
  { n: 10, bonus: 0.10 },
  { n: 25, bonus: 0.20 },
];
function setTierBonus(count) {
  let b = 0;
  for (const t of SET_TIERS) if (count >= t.n) b = t.bonus;
  return b;
}
function rollCoder() {
  const rarity = rollRarity();
  const [eMin, eMax] = RARITY_EDU[rarity];
  const edu = eMin + Math.floor(Math.random() * (eMax - eMin + 1));
  const exp = 0;
  const seed = Math.random();
  const age = (18 + edu * 2) + Math.floor(Math.random() * 5);
  const retireAge = Math.min(78, 57 + edu * 2 + Math.floor(Math.random() * (11 + edu * 2)));
  const c = { name: rollName(), edu, exp, rarity, seed, tier: 0, age, retireAge };
  c.tier = computeTier(edu, exp, seed);
  return c;
}
function recomputeG() {
  // v7.3: S.g still tracks tier counts but now reflects ALL engineer types combined.
  // This keeps lunchBonus(), Synergy/Code Review, and Trainer auto-pick working
  // across all types without per-type branching.
  for (let i = 0; i < GEN.length; i++) S.g[i] = 0;
  for (const c of (S.coders || [])) S.g[c.tier]++;
  if (S.engineers) {
    for (const k in S.engineers) {
      for (const c of (S.engineers[k].list || [])) {
        if (c.tier >= 0 && c.tier < GEN.length) S.g[c.tier]++;
      }
    }
  }
}
function recruiterPackDiscount() {
  const count = (S.ss && S.ss[SS.RECRUITER]) || 0;
  const tlvl = (S.trainerSSLvl && S.trainerSSLvl[SS.RECRUITER]) || 0;
  // v7.4: Executive Retainer (ru[2]) doubles the per-level discount rate
  const perLvl = 0.02 * ((S.ru && S.ru[2]) ? 2 : 1);
  const effective = count * (1 + 0.02 * tlvl);
  let mul = Math.max(0.3, 1 - perLvl * effective);
  if (S.c && S.c[P.MEETING]) mul *= 0.85;
  // v7.4: Headhunter Network (ru[0]) flat -15% on pack cost
  if (S.ru && S.ru[0]) mul *= 0.85;
  return mul;
}
// v7.4: dynamic pack size — base 3, +1 per Talent Pool upgrade
function packSize() {
  return PACK_SIZE + ((S.ru && S.ru[1]) ? 1 : 0);
}
// v6.9: Office tiers — cap = max coders in roster, prod = flat production multiplier
const OFFICES = [
  { name: 'Garage',        cap:  20, cost: 0,      prod: 1.00 },
  { name: 'Coworking Desk',cap:  35, cost: 5e3,    prod: 1.10 },
  { name: 'Startup Loft',  cap:  55, cost: 1e5,    prod: 1.20 },
  { name: 'Small Office',  cap:  85, cost: 3e6,    prod: 1.35 },
  { name: 'Open Floor',    cap: 130, cost: 1e8,    prod: 1.55 },
  { name: 'Tower Floor',   cap: 200, cost: 5e9,    prod: 1.80 },
  { name: 'Company HQ',    cap: 300, cost: 2.5e11, prod: 2.10 },
  { name: 'Campus',        cap: 500, cost: 1e13,   prod: 2.50 },
];
// v7.3: per-type office helpers — each engineer type has its own office level
function officeLvl(type) {
  type = type || activeType();
  const v = (S.offices && typeof S.offices[type] === 'number') ? S.offices[type] : 0;
  return Math.max(0, Math.min(OFFICES.length - 1, v));
}
function officeTier(type) { return OFFICES[officeLvl(type)]; }
function coderCap(type) { return officeTier(type).cap; }
function officeProdMul(type) { return officeTier(type).prod; }
function officeCost(type) {
  type = type || activeType();
  const next = officeLvl(type) + 1;
  if (next >= OFFICES.length) return Infinity;
  // v7.7: scale by type's packBase so later types pay proportionally more
  const meta = ENG_TYPE_MAP[type];
  const typeScale = (meta && meta.packBase) ? meta.packBase / 100 : 1;
  return Math.floor(OFFICES[next].cost * typeScale * shipInflation());
}
// v7.4: pack size reduced 5 -> 3 (engineers are 2x stronger; see GEN rates)
const PACK_SIZE = 3;
// v7.3: pack-fit check counts ONLY the active type's roster against its own office cap
function canFitPack() {
  const t = activeType();
  return engList(t).length + packSize() <= coderCap(t);
}
function buyOffice() {
  const t = activeType();
  const next = officeLvl(t) + 1;
  if (next >= OFFICES.length) return;
  const cost = officeCost(t);
  if (engRes(t) < cost) { toast('Not enough ' + (ENG_TYPE_MAP[t] ? ENG_TYPE_MAP[t].res : 'LoC')); return; }
  if (!engSubRes(t, cost)) return;
  if (!S.offices) S.offices = Object.fromEntries(ENG_TYPES.map(e => [e.key, 0]));
  if (typeof S.offices[t] !== 'number') S.offices[t] = 0;
  S.offices[t] = next;
  if (t === 'coder') S.office = next; // keep legacy field in sync for any old reader
  markDirty();
  // Invalidate sprite cache since cap changed (empty desk count)
  if (typeof _ofc !== 'undefined') _ofc.spriteCache = [];
  playSfx('buy');
  log('\u{1F3E2} ' + (ENG_TYPE_MAP[t] ? ENG_TYPE_MAP[t].name : 'Coder') + ' team moved to ' + OFFICES[next].name);
}
function packCostAt(aType, rosterSize) {
  const meta = ENG_TYPE_MAP[aType];
  const base = (meta && meta.packBase) || 100;
  const growth = Math.pow(2, rosterSize / 5) + 8 * (1 - Math.pow(2, -rosterSize / 2));
  return Math.floor(base * growth * recruiterPackDiscount() * (_C.hireCostMul || 1) * shipInflation());
}
function packCost() {
  return packCostAt(activeType(), engList(activeType()).length);
}
// v9.0: bulk pack helpers — cost escalates after each pack since roster grows
function bulkPackInfo(qty) {
  const aType = activeType();
  const ps = packSize();
  const cap = coderCap(aType);
  let roster = engList(aType).length;
  let res = engRes(aType);
  let total = 0, count = 0;
  const limit = qty === Infinity ? 9999 : qty;
  for (let i = 0; i < limit; i++) {
    if (roster + ps > cap) break;
    const c = packCostAt(aType, roster);
    if (qty === Infinity && res < total + c) break;
    total += c;
    roster += ps;
    count++;
  }
  return { count, totalCost: total };
}
// v7.2: severance cost — 500 base, ×1.25 per fire, resets on ship
function fireCost() {
  return Math.floor(500 * Math.pow(1.25, S.fireCount || 0));
}
function buyPack() {
  const aType = activeType();
  if (!canFitPack()) { toast('Office full \u2014 upgrade office'); return; }
  const info = bulkPackInfo(buyQty);
  // For fixed quantities (x5, x25) require all packs affordable; for max buy what we can
  if (buyQty !== Infinity && buyQty > 1 && info.count < buyQty) {
    if (info.count === 0 && engRes(aType) < packCost()) {
      toast('Not enough ' + (ENG_TYPE_MAP[aType] ? ENG_TYPE_MAP[aType].res : 'LoC'));
    } else if (info.count < buyQty) {
      toast('Can only fit ' + info.count + ' pack' + (info.count !== 1 ? 's' : ''));
    }
    return;
  }
  if (info.count < 1) { toast('Not enough ' + (ENG_TYPE_MAP[aType] ? ENG_TYPE_MAP[aType].res : 'LoC')); return; }
  if (engRes(aType) < info.totalCost) { toast('Not enough ' + (ENG_TYPE_MAP[aType] ? ENG_TYPE_MAP[aType].res : 'LoC')); return; }
  engSubRes(aType, info.totalCost);
  const pulls = [];
  const ps = packSize();
  for (let p = 0; p < info.count; p++)
    for (let k = 0; k < ps; k++) pulls.push(rollCoder());
  engList(aType).push(...pulls);
  recomputeG();
  markDirty();
  playSfx('buy');
  const counts = [0,0,0,0,0];
  pulls.forEach(c => counts[c.rarity]++);
  const summary = counts.map((n,i) => n ? n + RARITY_NAMES[i][0] : '').filter(Boolean).join(' ');
  log('\u{1F4E6} Hired ' + info.count + ' pack' + (info.count > 1 ? 's' : '') + ': ' + summary);
  showPackReveal(pulls);
}

  if (pool.length === 0) return;

  _dlgRecent.push(lineIdx);

  panel.appendChild(synBox);

  const filterRow = document.createElement('div');
  filterRow.className = 'roster-ctrl';
  panel.appendChild(filterRow);
  const sortRow = document.createElement('div');
  sortRow.className = 'roster-ctrl';
  panel.appendChild(sortRow);

  const listEl = document.createElement('div');
  listEl.className = 'roster-list';
  panel.appendChild(listEl);

  function rebuildHeader() {
    recalcIfDirty();
    synBox.innerHTML = '';
    // v7.3: tier counts shown reflect the active type only (set bonuses are per-type)
    const counts = (_C.typeTierCount && _C.typeTierCount[activeType()]) || _C.tierCount || [];
    // Only show rows for tiers the player has unlocked (count > 0) to keep
    // the header tight; players see tiers appear as they hire.
    for (let i = 0; i < GEN.length; i++) {
      if ((counts[i] || 0) === 0) continue;
      const row = document.createElement('div');
      row.className = 'roster-syn-row';
      const name = document.createElement('span');
      name.className = 'rn';
      name.textContent = GEN[i].name;
      const cnt = document.createElement('span');
      cnt.className = 'rc';
      cnt.textContent = (counts[i] || 0) + ' owned';
      const cur = setTierBonus(counts[i] || 0);
      const bonus = document.createElement('span');
      bonus.className = 'rb';
      bonus.textContent = cur > 0 ? '+' + Math.round(cur * 100) + '%' : '—';
      const prog = document.createElement('span');
      prog.className = 'rp';
      let nextN = 0, nextB = 0;
      for (const tier of SET_TIERS) { if ((counts[i] || 0) < tier.n) { nextN = tier.n; nextB = tier.bonus; break; } }
      if (nextN > 0) {
        prog.textContent = (nextN - (counts[i] || 0)) + ' more → +' + Math.round(nextB * 100) + '%';
      } else {
        prog.textContent = 'MAX';
      }
      row.append(name, cnt, bonus, prog);
      synBox.appendChild(row);
    }
    if (synBox.children.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:var(--text-secondary);font-size:.65rem;text-align:center;padding:4px';
      empty.textContent = 'Hire engineers to unlock tier bonuses';
      synBox.appendChild(empty);
    }
  }

  function rebuildList() {
    listEl.innerHTML = '';
    // v7.3: roster shows the active engineer type only
    const sourceList = engList(activeType());
    const rows = sourceList.filter(c => _rosFilter < 0 || c.rarity === _rosFilter);
    rows.sort((a, b) => {
      if (_rosSort === 'rarity') return (b.rarity - a.rarity) || (b.tier - a.tier);
      if (_rosSort === 'tier')   return (b.tier - a.tier) || (b.rarity - a.rarity);
      if (_rosSort === 'exp')    return (b.exp || 0) - (a.exp || 0);
      if (_rosSort === 'lps')    return _coderContribLps(b) - _coderContribLps(a);
      return 0;
    });
    if (rows.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'text-align:center;color:var(--text-secondary);padding:20px;font-size:.75rem';
      const meta = activeTypeMeta();
      empty.textContent = (sourceList.length > 0) ? 'No engineers match this filter.' : ('No ' + meta.name.toLowerCase() + 's yet — buy a pack!');
      listEl.appendChild(empty);
      return;
    }
    for (const c of rows) {
      const row = document.createElement('div');
      row.className = 'roster-row';
      const nameEl = document.createElement('span');
      nameEl.className = 'r-name ' + (RARITY_CLS[c.rarity] || '');
      nameEl.textContent = c.name || '?';
      const metaEl = document.createElement('span');
      metaEl.className = 'r-meta';
      const tierName = GEN[c.tier] ? GEN[c.tier].name : '?';
      const eduName = EDU_NAMES[c.edu] || '?';
      metaEl.textContent = tierName + ' · ' + eduName + ' · Age ' + (c.age || '?');
      const lpsEl = document.createElement('span');
      lpsEl.className = 'r-lps';
      lpsEl.textContent = fmt(_coderContribLps(c)) + '/s';
      const fireBtn = document.createElement('button');
      fireBtn.className = 'fire-btn';
      const fireLabel = () => (t('fire') || 'Fire') + ' ' + fmt(fireCost());
      const confirmLabel = () => (t('fireConfirm') || 'Fire?') + ' ' + fmt(fireCost());
      fireBtn.textContent = fireLabel();
      let revertTimer = null;
      fireBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!fireBtn.classList.contains('confirm')) {
          fireBtn.classList.add('confirm');
          fireBtn.textContent = confirmLabel();
          revertTimer = setTimeout(() => {
            fireBtn.classList.remove('confirm');
            fireBtn.textContent = fireLabel();
            revertTimer = null;
          }, 3000);
          return;
        }
        if (revertTimer) { clearTimeout(revertTimer); revertTimer = null; }
        const cost = fireCost();
        const aType = activeType();
        if (engRes(aType) < cost) {
          fireBtn.classList.remove('confirm');
          fireBtn.textContent = fireLabel();
          toast('Not enough ' + (ENG_TYPE_MAP[aType] ? ENG_TYPE_MAP[aType].res : 'LoC') + ' for severance');
          return;
        }
        engSubRes(aType, cost);
        S.fireCount = (S.fireCount || 0) + 1;
        const list = engList(aType);
        const idx = list.indexOf(c);
        if (idx >= 0) list.splice(idx, 1);
        recomputeG();
        markDirty();
        recalcIfDirty();
        rebuildHeader();
        rebuildList();
        // Mirror the change to the other view (always-open + modal share state)
        if (isModal) renderRosterCol();
      });
      row.append(nameEl, metaEl, lpsEl, fireBtn);
      // Stash the coder ref so soft refresh can update LPS text without
      // having to re-derive identity from sort order.
      row._coder = c;
      listEl.appendChild(row);
    }
  }
  // Soft refresh: update LPS text in place. Used by the periodic tick so
  // an in-progress fire-confirm state isn't clobbered by a full rebuild.
  panel._rosterSoftRefresh = () => {
    recalcIfDirty();
    panel.querySelectorAll('.roster-row').forEach(row => {
      const c = row._coder;
      if (!c) return;
      const lpsEl = row.querySelector('.r-lps');
      if (lpsEl) lpsEl.textContent = fmt(_coderContribLps(c)) + '/s';
    });
  };

  function mkCtrlBtn(label, isActive, onClick) {
    const b = document.createElement('button');
    b.textContent = label;
    if (isActive) b.classList.add('active');
    b.addEventListener('click', onClick);
    return b;
  }
  function buildFilters() {
    filterRow.innerHTML = '';
    filterRow.appendChild(mkCtrlBtn(t('filterAll') || 'All', _rosFilter === -1, () => { _rosFilter = -1; buildFilters(); rebuildList(); if (isModal) renderRosterCol(); }));
    for (let r = 0; r < 5; r++) {
      const b = mkCtrlBtn(RARITY_NAMES[r][0], _rosFilter === r, (() => { const rr = r; return () => { _rosFilter = rr; buildFilters(); rebuildList(); if (isModal) renderRosterCol(); }; })());
      b.classList.add(RARITY_CLS[r]);
      filterRow.appendChild(b);
    }
  }
  function buildSort() {
    sortRow.innerHTML = '';
    const keys = [
      ['rarity', t('sortRarity') || 'Rarity'],
      ['tier',   t('sortTier')   || 'Tier'],
      ['exp',    t('sortExp')    || 'Exp'],
      ['lps',    t('sortLps')    || 'LPS'],
    ];
    for (const [k, lbl] of keys) {
      sortRow.appendChild(mkCtrlBtn(lbl, _rosSort === k, (() => { const kk = k; return () => { _rosSort = kk; buildSort(); rebuildList(); if (isModal) renderRosterCol(); }; })()));
    }
  }

  buildFilters();
  buildSort();
  rebuildHeader();
  rebuildList();
}

// Render the always-open roster column. Throttled by tick(); also called
// after user actions that mutate S.coders.
//
// Fingerprint detects structural changes (hire, fire, ship-tier-bump). Anything
// else is a soft text refresh — we don't tear down the DOM, since that would
// clobber any in-progress fire-confirm state and make the button feel laggy.
function renderRosterCol() {
  if (!_rosColEl) _rosColEl = document.getElementById('rosterCol');
  if (!_rosColEl) return;
  // v7.3: fingerprint includes active type so switching tabs rebuilds
  const aType = activeType();
  const fp = aType + ':' + engList(aType).length + ':' + (S.shipped || 0);
  if (_rosColEl._rosterFp !== fp || !_rosColEl._rosterSoftRefresh) {
    const scrollY = _rosColEl.scrollTop;
    buildRosterInto(_rosColEl, false);
    _rosColEl._rosterFp = fp;
    _rosColEl.scrollTop = scrollY;
  } else {
    _rosColEl._rosterSoftRefresh();
  }
}

function openRoster() {
  // Remove any existing overlay first
  const old = document.querySelector('.st-ov');
  if (old) old.remove();

  const ov = document.createElement('div');
  ov.className = 'st-ov';
  const panel = document.createElement('div');
  buildRosterInto(panel, true);

  const close = document.createElement('button');
  close.className = 'st-close';
  close.textContent = '\u00d7';
  close.addEventListener('click', () => ov.remove());
  ov.appendChild(close);
  ov.appendChild(panel);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
}

    [t('officePerks'), totalPerks + '/' + CLK.length],
    [t('equipment'), S.eu.flat().reduce((a, v) => a + v, 0) + '/' + (S.g.filter(n => n > 0).length * EMP_UPS.length * 3) + ' ' + t('tiers')],

  });
  runSec.appendChild(runTbl);

  // v7.3: Engineer Types breakdown — one row per unlocked type with count, office, current/lifetime resource, rate
  if (unlockedTypes.length > 0) {

    engTbl.className = 'stats-table';

    const tbody = document.createElement('tbody');
    for (const meta of unlockedTypes) {
      const list = engList(meta.key);
      const cap = coderCap(meta.key);
      const ofcName = officeTier(meta.key).name;
      const lpsVal = (_C.typeLps && _C.typeLps[meta.key]) || 0;
      // Extra bonus for coder type: autoClick LPS
      const extra = meta.key === 'coder' ? autoClickLps : 0;
      const syn = (_C.typeTierSynergyMul && _C.typeTierSynergyMul[meta.key]) || 1;
      const synPct = syn > 1 ? ' <span style="color:#3fb950">(+' + Math.round((syn - 1) * 100) + '%)</span>' : '';
      const lifetime = engTRes(meta.key);
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td><span style="color:' + meta.color + '">\u25cf</span> ' + meta.name + '</td>' +
        '<td>' + list.length + '/' + cap + '</td>' +
        '<td style="font-size:.7rem;color:#8b949e">' + ofcName + '</td>' +

    staffSec.innerHTML = '<div class="stats-sec-title">Support Staff</div>';

  panel.appendChild(histSec);

  ov.appendChild(close);
  ov.appendChild(panel);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
}

        cTitle.textContent = '\u26A0 Respec Warning';
        const cMsg = document.createElement('div');
        cMsg.style.cssText = 'font-size:.78rem;color:var(--text-primary);line-height:1.5;margin-bottom:16px';
        cMsg.textContent = 'You can only respec once per software release. This will refund ' + fameSpent + ' Fame and reset all skills. Are you sure?';
        const cBtns = document.createElement('div');

        const cYes = document.createElement('button');
        cYes.style.cssText = 'padding:6px 18px;background:var(--accent-red);border:none;border-radius:var(--border-radius);color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit';
        cYes.textContent = 'Respec';
        cYes.addEventListener('click', () => {
          cov.remove();
          FAME_TREE.forEach(b => b.upgrades.forEach(u => { S.fame += (S.f[u.id] || 0) * u.cost; S.f[u.id] = 0; }));
          S.fameResetUsed = 1;
          markDirty();
          toast('Skill tree reset! ' + fameSpent + ' Fame refunded. Next respec after shipping.');

        });
        const cNo = document.createElement('button');
        cNo.style.cssText = 'padding:6px 18px;background:var(--bg-hover);border:1px solid var(--border-primary);border-radius:var(--border-radius);color:var(--text-primary);font-size:.8rem;cursor:pointer;font-family:inherit';

        cBtns.appendChild(cNo);
        cbox.appendChild(cTitle);
        cbox.appendChild(cMsg);
        cbox.appendChild(cBtns);

      });

  }
  actions.appendChild(close);
  header.appendChild(actions);
  graph.appendChild(header);

  // Tab bar
  const tabs = document.createElement('div');
  tabs.className = 'st-tabs';
  FAME_TREE.forEach((branch, bIdx) => {
    const tab = document.createElement('button');
    tab.className = 'st-tab' + (bIdx === activeBranch ? ' active' : '');
    tab.style.setProperty('--bc', branch.color);
    tab.textContent = ta('ft_' + bIdx + '_name', branch.name);
    tab.addEventListener('click', () => {
      activeBranch = bIdx;
      tabs.querySelectorAll('.st-tab').forEach((t, i) => t.classList.toggle('active', i === bIdx));
      renderBranch(bIdx);
    });
    tabs.appendChild(tab);
  });
  graph.appendChild(tabs);

  // Path container
  const path = document.createElement('div');
  path.className = 'st-path';
  graph.appendChild(path);

  // Build a node element
  function makeNode(u, uIdx, bIdx, color) {
    const owned = S.f[u.id] || 0;
    const isMystery = u.max === 0;
    const maxed = !isMystery && owned >= u.max;
    const reqIdx = u.req != null ? u.req : (uIdx > 0 ? uIdx - 1 : -1);
    const branch = FAME_TREE[bIdx];
    const prereqMet = reqIdx < 0 || (S.f[branch.upgrades[reqIdx].id] || 0) >= 1;
    const afford = !isMystery && prereqMet && S.fame >= u.cost && !maxed;
    const locked = isMystery || !prereqMet;

    const node = document.createElement('div');
    node.className = 'st-node';
    node.setAttribute('role', 'button');
    node.tabIndex = 0;
    node.style.setProperty('--bc', color);
    if (owned > 0) node.classList.add('owned');
    if (maxed) node.classList.add('maxed');
    if (locked) node.classList.add('locked');
    else if (!afford) node.classList.add('no');
    if (isMystery) node.style.borderStyle = 'dashed';

    const costText = isMystery ? t('unknown') : maxed ? t('maxLvl') : u.cost + ' ' + t('fame');
    const lvlText = isMystery ? '' : owned > 0 ? 'Lv ' + owned + (u.max > 1 ? '/' + u.max : '') : '';
    node.innerHTML = '<div class="st-node-name">' + ta('ft_' + bIdx + '_' + uIdx + '_name', u.name) + '</div>'
      + '<div class="st-node-desc">' + ta('ft_' + bIdx + '_' + uIdx + '_desc', u.desc) + '</div>'
      + '<div class="st-node-cost">' + costText + '</div>'
      + (lvlText ? '<div class="st-node-lvl">' + lvlText + '</div>' : '');

    if (!locked && !maxed && !isMystery) {
      node.addEventListener('click', () => {
        buyFame(bIdx, uIdx);
        fameVal.textContent = S.fame;
        renderBranch(activeBranch);
      });
    }
    return { node, owned, locked };
  }

  // Arrow SVG between nodes
  function makeArrow(color, dim) {
    const arrow = document.createElement('div');
    arrow.className = 'st-arrow';
    arrow.innerHTML = '<svg viewBox="0 0 32 16"><line x1="0" y1="8" x2="26" y2="8" stroke="' + color + '" stroke-width="2" stroke-opacity="' + (dim ? '.15' : '.5') + '"/><polygon points="26,4 32,8 26,12" fill="' + color + '" fill-opacity="' + (dim ? '.15' : '.5') + '"/></svg>';
    return arrow;
  }

  // Sub-branch connector (vertical bar)
  function makeSubArrow(color, lit) {
    const bar = document.createElement('div');
    bar.className = 'st-sub-arrow' + (lit ? ' lit' : '');
    bar.style.setProperty('--bc', color);
    return bar;
  }

  // Render one branch as horizontal path
  function renderBranch(bIdx) {
    path.innerHTML = '';
    const branch = FAME_TREE[bIdx];
    const color = branch.color;
    const ups = branch.upgrades;

    // Build dependency tree: group nodes by their spine parent
    // Spine nodes: nodes whose req forms a chain (-1 → 0 → 1 → 2 ...)
    // We find the spine by following req from -1 upward
    const spineSet = new Set();
    const childrenOf = {};  // spineIdx -> [uIdx, uIdx, ...]

    // First pass: identify spine nodes (nodes reachable by following req=-1 → 0 → next)
    let spineOrder = [];
    // Root nodes (req === -1)
    const roots = [];
    for (let i = 0; i < ups.length; i++) {
      if (ups[i].req === -1) roots.push(i);
    }
    // Build spine: walk from first root following the chain where each node's child points back to it
    // Simple approach: BFS/DFS to find the longest chain from roots
    // Actually, let's use a simpler approach: identify the "main path" as nodes where
    // another node lists them as req AND they themselves are on a chain from a root.
    // For display purposes, treat nodes with req=-1 as column 0,
    // nodes with req=0 as column 1, req=1 as column 2, req=2 as column 3.
    // Group all nodes by their req value into columns.
    const columns = {};  // reqIdx -> [uIdx, ...]
    for (let i = 0; i < ups.length; i++) {
      const r = ups[i].req;
      if (!columns[r]) columns[r] = [];
      columns[r].push(i);
    }

    // Build columns left to right: start with req=-1, then for each node in that column,
    // check if anything points to it, creating the next column
    const colOrder = [];  // each entry: { parent: reqIdx, nodes: [uIdx, ...] }
    let currentReqs = [-1];
    const visited = new Set();
    while (currentReqs.length > 0) {
      const colNodes = [];
      for (const r of currentReqs) {
        if (columns[r]) {
          for (const idx of columns[r]) {
            if (!visited.has(idx)) {
              visited.add(idx);
              colNodes.push(idx);
            }
          }
        }
      }
      if (colNodes.length === 0) break;
      colOrder.push(colNodes);
      currentReqs = colNodes;
    }

    // Render columns with arrows between them
    colOrder.forEach((colNodes, cIdx) => {
      // Arrow before this column (except first)
      if (cIdx > 0) {
        const prevOwned = colOrder[cIdx - 1].some(i => (S.f[ups[i].id] || 0) > 0);
        path.appendChild(makeArrow(color, !prevOwned));
      }

      const col = document.createElement('div');
      col.className = 'st-col';

      colNodes.forEach((uIdx, nIdx) => {
        if (nIdx > 0) col.appendChild(makeSubArrow(color, (S.f[ups[colNodes[0]].id] || 0) > 0));
        const { node } = makeNode(ups[uIdx], uIdx, bIdx, color);
        col.appendChild(node);
      });

      path.appendChild(col);
    });
  }

  renderBranch(activeBranch);

  ov.appendChild(graph);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
}

function buyFame(bIdx, uIdx) {
  const branch = FAME_TREE[bIdx];
  if (!branch) return;
  const u = branch.upgrades[uIdx];
  if (!u || u.max === 0) return;
  if (S.f[u.id] >= u.max || S.fame < u.cost) return;
  const reqIdx = u.req != null ? u.req : (uIdx > 0 ? uIdx - 1 : -1);
  if (reqIdx >= 0 && (S.f[branch.upgrades[reqIdx].id] || 0) < 1) return;
  S.fame -= u.cost;
  S.f[u.id]++;
  markDirty();
  const fName = ta('ft_'+bIdx+'_'+uIdx+'_name', u.name);
  log(t('logSkill') + ': ' + fName + (u.max > 1 ? ' (Lv ' + S.f[u.id] + ')' : ''));
  playSfx('buy');
  // v7.8: Early Access — immediately check if any types should unlock
  if (u.id === 'goldenParachute') checkTypeUnlocks();
}

// v9.1: shared unlock check — prevents duplicate toasts
function checkTypeUnlocks() {
  if (!Array.isArray(S.unlockedTypes)) return;
  const yr = currentYear();
  let any = false;
  for (const meta of ENG_TYPES) {
    if (meta.key === 'coder') continue;
    if (yr >= meta.unlockYear - (S.f.goldenParachute || 0) && !S.unlockedTypes.includes(meta.key)) {
      S.unlockedTypes.push(meta.key);
      toast('\u{1F389} New engineer type unlocked: ' + meta.name + ' (' + meta.res + ')');
      log('\u{1F389} ' + meta.name + ' engineers can now be hired (\u2192 ' + meta.res + ')');
      any = true;
    }
  }
  if (any) { renderTypeTabs(); renderResourceBar(); renderShipPanel(); }
}

// v7.3: ship requires every unlocked engineer type to meet its own threshold
function canShip() {
  if (S.shipped >= RELEASE_YEARS.length) return false; // v10: no more than 10 releases
  if (!Array.isArray(S.unlockedTypes)) return false;
  for (const type of S.unlockedTypes) {
    if (engTRes(type) < engShipAt(type)) return false;
  }
  return true;
}
function ship() {
  if (!canShip()) return;
  const year = currentYear();
  const lm = getLandmark(year);
  const name = lm.parody;
  const gain = fameGain();
  S.games.push({ name, year, cat: lm.cat, fame: gain, target: shipAt() });
  // Unlock code base upgrade for new category
  if (!S.catsSeen.includes(lm.cat)) {
    S.catsSeen.push(lm.cat);
    if (S.cb < CODE_BASE.length) {
      S.cb++;
      const cbName = ta('cb_'+(S.cb-1)+'_name', CODE_BASE[S.cb - 1].name);
      log('\uD83D\uDCDA ' + t('cbUnlocked') + ': ' + cbName);
    }
  }
  S.fame += gain; S.tFame += gain;
  S.shipped++;
  S.fameResetUsed = 0;
  // v7.2: severance cost resets to 500 base each ship
  S.fireCount = 0;
  // v7.2: ship is no longer a prestige reset — generators, equipment, clickers,
  // support, recruiters, facilities, and resources all persist across ships.
  // v10: Engineers gain +1 exp per ship (gradual tier progression) but age by real year gap.
  const gap = yearGap();
  if (!Array.isArray(S.coders)) S.coders = [];
  S.coders.forEach(c => {
    if (c.age === undefined) { c.age = 20 + (c.edu || 0) * 2 + (c.exp || 0); c.retireAge = Math.min(78, 57 + (c.edu || 0) * 2 + Math.floor((c.seed || Math.random()) * (11 + (c.edu || 0) * 2))); }
    c.exp += 1; c.age += gap; c.tier = computeTier(c.edu, c.exp, c.seed);
  });
  // v7.3: also age engineers from the new types
  if (S.engineers) {
    for (const k in S.engineers) {
      for (const c of (S.engineers[k].list || [])) {
        if (c.age === undefined) { c.age = 20 + (c.edu || 0) * 2 + (c.exp || 0); c.retireAge = Math.min(78, 57 + (c.edu || 0) * 2 + Math.floor((c.seed || Math.random()) * (11 + (c.edu || 0) * 2))); }
        c.exp += 1; c.age += gap; c.tier = computeTier(c.edu, c.exp, c.seed);
      }
    }
  }
  // v9.1: retirement check — remove engineers who reached retirement age
  (function retireCheck() {
    let retired = [];
    if (Array.isArray(S.coders)) {
      S.coders = S.coders.filter(c => {
        if (c.age >= c.retireAge) { retired.push(c); return false; }
        return true;
      });
    }
    if (S.engineers) {
      for (const k in S.engineers) {
        const list = S.engineers[k].list;
        if (!Array.isArray(list)) continue;
        S.engineers[k].list = list.filter(c => {
          if (c.age >= c.retireAge) { retired.push(c); return false; }
          return true;
        });
      }
    }
    if (retired.length > 0) {
      S.totalRetired = (S.totalRetired || 0) + retired.length;
      if (retired.length <= 3) {
        retired.forEach(c => log('\u{1F382} ' + c.name + ' retired at age ' + c.age));
      } else {
        log('\u{1F382} ' + retired.length + ' engineers retired');
      }
      window._pendingRetired = retired;
    }
  })();
  // v7.3: bump shippedSince for every unlocked type so each one's threshold scales
  if (Array.isArray(S.unlockedTypes) && S.engineers) {
    for (const k of S.unlockedTypes) {
      if (k === 'coder') continue;
      if (S.engineers[k]) S.engineers[k].shippedSince = (S.engineers[k].shippedSince || 0) + 1;
    }
  }
  recomputeG();
  markDirty();
  // v7.3: year-based unlock for the next engineer type
  checkTypeUnlocks();
  // v7.6: Engine perk bootstraps types that have NO coders yet with 6 starters
  // (2 per tier 0,1,2). Types that already have coders are skipped to prevent
  // production snowball that makes mid-game ships trivially fast.
  if (S.f.engine) {
    if (!S.offices) S.offices = Object.fromEntries(ENG_TYPES.map(e => [e.key, 0]));
    const starters = [[0,2],[1,2],[2,2]];
    for (const typeKey of (S.unlockedTypes || ['coder'])) {
      if (typeof S.offices[typeKey] !== 'number') S.offices[typeKey] = 0;
      const targetList = engList(typeKey);
      if (targetList.length > 0) continue; // Only bootstrap empty types
      const needCap = targetList.length + 6;
      while (S.offices[typeKey] < OFFICES.length - 1 && OFFICES[S.offices[typeKey]].cap < needCap) {
        S.offices[typeKey]++;
      }
      if (typeKey === 'coder') S.office = S.offices.coder;
      for (const [i, n] of starters) {
        for (let k = 0; k < n; k++) {
          const _edu = Math.min(4, Math.floor(i/2) + 1);
          targetList.push({
            name: FIRST_NAMES[Math.floor(Math.random()*FIRST_NAMES.length)] + ' ' + LAST_NAMES[Math.floor(Math.random()*LAST_NAMES.length)],
            edu: _edu,
            exp: 0,
            rarity: 0,
            seed: Math.random(),
            tier: i,
            age: (18 + _edu * 2) + Math.floor(Math.random() * 5),
            retireAge: Math.min(78, 57 + _edu * 2 + Math.floor(Math.random() * (11 + _edu * 2)))
          });
        }
      }
    }
    recomputeG();
    markDirty();
  }
  // v7.8: Seed Round — all unlocked types get +2%×Lv of their ship threshold per ship
  if (S.f.ventureCapital) {
    for (const k of (S.unlockedTypes || ['coder'])) {
      const vc = Math.floor(engShipAt(k) * 0.02 * S.f.ventureCapital);
      if (vc > 0) {
        if (k === 'coder') { S.loc += vc; S.tLoc += vc; }
        else engAddRes(k, vc);
      }
    }
  }
  clearOfficeSprites();
  isShipping = true;
  showYearTransition(year, name, lm.cat);
  toast(name + ' ' + t('toastShipped') + ' +' + gain + ' ' + t('fame'));
  log('\uD83D\uDE80 ' + name + ' ' + t('toastShipped') + ' +' + gain + ' ' + t('fame'));
  // v10: victory message after shipping all 10 releases
  if (S.shipped >= RELEASE_YEARS.length) {
    setTimeout(() => {
      toast('\uD83C\uDFC6 You shipped through the entire history of computing!');
      log('\uD83C\uDFC6 Congratulations — all ' + RELEASE_YEARS.length + ' landmark releases shipped!');
    }, 2500);
  }
  playSfx('ship');
}

  }
  // v7.4: Recruiter upgrade buy
  const ruRow = e.target.closest('.ru-row');
  if (ruRow) {
    e.stopPropagation();
    buyRU(+ruRow.dataset.ui);
    updateRUSub();
    return;
  }
  // Coder equipment buy
  const euRow = e.target.closest('.eu-row');
  if (euRow) {
    const gi = +euRow.dataset.gi, ui = +euRow.dataset.ui;
    buyEU(gi, ui);
    updateEUSub(gi);
    return;
  }
  const up = e.target.closest('.up');
  if (up) {
    const a = up.dataset.a;
    // v6.8: per-tier 'g' buy disabled — tier rows are display-only; hiring is via Hire Pack
    if (a === 'c') buyClk(+up.dataset.i);
    else if (a === 'ss') buySS(+up.dataset.i);
    else if (a === 'f') buyFame(+up.dataset.b, +up.dataset.u);
    return;
  }
  // Launch bar click → ship confirmation
  if (e.target.closest('#progWrap') && document.getElementById('progWrap').classList.contains('ready')) {
    const cf = document.getElementById('shipConfirm');
    document.getElementById('shipWarnText').textContent = t('shipWarn');
    document.getElementById('shipYes').textContent = t('shipConfirm');
    document.getElementById('shipNo').textContent = t('shipCancel');
    cf.classList.toggle('show');
    // Dismiss tutorial on first click
    const tut = document.getElementById('shipTutorial');
    if (tut) tut.remove();
    return;
  }
  if (e.target.id === 'shipYes') { document.getElementById('shipConfirm').classList.remove('show'); ship(); return; }
  if (e.target.id === 'shipNo') { document.getElementById('shipConfirm').classList.remove('show'); return; }
});
