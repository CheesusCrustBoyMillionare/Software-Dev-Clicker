<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Dev Clicker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-ui);background-color:var(--bg-body);color:var(--text-primary);height:100vh;overflow:hidden;user-select:none}

/* v8.x: CSS Custom Properties — era theming foundation (on :root so era overrides cascade) */
:root{
  --bg-body:#0d1117;
  --bg-surface:#161b22;
  --bg-inset:#0d1117;
  --bg-hover:#1c2128;
  --border-primary:#30363d;
  --border-secondary:#21262d;
  --text-primary:#e6edf3;
  --text-secondary:#8b949e;
  --text-tertiary:#c9d1d9;
  --accent-blue:#58a6ff;
  --accent-green:#7ee787;
  --accent-orange:#f0883e;
  --accent-red:#da3633;
  --accent-red-bright:#f85149;
  --font-ui:'Segoe UI',system-ui,sans-serif;
  --font-mono:'Cascadia Code','Fira Code',monospace;
  --border-radius:6px;
  --scrollbar-thumb:#30363d;
}
.game{display:flex;flex-direction:column;height:100vh}
.hidden{display:none!important}

/* Top Bar */
.top-bar{position:relative;display:flex;justify-content:space-around;align-items:center;padding:10px 20px;background:var(--bg-surface);border-bottom:1px solid var(--border-primary)}
.stat{text-align:center}
.stat-val{font-size:1.4rem;font-weight:700;color:var(--accent-blue);font-variant-numeric:tabular-nums}
#dCat{font-size:1rem;color:var(--text-secondary)}
.stat-lbl{font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em}
.fame .stat-val{color:var(--accent-orange)}
/* v7.3: Engineer type tabs — persistent resource bar + active type toggle */
.tab-scroll-wrap{position:relative;display:flex;align-items:stretch;background:var(--bg-body);border-bottom:1px solid var(--border-primary)}
.type-tabs{display:flex;gap:6px;padding:6px 12px;background:var(--bg-body);overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--scrollbar-thumb) transparent;flex:1;min-width:0}
.type-tabs::-webkit-scrollbar{height:4px}.type-tabs::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
.tab-arrow{display:none;align-items:center;justify-content:center;width:28px;flex-shrink:0;background:var(--bg-surface);border:none;color:var(--text-secondary);font-size:1.1rem;cursor:pointer;z-index:2;padding:0;transition:opacity .2s}
.tab-arrow:hover{color:var(--text-primary);background:var(--bg-hover)}
.tab-arrow.visible{display:flex}
.tab-arrow-l{border-right:1px solid var(--border-primary)}
.tab-arrow-r{border-left:1px solid var(--border-primary)}
.eng-tab{min-width:110px;padding:6px 10px;background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:var(--border-radius);cursor:pointer;text-align:center;transition:background .15s,border-color .15s,transform .1s;flex-shrink:0}
.eng-tab:hover:not(.locked){background:var(--bg-hover);transform:translateY(-1px)}
.eng-tab.active{background:var(--bg-hover);border-width:2px;padding:5px 9px}
.eng-tab.locked{opacity:.4;cursor:not-allowed;background:var(--bg-body)}
.eng-tab.best-type{box-shadow:0 0 6px 1px rgba(240,136,62,.55);border-color:var(--accent-orange)}
.eng-tab .et-name{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.eng-tab .et-res{font-size:.85rem;font-weight:600;color:var(--text-tertiary);font-variant-numeric:tabular-nums;margin-top:2px}
.eng-tab .et-lps{font-size:.65rem;color:var(--accent-green);font-variant-numeric:tabular-nums;margin-top:1px}
.eng-tab .et-locked{font-size:.65rem;color:var(--text-secondary);margin-top:2px}
@media (max-width: 800px) {
  .type-tabs{padding:4px 6px;gap:3px}
  .eng-tab{min-width:90px;padding:4px 6px}
  .eng-tab .et-name{font-size:.65rem}
  .eng-tab .et-res{font-size:.75rem}
  .eng-tab .et-lps{font-size:.55rem}
}

/* Main Layout */
.main{display:flex;flex:1;overflow:hidden;position:relative}
.left{flex:1;min-width:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow:clip}
.left-log{width:clamp(160px,14vw,240px);min-width:140px;background:var(--bg-surface);border-right:1px solid var(--border-primary);display:flex;flex-direction:column;padding:10px;overflow:hidden;flex-shrink:1;position:relative;z-index:2}
.left-panel{width:clamp(200px,18vw,320px);min-width:160px;background:var(--bg-surface);border-right:1px solid var(--border-primary);overflow-y:auto;padding:10px;flex-shrink:1;position:relative;z-index:2}
.right{width:clamp(380px,32vw,620px);min-width:340px;background:var(--bg-surface);border-left:1px solid var(--border-primary);display:flex;flex-shrink:1;position:relative;z-index:2}
.right-roster{flex:1;min-width:0;display:flex;flex-direction:column;padding:10px;border-right:1px solid var(--border-secondary);overflow-y:auto}
.right-coders{flex:1;min-width:0;overflow-y:auto;padding:10px}

/* Desk Scene */
.desk-scene{position:relative;display:flex;flex-direction:column;align-items:center;transform:scale(var(--desk-scale,1));transform-origin:top center}
.monitor{cursor:pointer;position:relative;z-index:2}
.monitor:active .screen{transform:scale(.96)}
.computer-housing{position:relative;display:inline-block}
.computer-extra{display:none}
.screen{width:clamp(180px,15vw,260px);height:clamp(120px,10vw,170px);background:var(--bg-hover);border:3px solid #444c56;border-radius:10px 10px 6px 6px;display:flex;align-items:flex-end;justify-content:flex-start;font-family:var(--font-mono);font-size:.65rem;color:var(--accent-green);padding:8px 10px;line-height:1.4;white-space:pre;overflow:hidden;transition:transform .1s,box-shadow .15s}
.screen.pulse{box-shadow:0 0 20px rgba(88,166,255,.33)}
.stand{width:50px;height:14px;background:linear-gradient(#444c56,#3a424b);margin:0 auto}
.base{width:90px;height:5px;background:#444c56;margin:0 auto;border-radius:0 0 3px 3px}

/* Desk */
.desk{width:clamp(260px,22vw,380px);height:10px;background:linear-gradient(180deg,#6b4226,#5a3520);border-radius:2px;margin-top:-1px;z-index:1;position:relative;box-shadow:0 3px 8px rgba(0,0,0,.4)}
.desk::after{content:'';display:block;width:300px;height:5px;background:linear-gradient(180deg,#5a3520,#4a2a18);margin:0 auto;border-radius:0 0 2px 2px}
.desk-scene.has-standing .desk{height:14px}
.desk-scene.has-standing .desk::before{content:'';position:absolute;top:100%;left:40px;width:6px;height:36px;background:linear-gradient(90deg,#5a3520,#4a2a18);border-radius:0 0 2px 2px}
.desk-scene.has-standing .desk::after{position:absolute;top:100%;right:40px;left:auto;width:6px;height:36px;margin:0;border-radius:0 0 2px 2px}

/* Era: Apple II (1979-1980) — beige all-in-one box */
.era-apple2 .computer-housing{background:#d4c8a0;border:3px solid #b8a878;border-radius:8px;padding:10px 12px 6px}
.era-apple2 .screen{border-color:#2a2a1a;border-radius:6px}
.era-apple2 .stand{display:none}
.era-apple2 .base{width:248px;height:18px;background:linear-gradient(180deg,#c8bc90,#b8a878);border-radius:0 0 4px 4px}
.era-apple2 .base::before{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:180px;height:3px;background:#a89868;border-radius:1px}
/* Era: MS-DOS IBM PC (1981-1989) — beige box with floppy slots */
.era-dos .computer-housing{background:#c8be98;border:3px solid #a89870;border-radius:4px;padding:10px 12px 6px;position:relative}
.era-dos .computer-housing::before{content:'';position:absolute;top:8px;right:8px;width:14px;height:2px;background:#999;border-radius:1px}
.era-dos .computer-housing::after{content:'';position:absolute;top:14px;right:8px;width:14px;height:2px;background:#999;border-radius:1px}
.era-dos .screen{border-color:#333;border-radius:3px;background:#000;color:#55ff55}
.era-dos .stand{display:none}
.era-dos .base{width:248px;height:20px;background:linear-gradient(180deg,#b8a878,#a89868);border-radius:0 0 3px 3px}
.era-dos .base::before{content:'';position:absolute;bottom:4px;right:12px;width:4px;height:4px;background:#2a2;border-radius:50%}
/* Era: Windows 3.x (1990-1994) — beige CRT + base box */
.era-win3x .computer-housing{background:#d0c8a8;border:3px solid #b8b090;border-radius:8px;padding:12px 14px 6px;position:relative}
.era-win3x .computer-housing::after{content:'';position:absolute;bottom:4px;right:12px;width:5px;height:5px;background:#080;border-radius:50%}
.era-win3x .screen{border-color:#444;border-radius:8px}
.era-win3x .stand{width:200px;height:8px;background:linear-gradient(180deg,#c8c0a0,#b8b090);margin:0 auto}
.era-win3x .base{width:240px;height:16px;background:linear-gradient(180deg,#c8c0a0,#b8b090);border-radius:0 0 4px 4px}
/* Era: Windows 95 (1995-1997) — CRT monitor + tower */
.era-win95 .computer-housing{background:#d8d0b8;border:4px solid #c0b898;border-radius:10px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.era-win95 .screen{border-color:#555;border-radius:8px}
.era-win95 .stand{width:60px;height:16px;background:linear-gradient(#c0b898,#b0a888);margin:0 auto}
.era-win95 .base{width:120px;height:5px;background:#b0a888;border-radius:0 0 3px 3px}
.era-win95 .computer-extra{display:block;position:absolute;right:-52px;bottom:0;width:34px;height:88px;background:linear-gradient(90deg,#d8d0b8,#c8c0a8);border:2px solid #b0a888;border-radius:2px;z-index:1}
.era-win95 .computer-extra::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:14px;height:3px;background:#555;border-radius:1px}
.era-win95 .computer-extra::after{content:'';position:absolute;top:20px;left:50%;transform:translateX(-50%);width:5px;height:5px;background:#2a2;border-radius:50%}
/* Era: Windows 98 (1998-2000) — off-white CRT + taller tower */
.era-win98 .computer-housing{background:#d4ceb8;border:3px solid #bab49e;border-radius:10px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.era-win98 .screen{border-color:#555;border-radius:6px}
.era-win98 .stand{width:60px;height:14px;background:linear-gradient(#bab49e,#aaa898);margin:0 auto}
.era-win98 .base{width:110px;height:5px;background:#aaa898;border-radius:0 0 3px 3px}
.era-win98 .computer-extra{display:block;position:absolute;right:-52px;bottom:0;width:36px;height:96px;background:linear-gradient(90deg,#d4ceb8,#c4bea8);border:2px solid #aaa898;border-radius:2px;z-index:1}
.era-win98 .computer-extra::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:16px;height:2px;background:#555;border-radius:1px}
.era-win98 .computer-extra::after{content:'';position:absolute;top:16px;left:50%;transform:translateX(-50%);width:5px;height:5px;background:#2a2;border-radius:50%}
/* Era: Windows XP (2001-2009) — silver/black tower + early LCD */
.era-winxp .computer-housing{background:#333;border:3px solid #555;border-radius:4px;padding:4px 6px 14px;position:relative}
.era-winxp .computer-housing::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:30px;height:2px;background:#888;border-radius:1px}
.era-winxp .screen{border-color:#222;border-radius:2px;border-width:2px}
.era-winxp .stand{width:16px;height:22px;background:linear-gradient(90deg,#888,#aaa,#888);margin:0 auto}
.era-winxp .base{width:80px;height:4px;background:linear-gradient(90deg,#777,#999,#777);border-radius:0 0 2px 2px}
.era-winxp .computer-extra{display:block;position:absolute;right:-48px;bottom:0;width:32px;height:80px;background:linear-gradient(90deg,#c0c0c0,#d0d0d0,#c0c0c0);border:2px solid #aaa;border-radius:3px;z-index:1}
.era-winxp .computer-extra::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:12px;height:2px;background:#666;border-radius:1px}
.era-winxp .computer-extra::after{content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);width:5px;height:5px;background:#4a4;border-radius:50%}
/* Era: Windows 7 (2010-2014) — glossy black LCD, thin bezel */
.era-win7 .computer-housing{background:#222;border:2px solid #444;border-radius:3px;padding:4px 6px 16px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.era-win7 .computer-housing::after{content:'';position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:24px;height:2px;background:#555;border-radius:1px}
.era-win7 .screen{border-color:#111;border-radius:2px;border-width:2px}
.era-win7 .stand{width:12px;height:24px;background:linear-gradient(90deg,#444,#555,#444);margin:0 auto}
.era-win7 .base{width:60px;height:4px;background:linear-gradient(90deg,#333,#444,#333);border-radius:0 0 2px 2px}
/* Era: Windows 10 (2015-2021) — thin bezel modern LCD */
.era-win10 .computer-housing{background:#1a1a1a;border:2px solid #333;border-radius:3px;padding:3px 5px 14px;position:relative}
.era-win10 .computer-housing::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:18px;height:2px;background:#555;border-radius:1px}
.era-win10 .screen{border-color:#1a1a1a;border-width:1px;border-radius:1px}
.era-win10 .stand{width:10px;height:24px;background:linear-gradient(90deg,#333,#444,#333);margin:0 auto}
.era-win10 .base{width:55px;height:3px;background:#333;border-radius:0 0 2px 2px}
/* Era: Windows 11 (2022+) — ultrawide dark monitor */
.era-win11 .computer-housing{background:#111;border:2px solid #222;border-radius:4px;padding:3px 22px}
.era-win11 .screen{border-color:#1a1a1a;border-width:2px;border-radius:2px}
.era-win11 .stand{width:8px;height:26px;background:linear-gradient(90deg,#2a2a2a,#333,#2a2a2a);margin:0 auto}
.era-win11 .base{width:50px;height:3px;background:#2a2a2a;border-radius:2px}

/* Era Theme: Apple II */
.era-apple2{
  font-size:15px;
  --bg-body:#0a0a00;--bg-surface:#1a1a08;--bg-inset:#060600;--bg-hover:#242410;
  --border-primary:#3a3a18;--border-secondary:#2a2a10;
  --text-primary:#33ff33;--text-secondary:#22aa22;--text-tertiary:#44dd44;
  --accent-blue:#33ff33;--accent-green:#33ff33;--accent-orange:#88ff33;
  --accent-red:#ff4444;--accent-red-bright:#ff6666;
  --font-ui:'Press Start 2P','Courier New',monospace;
  --font-mono:'Press Start 2P','Courier New',monospace;
  --border-radius:2px;--scrollbar-thumb:#3a3a18;
}
.era-apple2 body{background-color:#0a0a00}
.era-apple2 .screen{background:#020200;color:#33ff33;text-shadow:0 0 4px #33ff3366}
.era-apple2 .top-bar{text-shadow:0 0 3px #33ff3344}
.era-apple2 .st-btn{border-color:#33ff33;color:#33ff33}

/* Era Theme: MS-DOS (1981-1989) */
.era-dos{
  font-size:20px;
  --bg-body:#0000aa;--bg-surface:#0000cc;--bg-inset:#000088;--bg-hover:#0000dd;
  --border-primary:#5555ff;--border-secondary:#3333cc;
  --text-primary:#ffffff;--text-secondary:#aaaaaa;--text-tertiary:#ffffff;
  --accent-blue:#5555ff;--accent-green:#55ff55;--accent-orange:#ffff55;
  --accent-red:#ff5555;--accent-red-bright:#ff7777;
  --font-ui:VT323,'Courier New',monospace;
  --font-mono:VT323,'Courier New',monospace;
  --border-radius:0px;--scrollbar-thumb:#5555ff;
}
.era-dos body{background-color:#0000aa}
.era-dos .top-bar{background:#000088;border-bottom:1px solid #5555ff}
.era-dos .top-bar .stat-val,.era-dos .top-bar .stat-lbl{color:#ffff55}
.era-dos .top-bar .fame .stat-val{color:#55ff55}
.era-dos .up{border:1px solid #5555ff;background:#0000aa}
.era-dos .eng-tab{border:1px solid #5555ff;border-radius:0}
.era-dos .eng-tab.active{background:#0000dd}
.era-dos .screen{background:#000;color:#55ff55;text-shadow:0 0 3px #55ff5544;border-color:#5555ff}
.era-dos .st-btn,.era-dos .ach-btn{border-color:#5555ff;color:#ffff55;background:#000088;border-radius:0}
.era-dos .left-log,.era-dos .left-panel,.era-dos .right{border-color:#5555ff}
.era-dos .tab-scroll-wrap{background:#000088;border-bottom:1px solid #5555ff}
.era-dos .type-tabs{background:#000088}
.era-dos .tab-arrow{background:#000088;color:#5555ff}
.era-dos .sec{border-color:#5555ff}

/* Era Theme: Windows 3.x (1990-1994) */
.era-win3x{
  font-size:18px;
  --bg-body:#c0c0c0;--bg-surface:#ffffff;--bg-inset:#ffffff;--bg-hover:#dfdfdf;
  --border-primary:#808080;--border-secondary:#c0c0c0;
  --text-primary:#000000;--text-secondary:#404040;--text-tertiary:#000000;
  --accent-blue:#000080;--accent-green:#008000;--accent-orange:#808000;
  --accent-red:#800000;--accent-red-bright:#cc0000;
  --font-ui:Arial,'MS Sans Serif',Helvetica,sans-serif;
  --font-mono:'Courier New',monospace;
  --border-radius:0px;--scrollbar-thumb:#808080;
}
.era-win3x body{background-color:#c0c0c0}
.era-win3x .top-bar{background:#000080;border-bottom:2px solid #c0c0c0}
.era-win3x .top-bar .stat-val,.era-win3x .top-bar .stat-lbl{color:#ffffff}
.era-win3x .top-bar .fame .stat-val{color:#ffff00}
.era-win3x .up{border:2px outset #dfdfdf;background:#c0c0c0}
.era-win3x .up:hover{border-style:inset}
.era-win3x .eng-tab{border:2px outset #dfdfdf;border-radius:0}
.era-win3x .eng-tab.active{border-style:inset}
.era-win3x .screen{border:2px inset #808080;background:#fff;color:#000}
.era-win3x .st-btn,.era-win3x .ach-btn{border:2px outset #dfdfdf;color:#000;background:#c0c0c0;border-radius:0}
.era-win3x .left-log,.era-win3x .left-panel,.era-win3x .right{border-color:#808080}
.era-win3x .tab-scroll-wrap{background:#c0c0c0;border-bottom:2px solid #808080}
.era-win3x .type-tabs{background:#c0c0c0}
.era-win3x .tab-arrow{background:#c0c0c0;color:#000}
.era-win3x .sec{border-color:#808080}

/* Era Theme: Windows 95 (1995-1997) — KEEP, year range adjusted */
.era-win95{
  font-size:18px;
  --bg-body:#008080;--bg-surface:#c0c0c0;--bg-inset:#ffffff;--bg-hover:#d4d0c8;
  --border-primary:#808080;--border-secondary:#dfdfdf;
  --text-primary:#000000;--text-secondary:#404040;--text-tertiary:#000000;
  --accent-blue:#000080;--accent-green:#008000;--accent-orange:#808000;
  --accent-red:#800000;--accent-red-bright:#cc0000;
  --font-ui:Tahoma,'MS Sans Serif',Arial,sans-serif;
  --font-mono:'Courier New',monospace;
  --border-radius:0px;--scrollbar-thumb:#c0c0c0;
}
.era-win95 body{background-color:#008080}
.era-win95 .top-bar{background:linear-gradient(90deg,#000080,#1084d0);border-bottom:2px outset #dfdfdf}
.era-win95 .top-bar .stat-val,.era-win95 .top-bar .stat-lbl{color:#ffffff}
.era-win95 .top-bar .fame .stat-val{color:#ffff00}
.era-win95 .up{border:2px outset #dfdfdf;background:#c0c0c0}
.era-win95 .up:hover{border-style:inset}
.era-win95 .eng-tab{border:2px outset #dfdfdf;border-radius:0}
.era-win95 .eng-tab.active{border-style:inset}
.era-win95 .screen{border:2px inset #808080}
.era-win95 .st-btn,.era-win95 .ach-btn{border:2px outset #dfdfdf;color:#000;background:#c0c0c0;border-radius:0}
.era-win95 .left-log,.era-win95 .left-panel,.era-win95 .right{border-color:#808080}
.era-win95 .tab-scroll-wrap{background:#c0c0c0;border-bottom:2px solid #808080}
.era-win95 .type-tabs{background:#c0c0c0}
.era-win95 .tab-arrow{background:#c0c0c0;color:#000}
.era-win95 .sec{border-color:#808080}
.era-win95 .start-btn{background:#c0c0c0;border:2px outset #dfdfdf;color:#000;font-family:Tahoma,sans-serif;border-radius:0;padding:6px 10px}
.era-win95 .start-menu.open{border:2px outset #dfdfdf;border-bottom:none;border-radius:0;background:#c0c0c0}
.era-win95 .start-menu-item{color:#000}
.era-win95 .start-menu-item:hover{background:#000080;color:#fff}
/* Win95: force black text on grey surfaces — matches system menu style */
.era-win95 .eng-tab .et-name{color:#000!important}
.era-win95 .eng-tab.active .et-name{color:#000080!important}
.era-win95 .ship-res-row .srn span:first-child{color:#000!important}
.era-win95 .ship-res-row.active-type .srn span:first-child{color:#000080!important}
.era-win95 .middle{color:#000}
.era-win95 .click-info{color:#000!important}
.era-win95 .click-power{color:#000080!important}
.era-win95 .fame-mult{color:#808000!important}
.era-win95 .left-panel,.era-win95 .right{color:#000}
.era-win95 .log-entry{color:#000}
.era-win95 .sec-label{color:#000!important}
.era-win95 .sec-cost{color:#000!important}
.era-win95 .up-name{color:#000!important}
.era-win95 .up-cost{color:#000!important}

/* Era Theme: Windows 98 (1998-2000) */
.era-win98{
  font-size:18px;
  --bg-body:#3a6ea5;--bg-surface:#d4d0c8;--bg-inset:#ffffff;--bg-hover:#e0dcd4;
  --border-primary:#808080;--border-secondary:#d4d0c8;
  --text-primary:#000000;--text-secondary:#404040;--text-tertiary:#000000;
  --accent-blue:#003399;--accent-green:#008000;--accent-orange:#ff6600;
  --accent-red:#cc0000;--accent-red-bright:#ff0000;
  --font-ui:Tahoma,'MS Sans Serif',Arial,sans-serif;
  --font-mono:'Courier New','Lucida Console',monospace;
  --border-radius:2px;--scrollbar-thumb:#aca899;
}
.era-win98 body{background-color:#3a6ea5}
.era-win98 .top-bar{background:linear-gradient(90deg,#000080,#1084d0);border-bottom:2px outset #dfdfdf}
.era-win98 .top-bar .stat-val,.era-win98 .top-bar .stat-lbl{color:#ffffff}
.era-win98 .top-bar .fame .stat-val{color:#ffff00}
.era-win98 .up{border:2px outset #dfdfdf;background:#d4d0c8}
.era-win98 .up:hover{border-style:inset}
.era-win98 .eng-tab{border:2px outset #dfdfdf;border-radius:0}
.era-win98 .eng-tab.active{border-style:inset;background:#d4d0c8}
.era-win98 .screen{border:2px inset #808080}
.era-win98 .st-btn,.era-win98 .ach-btn{border:2px outset #dfdfdf;color:#000;background:#d4d0c8;border-radius:2px}
.era-win98 .left-log,.era-win98 .left-panel,.era-win98 .right{border-color:#808080}
.era-win98 .tab-scroll-wrap{background:#d4d0c8;border-bottom:2px solid #808080}
.era-win98 .type-tabs{background:#d4d0c8}
.era-win98 .tab-arrow{background:#d4d0c8;color:#000}
.era-win98 .sec{border-color:#808080}
.era-win98 .start-btn{background:#d4d0c8;border:2px outset #dfdfdf;color:#000;font-family:Tahoma,sans-serif;border-radius:0;padding:6px 10px}
.era-win98 .start-menu.open{border:2px outset #dfdfdf;border-bottom:none;border-radius:0;background:#d4d0c8}
.era-win98 .start-menu-item{color:#000}
.era-win98 .start-menu-item:hover{background:#000080;color:#fff}

/* Era Theme: Windows XP (2001-2009) — KEEP, year range expanded */
.era-winxp{
  font-size:18px;
  --bg-body:#3a6ea5;--bg-surface:#ece9d8;--bg-inset:#ffffff;--bg-hover:#d6d2c2;
  --border-primary:#7f9db9;--border-secondary:#aca899;
  --text-primary:#000000;--text-secondary:#444444;--text-tertiary:#222222;
  --accent-blue:#003399;--accent-green:#006600;--accent-orange:#ff6600;
  --accent-red:#cc0000;--accent-red-bright:#ff0000;
  --font-ui:Tahoma,'Segoe UI',sans-serif;
  --font-mono:'Courier New','Lucida Console',monospace;
  --border-radius:4px;--scrollbar-thumb:#aca899;
}
.era-winxp body{background-color:#3a6ea5}
.era-winxp .top-bar{background:linear-gradient(180deg,#0a246a,#3a6ea5);border-bottom:1px solid #0a246a;padding:8px 20px;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.era-winxp .top-bar .stat-val,.era-winxp .top-bar .stat-lbl{color:#ffffff}
.era-winxp .top-bar .fame .stat-val{color:#ffcc00}
.era-winxp .eng-tab{border-radius:6px 6px 0 0;border-bottom:none}
.era-winxp .up{background:#ece9d8;border:1px solid #aca899}
.era-winxp .screen{border:2px solid #7f9db9;border-radius:2px}
.era-winxp .st-btn,.era-winxp .ach-btn{border-color:#003399;color:#003399;background:linear-gradient(180deg,#fff,#ece9d8)}
.era-winxp .tab-scroll-wrap{background:#ece9d8;border-bottom:1px solid #aca899}
.era-winxp .type-tabs{background:#ece9d8}
.era-winxp .tab-arrow{background:#ece9d8;color:#003399}
.era-winxp .start-btn{background:linear-gradient(180deg,#3c8f3c,#2d7b2d);border:1px solid #1e5a1e;border-radius:10px;color:#fff;font-family:Tahoma,sans-serif;padding:6px 12px}
.era-winxp .start-menu.open{border:2px solid #003399;border-bottom:none;border-radius:4px 4px 0 0;background:#fff}
.era-winxp .start-menu-item:hover{background:#316ac5;color:#fff}

/* Era Theme: Windows 7 (2010-2014) — Aero glass aesthetic */
.era-win7{
  font-size:18px;
  --bg-body:#1d4e89;--bg-surface:#f0f0f0;--bg-inset:#ffffff;--bg-hover:#e5e5e5;
  --border-primary:#8db2e3;--border-secondary:#c0c0c0;
  --text-primary:#1e1e1e;--text-secondary:#555555;--text-tertiary:#333333;
  --accent-blue:#2672ec;--accent-green:#35a853;--accent-orange:#f09020;
  --accent-red:#d93025;--accent-red-bright:#e94235;
  --font-ui:'Segoe UI',Arial,sans-serif;
  --font-mono:Consolas,'Courier New',monospace;
  --border-radius:6px;--scrollbar-thumb:#b0b0b0;
}
.era-win7 body{background-color:#1d4e89}
.era-win7 .top-bar{background:linear-gradient(180deg,rgba(120,170,230,.85),rgba(60,120,200,.75));border-bottom:1px solid #4a80c0;box-shadow:0 1px 4px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.25);backdrop-filter:blur(4px)}
.era-win7 .top-bar .stat-val,.era-win7 .top-bar .stat-lbl{color:#ffffff;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.era-win7 .top-bar .fame .stat-val{color:#ffd700}
.era-win7 .eng-tab{border-radius:6px 6px 0 0;background:linear-gradient(180deg,#fafafa,#e8e8e8);box-shadow:0 -1px 3px rgba(0,0,0,.06)}
.era-win7 .eng-tab.active{background:linear-gradient(180deg,#fff,#f0f0f0)}
.era-win7 .up{background:linear-gradient(180deg,#fafafa,#e8e8e8);border:1px solid #c0c0c0;border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.era-win7 .up:hover{background:linear-gradient(180deg,#e8f0fe,#d4e4fc)}
.era-win7 .screen{border:2px solid #6a9fd8;border-radius:3px}
.era-win7 .st-btn,.era-win7 .ach-btn{background:linear-gradient(180deg,#fff,#f0f0f0);border:1px solid #b0b0b0;color:#1e1e1e;border-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.era-win7 .left-panel,.era-win7 .left-log,.era-win7 .right{box-shadow:1px 0 3px rgba(0,0,0,.06)}
.era-win7 .tab-scroll-wrap{background:#e8e8e8;border-bottom:1px solid #c0c0c0}
.era-win7 .type-tabs{background:#e8e8e8}
.era-win7 .tab-arrow{background:#e8e8e8;color:#333}
.era-win7 .start-btn{background:linear-gradient(180deg,rgba(120,170,230,.8),rgba(60,120,200,.7));border:1px solid #4a80c0;border-radius:6px;color:#fff;backdrop-filter:blur(2px)}
.era-win7 .start-menu.open{background:rgba(240,240,240,.95);backdrop-filter:blur(8px);border:1px solid #8db2e3;border-bottom:none;border-radius:6px 6px 0 0}
.era-win7 .start-menu-item:hover{background:rgba(0,100,200,.12)}

/* Era Theme: Windows 10 (2015-2021) — Light Mode Classic */
.era-win10{
  font-size:18px;
  --bg-body:#cde4f7;--bg-surface:#ffffff;--bg-inset:#ffffff;--bg-hover:#f0f0f0;
  --border-primary:#e1e1e1;--border-secondary:#d6d6d6;
  --text-primary:#1a1a1a;--text-secondary:#5a5a5a;--text-tertiary:#333333;
  --accent-blue:#0078d4;--accent-green:#107c10;--accent-orange:#f7630c;
  --accent-red:#e81123;--accent-red-bright:#ff4343;
  --font-ui:'Segoe UI',system-ui,sans-serif;
  --font-mono:Consolas,'Courier New',monospace;
  --border-radius:2px;--scrollbar-thumb:#c8c8c8;
}
.era-win10 body{background-color:#cde4f7}
.era-win10 .top-bar{background:#f2f2f2;border-bottom:1px solid #d6d6d6;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.era-win10 .top-bar .stat-val,.era-win10 .top-bar .stat-lbl{color:#1a1a1a}
.era-win10 .top-bar .fame .stat-val{color:#b87800}
.era-win10 .eng-tab{border-radius:0;border-bottom:2px solid transparent;background:#f8f8f8}
.era-win10 .eng-tab.active{border-bottom-color:#0078d4;background:#fff}
.era-win10 .up{background:#fff;border:1px solid #e1e1e1;border-radius:2px}
.era-win10 .up:hover{background:#f5f5f5}
.era-win10 .screen{border:1px solid #d6d6d6;border-radius:0}
.era-win10 .st-btn,.era-win10 .ach-btn{background:#0078d4;border:1px solid #0078d4;color:#fff;border-radius:2px}
.era-win10 .st-btn:hover,.era-win10 .ach-btn:hover{background:#106ebe;border-color:#106ebe}
.era-win10 .left-log,.era-win10 .left-panel,.era-win10 .right{border-color:#e1e1e1}
.era-win10 .tab-scroll-wrap{background:#f5f5f5;border-bottom:1px solid #e1e1e1}
.era-win10 .type-tabs{background:#f5f5f5}
.era-win10 .tab-arrow{background:#f5f5f5;color:#0078d4}
.era-win10 .sec{border-color:#e1e1e1}
.era-win10 .start-btn{background:#0078d4;border:none;border-radius:0;color:#fff}
.era-win10 .start-btn:hover{filter:brightness(1.1)}
.era-win10 .start-menu.open{background:#f2f2f2;border:1px solid #d6d6d6;border-bottom:none;border-radius:0;box-shadow:0 -4px 16px rgba(0,0,0,.1)}
.era-win10 .start-menu-item{color:#1a1a1a}
.era-win10 .start-menu-item:hover{background:#e5e5e5}

/* Era Theme: Windows 11 (2022+) — Fluent 2 / Mica dark aesthetic */
.era-win11{
  font-size:18px;
  --border-radius:8px;--scrollbar-thumb:#555;
  --font-ui:'Segoe UI',system-ui,sans-serif;
  --font-mono:Consolas,'Cascadia Code','Courier New',monospace;
}
.era-win11 .top-bar{background:rgba(32,32,32,.85);backdrop-filter:blur(8px);border-radius:0 0 8px 8px;border-bottom:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.era-win11 .eng-tab{border-radius:8px}
.era-win11 .up{border-radius:8px}
.era-win11 .st-btn,.era-win11 .ach-btn{border-radius:8px}
.era-win11 .start-btn{background:linear-gradient(135deg,#0078d4,#0063b1);border:none;border-radius:8px;color:#fff}
.era-win11 .start-menu.open{background:rgba(44,44,44,.95);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-bottom:none;border-radius:8px 8px 0 0}
.era-win11 .start-menu-item{color:#fff;border-radius:4px;margin:2px 4px}
.era-win11 .start-menu-item:hover{background:rgba(255,255,255,.08)}

/* Era transitions — smooth morph when crossing era boundaries */
.top-bar,.tab-scroll-wrap,.type-tabs,.tab-arrow,.eng-tab,.left-log,.left-panel,.right,.up,
.st-btn,.ach-btn,.start-btn,.start-menu,.sec,body{
  transition:background-color .6s ease,border-color .6s ease,color .4s ease,box-shadow .6s ease;
}

/* Rarity contrast fixes for light eras (dark-bg eras: apple2, dos, win11 don't need this) */
.era-win3x .r-u,.era-win95 .r-u,.era-win98 .r-u,.era-winxp .r-u,.era-win7 .r-u,.era-win10 .r-u{color:#0a7a1a}
.era-win3x .r-r,.era-win95 .r-r,.era-win98 .r-r,.era-winxp .r-r,.era-win7 .r-r,.era-win10 .r-r{color:#0050a0}
.era-win3x .r-e,.era-win95 .r-e,.era-win98 .r-e,.era-winxp .r-e,.era-win7 .r-e,.era-win10 .r-e{color:#8a00a0}
.era-win3x .r-l,.era-win95 .r-l,.era-win98 .r-l,.era-winxp .r-l,.era-win7 .r-l,.era-win10 .r-l{color:#b87800}

/* Perk Items */
.perk-item{display:none;position:absolute;pointer-events:none;z-index:3;transition:opacity .3s}
.perk-item.active{display:block}
@keyframes perkPop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.perk-energy{top:2px;left:16px;font-size:1rem}
.perk-lunch{top:2px;right:16px;font-size:1.1rem}
.perk-daycare{bottom:-20px;left:-14px;font-size:1.3rem}
.perk-gym{bottom:-20px;right:-14px;font-size:1.2rem}
.perk-gameroom{top:2px;left:70px;font-size:1.1rem}
.perk-pto{top:-20px;right:-24px;font-size:1.5rem}
.perk-nap{bottom:-20px;right:30px;font-size:1.2rem}
.perk-retreat{top:2px;right:70px;font-size:1rem}

/* Office Floor */
.office-floor{width:clamp(260px,22vw,380px);display:flex;flex-direction:column;gap:1px;padding:4px 0;margin-top:2px;min-height:0}
.coder-sprite{width:28px;height:24px;cursor:pointer;position:relative}
.coder-sprite svg{animation:coderType 1.5s ease-in-out infinite}
.coder-sprite:nth-child(odd) svg{animation-delay:-.75s}
.coder-sprite:nth-child(3n) svg{animation-delay:-.5s}
.coder-sprite.r-u svg{filter:drop-shadow(0 0 2px var(--accent-green))}
.coder-sprite.r-r svg{filter:drop-shadow(0 0 3px var(--accent-blue))}
.coder-sprite.r-e svg{filter:drop-shadow(0 0 4px #bc8cff)}
.coder-sprite.r-l svg{filter:drop-shadow(0 0 6px var(--accent-orange))}
.coder-sprite.empty svg{animation:none;opacity:.45}
.coder-row.empty-row{opacity:.65}
@keyframes coderType{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}

/* Staff Inline Sprites — next to buy buttons */
.staff-sprite-inline{display:inline-flex;align-items:center;width:24px;height:20px;flex-shrink:0;cursor:pointer;opacity:0;transition:opacity .3s;pointer-events:none;position:relative}
.staff-sprite-inline.active{opacity:1;pointer-events:auto}
.staff-sprite-inline.paused{opacity:.4;filter:grayscale(.6)}

/* Coder type rows */
.coder-row{display:flex;flex-wrap:nowrap;align-items:center;gap:2px;min-height:0;overflow-x:clip;max-width:320px}
.coder-row-label{font-size:.5rem;color:var(--text-secondary);width:8px;text-align:center;flex-shrink:0;writing-mode:vertical-lr;transform:rotate(180deg);letter-spacing:.02em;opacity:.6}

/* Sprite Tooltip */
.sprite-tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:4px;padding:3px 6px;font-size:.6rem;color:var(--text-primary);white-space:nowrap;pointer-events:none;z-index:20;opacity:0;transition:opacity .15s;text-align:center;line-height:1.3}
.sprite-tip b{color:#f0f6fc}
.sprite-tip .tip-fact{color:var(--text-secondary);font-style:italic}
.coder-sprite:hover .sprite-tip,.staff-sprite-inline:hover .sprite-tip{opacity:1}

/* Pet dog auto-clicker */
.pet-dog{position:absolute;bottom:-16px;right:-56px;font-size:2.8rem;opacity:0;transition:opacity .4s;pointer-events:none;z-index:3}
.pet-dog.active{opacity:1;pointer-events:auto;cursor:pointer}
.pet-dog.paw{animation:pawTap .3s ease}
@keyframes pawTap{0%{transform:scaleX(-1) translateY(0)}40%{transform:scaleX(-1) translateY(-6px)}100%{transform:scaleX(-1) translateY(0)}}
.pet-bark{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:6px;padding:2px 6px;font-size:.65rem;color:var(--text-primary);white-space:nowrap;pointer-events:none;z-index:20;opacity:0;transition:opacity .15s}
.pet-bark.show{opacity:1}
.click-info{color:var(--text-secondary);font-size:1.6rem}
.lang-bar{display:flex;justify-content:center;gap:8px;margin-top:12px}
.lang-btn{background:none;border:2px solid transparent;border-radius:6px;font-size:1.4rem;cursor:pointer;padding:4px 8px;opacity:.6;transition:opacity .15s,border-color .15s}
.lang-btn:hover{opacity:.9}
.lang-btn.active{opacity:1;border-color:var(--accent-blue)}
.click-power{color:var(--accent-blue);font-size:1.7rem;font-weight:600}
.fame-mult{color:var(--accent-orange);font-size:1.5rem}

/* Floating +LoC */
.float{position:fixed;pointer-events:none;color:var(--accent-green);font-weight:700;font-size:1rem;z-index:50;animation:floatUp .7s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}

/* Upgrade Sections */
.sec{font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px;padding-bottom:3px;border-bottom:1px solid var(--border-primary)}
.streak-thermo{position:absolute;right:-38px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;transition:opacity .15s}
.thermo-label{font-size:.65rem;font-weight:700;color:var(--accent-orange);white-space:nowrap}
.thermo-track{width:10px;height:80px;background:var(--border-secondary);border-radius:5px;border:1px solid var(--border-primary);position:relative;overflow:hidden}
.thermo-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,#f04040,#f07030,#f0883e,#f0c040);border-radius:0 0 4px 4px;transition:height .08s}
.thermo-tick{position:absolute;left:0;right:0;height:1px;background:#484f5866}
.thermo-bulb{width:16px;height:16px;border-radius:50%;background:#f04040;border:1px solid var(--border-primary);box-shadow:0 0 0 0 #f0404000;transition:background .3s,box-shadow .3s}
.thermo-bulb.hot{background:#f04040;box-shadow:0 0 8px 2px #f0404066}
.thermo-bulb.warm{background:var(--accent-orange);box-shadow:0 0 6px 1px #f0883e44}
.thermo-bulb.cool{background:#484f58}
.sec:first-child{margin-top:0}

/* Upgrade Rows */
.up{display:flex;align-items:center;gap:8px;padding:7px 8px;margin:3px 0;background:var(--bg-body);border:1px solid var(--border-secondary);border-radius:var(--border-radius);cursor:pointer;transition:border-color .15s,opacity .15s}
.up:hover{border-color:var(--accent-blue)}
.up.no{opacity:.45;cursor:default}
.up.no:hover{border-color:var(--border-secondary)}
.up.hide{display:none}
.up-info{flex:1;min-width:0}
.up-name{font-size:.8rem;font-weight:600;word-break:break-word}
.up-desc{font-size:.7rem;color:var(--text-secondary);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.up-cost{font-size:.8rem;font-weight:600;color:var(--accent-blue);text-align:right;white-space:nowrap;min-width:44px;font-variant-numeric:tabular-nums}
.up-cost.fame{color:var(--accent-orange)}
.up-own{font-size:.7rem;color:var(--text-secondary);min-width:24px;text-align:right;font-variant-numeric:tabular-nums}
.up-rate{font-size:.68rem;color:var(--accent-green);text-align:right;min-width:40px;white-space:nowrap;font-variant-numeric:tabular-nums}
.right-coders .up{flex-wrap:wrap}
.right-coders .up-info{flex-basis:100%;min-width:0}
.right-coders .up-cost{margin-left:auto}
.right-coders .up-cost:empty{display:none}
.right-coders .pack-header,.right-coders .office-header{flex-direction:column;align-items:stretch;gap:4px;padding:8px 10px}
.right-coders .pack-header .pack-info,.right-coders .office-header .pack-info{min-width:0}
.right-coders .pack-header .pack-cost,.right-coders .office-header .pack-cost{text-align:right;font-size:.75rem}
.up.best{border-color:#2ea043;box-shadow:0 0 8px #2ea04355}
.up.maxed{opacity:.6;cursor:default;border-color:#2ea04366}
.up.maxed:hover{border-color:#2ea04366}
.up.maxed .up-own{color:#2ea043}

/* v6.8 Hire Pack button */
.pack-header{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:6px 0 10px;background:linear-gradient(135deg,var(--bg-surface),var(--bg-body));border:1px solid var(--border-primary);border-radius:var(--border-radius);cursor:pointer;transition:border-color .15s,background .15s}
.pack-header:hover{border-color:var(--accent-blue);background:linear-gradient(135deg,var(--bg-hover),var(--bg-surface))}
.pack-header.no{opacity:.45;cursor:default}
.pack-header.no:hover{border-color:var(--border-primary);background:linear-gradient(135deg,var(--bg-surface),var(--bg-body))}
.pack-header.full{border-color:var(--accent-red-bright)}
.pack-header.full .pack-cost{color:var(--accent-red-bright)}
.pack-info{flex:1;min-width:0}
.pack-title{font-size:.85rem;font-weight:700;color:var(--accent-blue)}
.pack-desc{font-size:.65rem;color:var(--text-secondary);margin-top:2px}
.pack-cost{font-size:.85rem;font-weight:700;color:var(--accent-green);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
/* v6.9 Office upgrade button (shares layout with .pack-header) */
.office-header{display:flex;align-items:center;gap:10px;padding:8px 12px;margin:0 0 10px;background:linear-gradient(135deg,var(--bg-surface),var(--bg-body));border:1px solid var(--border-primary);border-radius:var(--border-radius);cursor:pointer;transition:border-color .15s,background .15s}
.office-header:hover{border-color:#d29922;background:linear-gradient(135deg,var(--bg-hover),var(--bg-surface))}
.office-header.no{opacity:.45;cursor:default}
.office-header.no:hover{border-color:var(--border-primary);background:linear-gradient(135deg,var(--bg-surface),var(--bg-body))}
.office-header.maxed{opacity:.6;cursor:default;border-color:var(--border-primary)}
.office-title{font-size:.8rem;font-weight:700;color:#d29922}

/* v6.8 Rarity colors */
.r-c{color:#7d8590}
.r-u{color:var(--accent-green)}
.r-r{color:var(--accent-blue)}
.r-e{color:#bc8cff}
.r-l{color:var(--accent-orange)}

/* v6.8 Pack reveal modal */
.pack-reveal{position:fixed;inset:0;background:rgba(1,4,9,.9);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer}
.pack-dialog{background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:10px;max-width:620px;width:90vw;cursor:default;overflow:hidden}
.pack-dialog-title{font-size:.85rem;font-weight:700;color:var(--text-primary);padding:10px 16px;border-bottom:1px solid var(--border-primary);display:flex;align-items:center;justify-content:space-between}
.pack-dialog .pack-reveal-row{padding:16px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.pack-dialog-ok{display:block;margin:0 auto 14px;padding:6px 28px;background:var(--accent-blue);color:#fff;border:none;border-radius:6px;font-weight:700;font-size:.8rem;cursor:pointer}
.pack-dialog-ok:hover{filter:brightness(1.15)}
.pack-reveal-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:90vw}
.pack-card{width:170px;padding:14px 10px;background:var(--bg-body);border:2px solid var(--border-primary);border-radius:10px;text-align:center;animation:pcIn .35s ease both}
.pack-card.r-c{border-color:#7d8590}
.pack-card.r-u{border-color:var(--accent-green);box-shadow:0 0 10px #7ee78744}
.pack-card.r-r{border-color:var(--accent-blue);box-shadow:0 0 12px #58a6ff55}
.pack-card.r-e{border-color:#bc8cff;box-shadow:0 0 14px #bc8cff66}
.pack-card.r-l{border-color:var(--accent-orange);box-shadow:0 0 18px #f0883e77}
.pack-card svg{width:48px;height:40px}
.pack-card .pc-name{font-size:.82rem;font-weight:700;color:var(--text-primary);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pack-card .pc-rarity{font-size:.7rem;font-weight:600;margin-top:2px}
.pack-card .pc-info{font-size:.62rem;color:var(--text-secondary);margin-top:4px}
.pack-card .pc-tier{font-size:.7rem;color:var(--accent-blue);margin-top:4px;font-weight:600}
@keyframes pcIn{from{opacity:0;transform:translateY(20px) scale(.85)}to{opacity:1;transform:none}}
.dlg-close{cursor:pointer;font-size:1.1rem;line-height:1;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;background:none;color:var(--text-secondary)}
.dlg-close:hover{opacity:.8}
.retire-ov{position:fixed;inset:0;background:rgba(1,4,9,.88);display:flex;align-items:center;justify-content:center;z-index:9998;cursor:pointer}
.retire-panel{background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:10px;padding:0 16px 16px;max-width:500px;width:90vw;max-height:70vh;overflow-y:auto;cursor:default}
.retire-title{font-size:1rem;font-weight:700;color:var(--accent-orange);padding:12px 16px;border-bottom:1px solid var(--border-primary);margin:0 -16px 12px;display:flex;align-items:center;justify-content:space-between}
.retire-card{display:flex;align-items:center;gap:10px;padding:8px;margin-bottom:6px;background:var(--bg-body);border:1px solid var(--border-secondary);border-radius:6px;animation:pcIn .3s ease both}
.retire-card svg{width:36px;height:30px;flex-shrink:0}
.retire-card-info{flex:1;min-width:0}
.retire-card-name{font-size:.8rem;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.retire-card-stats{font-size:.65rem;color:var(--text-secondary);margin-top:2px}
.retire-card-stats span{margin-right:8px}
.retire-dismiss{display:block;margin:10px auto 0;padding:8px 24px;background:var(--accent-orange);color:#000;border:none;border-radius:6px;font-weight:700;font-size:.8rem;cursor:pointer}
.retire-dismiss:hover{filter:brightness(1.15)}

/* Buy Quantity Selector */
.qty-bar{display:flex;gap:4px;margin-bottom:8px}
.qty-btn{flex:1;padding:5px 0;background:var(--bg-body);border:1px solid var(--border-primary);border-radius:4px;color:var(--text-secondary);font-size:.7rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.qty-btn:hover{border-color:var(--accent-blue);color:var(--text-primary)}
.qty-btn.active{background:#58a6ff22;border-color:var(--accent-blue);color:var(--accent-blue)}

/* Employee Upgrade Submenu */
.eu-toggle{width:20px;height:20px;background:var(--border-secondary);border:1px solid var(--border-primary);border-radius:4px;color:var(--text-secondary);font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
.eu-toggle:hover{background:var(--border-primary);color:var(--text-primary)}
.eu-toggle.open{background:var(--border-primary);color:var(--accent-blue)}
@keyframes plusPulse{0%,100%{box-shadow:0 0 0 0 rgba(88,166,255,.6)}50%{box-shadow:0 0 6px 3px rgba(88,166,255,.4)}}
.eu-toggle.has-affordable{animation:plusPulse 1.5s ease-in-out infinite;color:var(--accent-blue)}
.eu-sub{display:none;margin:2px 0 4px;padding:4px 0 4px 12px;border-left:2px solid var(--border-primary)}
.eu-sub.show{display:block}
.eu-row,.ru-row,.fu-row{display:flex;align-items:center;gap:6px;padding:4px 6px;margin:2px 0;background:var(--bg-body);border:1px solid var(--border-secondary);border-radius:4px;cursor:pointer;transition:border-color .15s,opacity .15s;font-size:.7rem}
.eu-row:hover,.ru-row:hover,.fu-row:hover{border-color:var(--accent-blue)}
.eu-row.no,.ru-row.no,.fu-row.no{opacity:.45;cursor:default}
.eu-row.no:hover,.ru-row.no:hover,.fu-row.no:hover{border-color:var(--border-secondary)}
.eu-row.best{border-color:#2ea043;background:rgba(46,160,67,.08)}
.eu-row-name{font-weight:600;color:var(--text-primary);min-width:60px}
.eu-row-desc{color:var(--text-secondary);flex:1;font-size:.68rem}
.eu-row-cost{color:var(--accent-blue);font-weight:600;font-size:.7rem}
.eu-row-lvl{color:var(--text-secondary);font-size:.65rem;min-width:20px;text-align:right}

/* Code Base Upgrades */
.cb-up{cursor:default}
.cb-locked{opacity:.35;cursor:default}
.cb-locked:hover{border-color:var(--border-secondary)}
.cb-locked .up-name{color:var(--text-secondary)}

/* Pause Toggle */
.pause-toggle{background:none;border:1px solid var(--border-primary);color:var(--text-secondary);border-radius:4px;padding:1px 5px;font-size:.65rem;cursor:pointer;margin-left:4px;transition:color .15s,border-color .15s}
.pause-toggle:hover{border-color:var(--accent-blue);color:var(--accent-blue)}
.pause-toggle.paused{color:var(--accent-orange);border-color:var(--accent-orange)}

/* Recruiter Progress Bar */
.recruiter-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border-secondary);border-radius:0 0 6px 6px;overflow:hidden}
.recruiter-fill{height:100%;background:var(--accent-blue);width:0;transition:none;border-radius:0 0 0 6px}

/* Skill Tree Modal */
.st-btn,.ach-btn{display:block;width:100%;padding:10px;border-radius:6px;font-size:.85rem;font-weight:700;text-align:center;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:background .15s,transform .1s}
.st-btn:hover,.ach-btn:hover{transform:scale(1.02)}
.st-btn{margin:12px 0 4px;background:linear-gradient(135deg,#f0883e22,#58a6ff22);border:1px solid var(--accent-orange);color:var(--accent-orange)}
.st-btn:hover{background:linear-gradient(135deg,#f0883e33,#58a6ff33)}
/* v8.x: Tabbed horizontal skill tree */
.st-ov{position:fixed;inset:0;z-index:160;display:flex;align-items:center;justify-content:center;background:rgba(13,17,23,.85)}
.st-close{background:var(--bg-surface);border:1px solid var(--border-primary);color:var(--text-secondary);font-size:1.1rem;cursor:pointer;border-radius:var(--border-radius);width:28px;height:28px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;transition:background .15s,color .15s;line-height:1}
.st-close:hover{color:var(--text-primary);background:var(--bg-hover)}
.st-hdr-actions{display:flex;align-items:center;gap:8px}
.st-graph{position:relative;box-sizing:border-box;width:clamp(480px,70vw,1000px);max-height:90vh;background:var(--bg-body);border:1px solid var(--border-primary);border-radius:var(--border-radius);box-shadow:0 0 40px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
.st-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border-primary);background:var(--bg-surface);flex-shrink:0}
.st-fame{display:flex;align-items:center;gap:8px}
.st-hub-val{font-size:1.4rem;font-weight:800;color:var(--accent-orange)}
.st-hub-lbl{font-size:.65rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em}
.st-respec{background:var(--border-secondary);border:1px solid var(--accent-red);color:var(--accent-red-bright);border-radius:var(--border-radius);padding:4px 12px;font-size:.7rem;cursor:pointer;transition:background .15s;font-family:inherit}
.st-respec:hover{background:var(--accent-red);color:#fff}
.st-respec.used{opacity:.4;cursor:default}
.st-tabs{display:flex;border-bottom:1px solid var(--border-primary);background:var(--bg-surface);flex-shrink:0}
.st-tab{flex:1;padding:8px 12px;text-align:center;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:none;border-bottom:3px solid transparent;background:none;color:var(--text-secondary);transition:background .15s,border-color .15s;font-family:inherit}
.st-tab:hover{background:var(--bg-hover)}
.st-tab.active{color:var(--text-primary);border-bottom-color:var(--bc)}
.st-path{flex:1;overflow-x:auto;overflow-y:auto;padding:24px 16px;display:flex;align-items:flex-start;gap:0}
.st-col{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
.st-arrow{flex-shrink:0;width:40px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;align-self:flex-start;margin-top:22px}
.st-arrow svg{width:32px;height:16px}
.st-node{width:155px;background:var(--bg-surface);border:2px solid var(--border-primary);border-radius:var(--border-radius);padding:8px 10px;cursor:pointer;text-align:center;transition:border-color .15s,opacity .15s,box-shadow .15s}
.st-node:hover{box-shadow:0 0 10px var(--bc,#30363d)33}
.st-node-name{font-size:.75rem;font-weight:700;color:var(--text-primary);word-break:break-word}
.st-node-desc{font-size:.65rem;color:var(--text-secondary);margin:2px 0}
.st-node-cost{font-size:.65rem;font-weight:600;color:var(--accent-orange)}
.st-node-lvl{font-size:.65rem;color:var(--text-secondary)}
.st-node.owned{border-color:var(--bc);box-shadow:0 0 6px var(--bc)44}
.st-node.maxed{border-color:var(--bc);opacity:.7}
.st-node.maxed .st-node-cost{color:var(--text-secondary)}
.st-node.locked{opacity:.3;cursor:not-allowed}
.st-node.no{opacity:.55;cursor:default}
.st-sub-arrow{width:2px;height:12px;background:var(--bc,var(--border-primary));opacity:.4;margin:0 auto}
.st-sub-arrow.lit{opacity:.7}

/* Achievement Modal */
.ach-btn{margin:6px 0 4px;background:linear-gradient(135deg,#da363322,#f0883e22);border:1px solid var(--accent-red);color:var(--accent-red)}
.ach-btn:hover{background:linear-gradient(135deg,#da363333,#f0883e33)}
.sett-btn{border-color:var(--text-secondary);color:var(--text-secondary);background:linear-gradient(135deg,#8b949e22,#48505822)}
/* Activity Log */
.log-hdr{font-size:.75rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--border-secondary)}
.log-panel{flex:1;min-height:0;overflow-y:auto;background:var(--bg-body);border:1px solid var(--border-secondary);border-radius:var(--border-radius);padding:6px;margin-top:4px}
.log-btns{padding-top:6px;flex-shrink:0;position:relative}
/* Start wrapper — column-reverse so menu expands above button */
.start-wrap{display:flex;flex-direction:column-reverse;margin:4px 0 0}
/* Start Button (Win95+ eras) */
.start-btn{display:block;width:100%;padding:8px 10px;border-radius:6px;font-size:.85rem;font-weight:700;text-align:left;cursor:pointer;text-transform:none;letter-spacing:0;transition:background .15s;background:linear-gradient(135deg,#008000,#00a000);border:2px outset #00c000;color:#fff;font-family:inherit}
.start-btn:hover{filter:brightness(1.1)}
.start-btn.open{border-radius:0 0 6px 6px}
.start-btn .start-arrow{float:right;transition:transform .2s}
.start-btn.open .start-arrow{transform:rotate(180deg)}
/* Start Menu — expands upward above button */
.start-menu{max-height:0;overflow:hidden;transition:max-height .25s ease;background:var(--bg-surface);border-radius:var(--border-radius) var(--border-radius) 0 0}
.start-menu.open{max-height:300px;border:1px solid var(--border-primary);border-bottom:none}
.start-menu-item{padding:6px 12px;font-size:.8rem;cursor:pointer;color:var(--text-primary);transition:background .1s;font-family:inherit}
.start-menu-item:hover{background:var(--bg-hover)}
.start-menu hr{margin:2px 8px;border:none;border-top:1px solid var(--border-secondary)}
/* Command-mode buttons (pre-Windows eras) */
.log-btns.cmd-mode .st-btn,.log-btns.cmd-mode .ach-btn{font-family:var(--font-mono);font-size:.75rem;text-transform:none;letter-spacing:0}
.log-entry{font-size:.65rem;color:var(--text-secondary);padding:2px 0;border-bottom:1px solid var(--bg-surface);line-height:1.4}
.log-year{color:var(--accent-blue);font-weight:700;margin-right:4px}
.ach-panel{width:400px;max-height:70vh;overflow-y:auto;background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:10px;padding:16px}
.ach-title{font-size:1.1rem;font-weight:800;color:var(--text-primary);margin-bottom:12px;text-align:center}
.ach-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--border-radius);border:1px solid var(--border-secondary);margin-bottom:6px;opacity:.35}
.ach-row.unlocked{opacity:1;border-color:#2ea04366;background:#2ea04311}
.ach-name{font-size:.8rem;font-weight:700;color:var(--text-primary);min-width:100px}
.ach-desc{font-size:.7rem;color:var(--text-secondary);flex:1}
.ach-reward{font-size:.7rem;font-weight:600;color:var(--accent-orange);white-space:nowrap}

/* Event Banner */
.ev-banner{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:90;display:none;align-items:center;gap:12px;padding:6px 18px;background:#238636;border-radius:0 0 8px 8px;color:#fff;font-size:.8rem;font-weight:600;box-shadow:0 2px 10px rgba(0,0,0,.4);max-width:calc(100% - 20px)}
.ev-banner.ev-choice{flex-direction:column;padding:10px 18px;background:#1c3a5f}
.ev-banner.debuff{background:var(--accent-red)}
.ev-name{font-weight:800}
.ev-desc{opacity:.9}
.ev-time{font-weight:800;min-width:24px;text-align:right}
.ev-choices{display:flex;gap:8px;margin-top:6px}
.ev-opt{background:var(--border-secondary);border:1px solid var(--border-primary);color:var(--text-tertiary);padding:6px 14px;border-radius:var(--border-radius);cursor:pointer;font-size:.7rem;flex:1;text-align:center;transition:border-color .2s,background .2s}
.ev-opt:hover{border-color:var(--accent-blue);background:var(--bg-surface)}
.ev-opt b{color:var(--accent-blue)}

/* NYT Headline Banner */
.nyt-banner{position:fixed;top:var(--notify-top,105px);left:50%;transform:translateX(-50%);z-index:85;padding:10px 28px;background:#f5f0e8;color:#1a1a1a;border-bottom:2px solid #333;font-family:'Georgia',serif;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.35);border-radius:0 0 8px 8px;animation:nytIn .6s ease;max-width:600px}
.nyt-label{font-size:.65rem;letter-spacing:4px;text-transform:uppercase;opacity:.5;margin-bottom:2px;font-weight:400}
.nyt-year{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;opacity:.6}
.nyt-headline{font-size:.95rem;font-weight:700;font-style:italic;margin-top:4px;line-height:1.3}
@keyframes nytIn{from{opacity:0;transform:translateX(-50%) translateY(-100%)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Settings */
.settings-panel{width:320px;background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:10px;padding:20px}
.settings-title{font-size:1rem;font-weight:800;color:var(--text-primary);margin-bottom:16px;text-align:center}
.settings-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.settings-label{font-size:.75rem;color:var(--text-secondary);min-width:65px;text-transform:uppercase;letter-spacing:.04em}
.settings-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:var(--border-secondary);border-radius:3px;outline:none}
.settings-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent-blue);cursor:pointer;border:2px solid var(--bg-surface)}
.settings-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent-blue);cursor:pointer;border:2px solid var(--bg-surface)}
.settings-val{font-size:.7rem;color:var(--accent-blue);min-width:32px;text-align:right;font-variant-numeric:tabular-nums}

/* Fun Popup */
.fun-panel{background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:12px;padding:28px 32px;width:340px;text-align:center}
.fun-panel h2{margin:0 0 8px;font-size:1.2rem;color:var(--text-primary)}
.fun-panel p{margin:0 0 20px;font-size:.85rem;color:var(--text-secondary)}
.fun-btns{display:flex;gap:10px;justify-content:center}
.fun-btns button{padding:8px 18px;border-radius:var(--border-radius);border:1px solid var(--border-primary);font-size:.8rem;font-weight:600;cursor:pointer;transition:background .15s}
.fun-btn-yes{background:#238636;color:#fff;border-color:#238636!important}
.fun-btn-yes:hover{background:#2ea043}
.fun-btn-fb{background:var(--border-secondary);color:var(--accent-blue)}
.fun-btn-fb:hover{background:var(--border-primary)}

/* Stats Panel */
.stats-panel{background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:10px;padding:20px;width:480px;max-height:75vh;overflow-y:auto}
.stats-title{font-size:1.1rem;font-weight:800;color:var(--text-primary);margin-bottom:12px;text-align:center}
.stats-summary{display:flex;gap:16px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.stats-stat{text-align:center;padding:6px 12px;background:var(--bg-body);border-radius:var(--border-radius);border:1px solid var(--border-secondary)}
.stats-stat-val{font-size:1rem;font-weight:700;color:var(--accent-blue)}
.stats-stat-lbl{font-size:.68rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px}
.stats-table{width:100%;border-collapse:collapse;font-size:.75rem}
.stats-table th{text-align:left;color:var(--text-secondary);padding:6px 8px;border-bottom:1px solid var(--border-primary);font-weight:600;text-transform:uppercase;font-size:.65rem;letter-spacing:1px}
.stats-table td{padding:5px 8px;border-bottom:1px solid var(--border-secondary);color:var(--text-primary)}
.stats-table tr:hover td{background:#21262d44}
.stats-section{margin-top:14px;padding-top:10px;border-top:1px solid var(--border-secondary)}
.stats-sec-title{font-size:.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

/* v7.2: Roster modal */
.roster-panel{background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:10px;padding:20px;width:560px;max-width:calc(100vw - 24px);max-height:80vh;overflow-y:auto;position:relative}
/* Always-open roster column: narrow, so synergy + roster rows use a 2-line grid */
.right-roster .stats-title{font-size:1rem;margin-bottom:6px}
.right-roster .roster-syn-row{display:grid;grid-template-columns:1fr auto;gap:1px 6px;padding:4px 0;border-bottom:1px dashed var(--border-secondary);align-items:baseline}
.right-roster .roster-syn-row:last-child{border-bottom:none}
.right-roster .roster-syn-row .rn{width:auto;grid-column:1;grid-row:1;font-size:.7rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.right-roster .roster-syn-row .rc{width:auto;grid-column:2;grid-row:1;text-align:right;font-size:.6rem}
.right-roster .roster-syn-row .rb{width:auto;grid-column:1;grid-row:2;text-align:left;font-size:.65rem}
.right-roster .roster-syn-row .rp{grid-column:2;grid-row:2;text-align:right;font-size:.6rem;white-space:nowrap}
.right-roster .roster-row{display:grid;grid-template-columns:1fr auto;gap:2px 6px;padding:6px 8px;align-items:center}
.right-roster .roster-row .r-name{grid-column:1;grid-row:1;white-space:normal;text-overflow:clip;overflow:visible;word-break:break-word;min-width:0;font-size:.7rem}
.right-roster .roster-row .fire-btn{grid-column:2;grid-row:1;align-self:start;justify-self:end}
.right-roster .roster-row .r-meta{grid-column:1;grid-row:2;white-space:normal;max-width:none;overflow:visible;text-overflow:clip;font-size:.65rem;min-width:0}
.right-roster .roster-row .r-lps{grid-column:2;grid-row:2;width:auto;min-width:54px;text-align:right;align-self:end;font-size:.68rem}
.roster-syn{display:grid;grid-template-columns:1fr;gap:4px;margin:4px 0 14px;padding:8px;background:var(--bg-body);border:1px solid var(--border-secondary);border-radius:var(--border-radius)}
.roster-syn-row{display:flex;align-items:center;gap:8px;font-size:.7rem}
.roster-syn-row .rn{width:100px;font-weight:700}
.roster-syn-row .rc{width:80px;color:var(--text-secondary);font-size:.65rem}
.roster-syn-row .rb{width:50px;color:var(--accent-green);text-align:right;font-family:monospace}
.roster-syn-row .rp{flex:1;color:var(--text-secondary);font-size:.6rem;text-align:right}
.roster-ctrl{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.roster-ctrl button{font-size:.65rem;padding:4px 9px;background:var(--border-secondary);border:1px solid var(--border-primary);color:var(--text-secondary);cursor:pointer;border-radius:4px;font-family:inherit}
.roster-ctrl button:hover{background:var(--border-primary)}
.roster-ctrl button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.roster-list{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.roster-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg-body);border:1px solid var(--border-secondary);border-radius:4px;font-size:.7rem}
.roster-row .r-name{flex:1;font-weight:700;min-width:0;word-break:break-word}
.roster-row .r-meta{color:var(--text-secondary);font-size:.65rem;min-width:0}
.roster-row .r-lps{color:var(--accent-green);width:80px;text-align:right;font-family:monospace;font-size:.65rem}
.roster-row .fire-btn{font-size:.68rem;padding:4px 9px;background:var(--border-secondary);border:1px solid var(--border-primary);color:var(--text-secondary);cursor:pointer;border-radius:4px;font-family:inherit}
.roster-row .fire-btn:hover{color:var(--accent-red-bright);border-color:var(--accent-red-bright)}
.roster-row .fire-btn.confirm{background:var(--accent-red-bright);color:#fff;border-color:var(--accent-red-bright)}

/* Bottom Bar */
.bot{padding:8px 20px;background:var(--bg-surface);border-top:1px solid var(--border-primary)}
.prog-wrap{position:relative;height:18px;min-height:18px;flex-shrink:0;background:var(--bg-body);border-radius:4px;overflow:hidden;border:1px solid var(--border-secondary)}
.prog-fill{height:100%;background:linear-gradient(90deg,#238636,#2ea043);transform-origin:left;transition:transform .25s}
.prog-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--text-tertiary);letter-spacing:.05em}
.prog-wrap.ready{border-color:var(--accent-orange);animation:prog-pulse 1.2s ease-in-out infinite;cursor:pointer}
.prog-wrap.ready:hover{transform:scale(1.02)}
.prog-wrap.ready .prog-fill{background:linear-gradient(90deg,var(--accent-orange),#d29922)}
.prog-wrap.ready .prog-txt{color:var(--bg-body);font-size:.75rem;font-weight:800;letter-spacing:.1em}
@keyframes prog-pulse{0%,100%{box-shadow:0 0 4px rgba(240,136,62,.3)}50%{box-shadow:0 0 12px rgba(240,136,62,.8)}}

/* First-ship tutorial popup */
.ship-tutorial{margin-top:6px;padding:8px 10px;background:var(--bg-surface);border:2px solid var(--accent-orange);border-radius:var(--border-radius);font-size:.6rem;color:var(--text-primary);text-align:center;line-height:1.4;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.3);animation:tutorialPulse 1.5s ease-in-out infinite}
@keyframes tutorialPulse{0%,100%{border-color:var(--accent-orange)}50%{border-color:var(--accent-green);box-shadow:0 2px 14px rgba(126,231,135,.3)}}

/* v9.0: Notation tutorial popup */
.fmt-tutorial-ov{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
.fmt-tutorial{max-width:340px;padding:16px 20px;background:var(--bg-surface);border:2px solid var(--accent-blue);border-radius:var(--border-radius);color:var(--text-primary);font-size:.8rem;line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,.4);text-align:left}
.fmt-tutorial h3{margin:0 0 8px;font-size:.95rem;color:var(--accent-blue)}
.fmt-tutorial table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.75rem}
.fmt-tutorial td{padding:2px 6px}
.fmt-tutorial td:first-child{font-weight:700;color:var(--accent-green);width:30px}
.fmt-tutorial td:last-child{color:var(--text-secondary)}
.fmt-tutorial button{display:block;margin:10px auto 0;padding:6px 20px;background:var(--accent-blue);color:#fff;border:none;border-radius:var(--border-radius);font-weight:700;font-size:.8rem;cursor:pointer}

/* v7.3: Right-side ship progress panel — sits to the left of the coder roster */
.right-ship{width:260px;flex-shrink:0;padding:10px 6px;border-right:1px solid var(--border-secondary);display:flex;flex-direction:column;gap:8px;background:var(--bg-body);overflow-y:auto}
.right-ship .ship-title{font-size:.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;font-weight:700;text-align:center;padding-bottom:4px;border-bottom:1px solid var(--border-secondary)}
.ship-resources{display:flex;flex-direction:column;gap:5px}
.ship-res-row{display:flex;flex-direction:column;gap:3px;padding:6px 7px;background:var(--bg-surface);border:1px solid var(--border-secondary);border-radius:4px;transition:border-color .2s,background .15s;cursor:pointer}
.ship-res-row:hover{background:var(--bg-hover)}
.ship-res-row.active-type{border-color:var(--accent-blue)}
.ship-res-row.done{border-color:#2ea043}
.ship-res-row .srn{font-size:.65rem;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.ship-res-row .srv{font-size:.65rem;color:var(--text-secondary);font-family:'Courier New',monospace;text-align:right}
.ship-res-row .srbar{height:4px;background:var(--bg-body);border-radius:2px;overflow:hidden;border:1px solid var(--border-secondary)}
.ship-res-row .srbar-fill{height:100%;background:linear-gradient(90deg,#238636,#2ea043);transform-origin:left;transition:transform .2s}
.ship-res-row.done .srbar-fill{background:var(--accent-green)}
.ship-res-row .srpct{font-size:.65rem;color:var(--text-secondary)}
.ship-res-row.done .srpct{color:var(--accent-green)}
.ship-confirm{display:none;margin-top:4px;padding:6px;background:var(--bg-hover);border:1px solid var(--accent-orange);border-radius:var(--border-radius);text-align:center;font-size:.6rem}
.ship-confirm.show{display:block}
.ship-confirm p{margin-bottom:6px;color:var(--text-secondary);line-height:1.3}
.ship-confirm-btns{display:flex;gap:4px}
.ship-yes{flex:1;padding:6px 4px;background:var(--accent-orange);color:var(--bg-body);border:none;border-radius:var(--border-radius);font-size:.6rem;font-weight:700;cursor:pointer}
.ship-no{flex:1;padding:6px 4px;background:var(--bg-surface);color:var(--text-secondary);border:1px solid var(--border-primary);border-radius:var(--border-radius);font-size:.6rem;cursor:pointer}
.ship-confirm p{color:var(--accent-red-bright);font-size:.8rem;font-weight:600;margin:0 0 8px}
.ship-confirm-btns{display:flex;gap:8px;justify-content:center}
.ship-confirm-btns button{padding:6px 16px;border:none;border-radius:5px;font-weight:700;font-size:.8rem;cursor:pointer}
.ship-yes{background:var(--accent-red);color:#fff}
.ship-yes:hover{background:var(--accent-red-bright)}
.ship-no{background:var(--border-primary);color:var(--text-tertiary)}
.ship-no:hover{background:#484f58}

/* Update Banner */
.update-banner{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;background:#1f6feb;color:#fff;font-size:.85rem;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,.5);cursor:pointer;animation:ubIn .4s ease}
.update-banner:hover{background:#388bfd}
.update-banner .ub-close{margin-left:8px;background:none;border:none;color:rgba(255,255,255,.7);font-size:1.1rem;cursor:pointer;padding:0 4px}
.update-banner .ub-close:hover{color:#fff}
@keyframes ubIn{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* Bubbles */
.bubble{position:absolute;width:28px;height:28px;border-radius:50%;cursor:pointer;z-index:50;pointer-events:auto;animation:bubbleIn .3s ease,bubbleFloat 3s ease-in-out infinite;box-shadow:inset -3px -3px 6px rgba(0,0,0,.2),inset 3px 3px 6px rgba(255,255,255,.3);transition:transform .1s}
.bubble:hover{transform:scale(1.2)}
.bubble.blue{background:radial-gradient(circle at 35% 35%,#6eb5ff,#1a6eff)}
.bubble.green{background:radial-gradient(circle at 35% 35%,#7eef7e,#1eaa1e)}
.bubble.bug{background:none;box-shadow:none;display:flex;align-items:center;justify-content:center;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.aim-toggle{position:absolute;top:6px;right:6px;z-index:60;padding:3px 8px;background:var(--border-secondary);color:var(--accent-green);border:1px solid var(--border-primary);border-radius:4px;font-size:.6rem;font-weight:700;cursor:pointer;opacity:.7;transition:all .15s}
.aim-toggle:hover{opacity:1;border-color:var(--accent-green)}
.aim-toggle.active{background:var(--accent-green);color:var(--bg-body);opacity:1}
.aim-acc{position:absolute;top:6px;left:6px;z-index:60;padding:3px 8px;background:rgba(13,17,23,.85);color:var(--accent-green);border:1px solid var(--border-primary);border-radius:4px;font-size:.6rem;font-weight:700;font-variant-numeric:tabular-nums;pointer-events:none;display:none}
.aim-acc.show{display:block}
.aim-sliders{position:absolute;top:28px;right:6px;z-index:60;background:rgba(13,17,23,.9);border:1px solid var(--border-primary);border-radius:4px;padding:6px 8px;display:none;flex-direction:column;gap:4px;width:260px}
.aim-sliders.show{display:flex}
.aim-sliders label{display:flex;align-items:center;gap:4px;font-size:.55rem;color:var(--text-secondary);font-weight:600}
.aim-sliders input[type=range]{flex:1;min-width:0;height:4px;-webkit-appearance:none;appearance:none;background:var(--border-secondary);border-radius:2px;outline:none}
.aim-sliders input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent-green);cursor:pointer}
.aim-sliders input[type=range]::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:var(--accent-green);cursor:pointer;border:none}
.aim-sliders .aim-val{min-width:24px;text-align:right;color:var(--accent-green);font-size:.55rem;font-variant-numeric:tabular-nums}
.bubble-pop{position:absolute;width:28px;height:28px;border-radius:50%;z-index:50;pointer-events:none;animation:bubblePop .35s ease-out forwards}
@keyframes bubbleIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bubbleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bubblePop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}100%{transform:scale(2);opacity:0}}

/* Toasts */
.toasts{position:fixed;top:var(--notify-top,105px);left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
.toast{padding:6px 14px;background:#238636;color:#fff;border-radius:6px;font-size:.8rem;font-weight:600;animation:tIn .25s ease,tOut .3s ease 1.8s forwards}
@keyframes tIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@keyframes tOut{to{opacity:0;transform:translateY(-8px)}}

/* Staff Speech Bubbles */
.staff-bubble{position:fixed;z-index:99;padding:8px 12px;background:var(--bg-surface);border:1px solid var(--border-primary);border-radius:8px;font-size:.75rem;color:var(--text-primary);pointer-events:none;max-width:280px;white-space:normal;line-height:1.35;animation:sbIn .3s ease,sbOut .4s ease 5s forwards}
.staff-bubble .sb-name{font-weight:700;margin-right:4px}
.staff-bubble::after{content:'';position:absolute;top:10px;left:-6px;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:6px solid var(--border-primary)}
@keyframes sbIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes sbOut{to{opacity:0;transform:translateX(-8px)}}

/* Ship Overlay */
.ship-ov{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,17,23,.9);animation:shipIn 13.3s ease forwards}
@keyframes shipIn{0%{opacity:0}4%{opacity:1}100%{opacity:1}}
.ship-year{font-size:3rem;font-weight:800;color:var(--accent-blue);margin-bottom:20px;text-shadow:0 0 30px #58a6ff44;animation:yearPop 2.7s ease 1.3s both}
@keyframes yearPop{from{opacity:0;transform:scale(1.4)}to{opacity:1;transform:scale(1)}}
.ship-dismiss{margin-top:20px;padding:10px 28px;background:linear-gradient(135deg,#238636,#2ea043);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;opacity:0;animation:dismissIn 1s ease 4s forwards;transition:transform .1s,box-shadow .15s;letter-spacing:.03em}
.ship-dismiss:hover{transform:scale(1.05);box-shadow:0 0 16px #2ea04366}
@keyframes dismissIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ship-scene{position:relative;width:260px;height:200px;display:flex;align-items:flex-end;justify-content:center}

/* --- 5.25" Floppy --- */
.media-floppy525{width:140px;height:140px;background:#1a1a1a;border:2px solid #333;border-radius:3px;position:relative;animation:mediaIn .6s ease both}
.media-floppy525::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:60px;height:12px;background:#555;border-radius:2px}
.media-floppy525::after{content:'';position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:#333;border-radius:50%;border:2px solid #444}
.floppy525-label{position:absolute;top:30px;left:14px;right:14px;height:40px;background:#c0a060;border-radius:2px}
.floppy525-notch{position:absolute;bottom:6px;left:6px;width:10px;height:16px;background:#0d1117;border-radius:2px}
/* --- 3.5" Floppy --- */
.media-floppy35{width:110px;height:114px;background:#2244aa;border:2px solid #3355cc;border-radius:4px;position:relative;animation:mediaIn .6s ease both}
.media-floppy35::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:44px;height:14px;background:#999;border-radius:0 0 2px 2px}
.media-floppy35::after{content:'';position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:52px;height:36px;background:#1a1a3a;border-radius:2px}
.floppy35-label{position:absolute;top:22px;left:10px;right:10px;height:32px;background:#e8e0d0;border-radius:2px}
.floppy35-arrow{position:absolute;bottom:4px;right:8px;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #1a1a5a}
/* --- CD-ROM --- */
.media-cd{width:130px;height:130px;background:radial-gradient(circle,#0000 14px,#e8e8f0 14px,#e0e0e8 16px,linear-gradient(135deg,#d0d0e8,#c8c8e0,#e0d8f0,#d0d8e8) 16px);border-radius:50%;position:relative;animation:mediaIn .6s ease both;box-shadow:0 0 20px #58a6ff22}
.media-cd::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#d8d0e800,#d8d0f844,#e0d8f000,#d0d0e844,#d8d0e800);pointer-events:none}
.media-cd::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:#0d1117;border-radius:50%;border:2px solid #444}
.cd-ring{position:absolute;inset:18px;border:1px solid #c0c0d044;border-radius:50%}
/* --- DVD --- */
.media-dvd{width:130px;height:130px;background:radial-gradient(circle,#0000 14px,#f0e8d8 14px,#e8e0d0 16px,#ddd8c8 16px);border-radius:50%;position:relative;animation:mediaIn .6s ease both;box-shadow:0 0 20px #f0883e22}
.media-dvd::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 45deg,#e8dcc800,#f0e0c844,#e0d8c000,#f0dcc844,#e8dcc800);pointer-events:none}
.media-dvd::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:#0d1117;border-radius:50%;border:2px solid #444}
.dvd-ring{position:absolute;inset:18px;border:1px solid #d0c8b044;border-radius:50%}
/* --- Digital Download --- */
.media-dl{width:120px;height:120px;position:relative;animation:mediaIn .6s ease both}
.dl-cloud{width:100px;height:50px;background:var(--border-primary);border-radius:25px;position:absolute;top:10px;left:10px}
.dl-cloud::before{content:'';position:absolute;top:-18px;left:18px;width:36px;height:36px;background:var(--border-primary);border-radius:50%}
.dl-cloud::after{content:'';position:absolute;top:-26px;left:42px;width:30px;height:30px;background:var(--border-primary);border-radius:50%}
.dl-arrow{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:4px;height:40px;background:var(--accent-blue);animation:dlPulse 1.2s ease infinite}
.dl-arrow::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:12px solid var(--accent-blue)}
.dl-bar-wrap{position:absolute;bottom:0;left:10px;right:10px;height:6px;background:var(--bg-body);border-radius:3px;overflow:hidden}
.dl-bar{height:100%;background:#238636;border-radius:3px;animation:dlFill 3.5s ease forwards}
@keyframes mediaIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes dlPulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes dlFill{0%{width:0}100%{width:100%}}
.ship-scene *[class*="media"]{animation-duration:1.6s}
.dl-bar{animation-duration:9.3s}
/* Ship Software Name */
.ship-name{font-size:1.6rem;font-weight:800;color:var(--text-primary);margin-bottom:4px;animation:yearPop 4s ease 1.6s both}
.ship-cat{font-size:.9rem;color:var(--text-secondary);margin-bottom:16px;animation:yearPop 4s ease 2.1s both}
.ship-media-label{font-size:.75rem;color:var(--accent-blue);margin-top:12px;animation:yearPop 4s ease 3.2s both}

/* Cart/Disc label */
.cart-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.5rem;color:#ddd;font-weight:700;text-align:center;line-height:1.2;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 0 2px #000}
.disc-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.45rem;color:#333;font-weight:700;text-align:center;max-width:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Name Prompt */

/* Scrollbar */
.right::-webkit-scrollbar{width:6px}
.right::-webkit-scrollbar-track{background:transparent}
.right::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}

/* Slot Select */
.slot-screen{position:fixed;inset:0;background:var(--bg-body);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.slot-screen.hidden{display:none}
.slot-title{font-size:1.6rem;font-weight:700;color:var(--text-primary)}
.slot-sub{font-size:.85rem;color:var(--text-secondary);margin-top:-12px}
.slot-row{display:flex;gap:16px}
.slot-btn{width:160px;padding:20px 16px;background:var(--bg-surface);border:2px solid var(--border-primary);border-radius:10px;cursor:pointer;transition:border-color .2s,transform .1s;text-align:center}
.slot-btn:hover{border-color:var(--accent-blue);transform:translateY(-2px)}
.slot-new{margin-top:8px;padding:4px 10px;background:none;border:1px solid var(--accent-red);border-radius:4px;color:var(--accent-red);font-size:.65rem;font-weight:600;cursor:pointer;transition:background .15s,color .15s}
.slot-new:hover{background:var(--accent-red);color:#fff}
.slot-confirm{display:none;margin-top:6px;font-size:.65rem;color:var(--accent-red);text-align:center}
.slot-confirm.show{display:block}
.slot-confirm-btns{display:flex;gap:6px;justify-content:center;margin-top:4px}
.slot-yes,.slot-no{padding:3px 10px;border-radius:4px;font-size:.65rem;font-weight:600;cursor:pointer;border:1px solid var(--border-primary)}
.slot-yes{background:var(--accent-red);color:#fff;border-color:var(--accent-red)}
.slot-yes:hover{background:var(--accent-red-bright)}
.slot-no{background:none;color:var(--text-secondary)}
.slot-no:hover{border-color:var(--accent-blue);color:var(--accent-blue)}
.slot-num{font-size:2rem;font-weight:700;color:var(--accent-blue)}
.slot-info{font-size:.7rem;color:var(--text-secondary);margin-top:6px;line-height:1.4}
.game.hidden{display:none}

/* ===== MOBILE RESPONSIVE ===== */
.mob-tabs{display:none}

@media(max-width:768px){
  /* Tab bar — min 44px touch target */
