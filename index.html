// Node positions: [x, y] relative to graph content (1518x1038)
// Hub at center (775, 520). Branches radiate to 4 corners, 1.55× scaled for spacing.
// Indices 0-2: spine (existing), 3-7: sub-branches (new)
const BRANCH_POS = [
  // Gen (upper-left): spine + 5 subs
  [{ x:605, y:396 }, { x:442, y:280 }, { x:279, y:163 },
   { x:488, y:481 }, { x:697, y:295 }, { x:325, y:373 }, { x:170, y:264 }, { x:380, y:86 }],
  // Click (upper-right): spine + 5 subs
  [{ x:945, y:396 }, { x:1108, y:280 }, { x:1271, y:163 },
   { x:1062, y:481 }, { x:853, y:295 }, { x:1225, y:373 }, { x:1380, y:264 }, { x:1170, y:86 }],
  // Prestige (lower-left): spine + 5 subs
  [{ x:605, y:644 }, { x:442, y:760 }, { x:279, y:877 },
   { x:488, y:559 }, { x:697, y:745 }, { x:325, y:667 }, { x:170, y:776 }, { x:380, y:954 }],
  // Streak (lower-right): spine + 5 subs
  [{ x:945, y:644 }, { x:1108, y:760 }, { x:1271, y:877 },
   { x:1062, y:559 }, { x:853, y:745 }, { x:1225, y:667 }, { x:1380, y:776 }, { x:1170, y:954 }],
];
const HUB = { x: 775, y: 520 };

function openSkillTree() {
  // Remove existing if any
  const old = document.querySelector('.st-ov');
  if (old) old.remove();

  const ov = document.createElement('div');
  ov.className = 'st-ov';

  const graph = document.createElement('div');
  graph.className = 'st-graph';

  // Close button (inside graph panel)
  const close = document.createElement('button');
  close.className = 'st-close';
  close.textContent = '\u2715';
  close.addEventListener('click', () => ov.remove());
  graph.appendChild(close);

  // SVG for lines
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('class', 'st-svg');
  svg.setAttribute('viewBox', '0 0 1518 1038');
  graph.appendChild(svg);

  const NW = 55; // half node width for line centering
  const NH = 20; // half node height
  function drawLine(x1, y1, x2, y2, color, dim) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-opacity', dim ? '0.15' : '0.5');
    svg.appendChild(line);
  }

  // Hub
  const hub = document.createElement('div');
  hub.className = 'st-hub';
  hub.innerHTML = '<div class="st-hub-val">' + S.fame + '</div><div class="st-hub-lbl">' + t('fame') + '</div>';
  hub.style.left = HUB.x + 'px';
  hub.style.top = HUB.y + 'px';
  graph.appendChild(hub);

  // Branches
  FAME_TREE.forEach((branch, bIdx) => {
    const positions = BRANCH_POS[bIdx];
    const color = branch.color;

    // Branch label near the spine tip (index 2)
    const lbl = document.createElement('div');
    lbl.className = 'st-branch-lbl';
    lbl.style.color = color;
    const tip = positions[2];
    lbl.style.left = (tip.x - 10) + 'px';
    lbl.style.top = (tip.y - 16) + 'px';
    lbl.textContent = ta('ft_'+bIdx+'_name', branch.name);
    graph.appendChild(lbl);

    branch.upgrades.forEach((u, uIdx) => {
      const pos = positions[uIdx];
      const owned = S.f[u.id] || 0;
      const isMystery = u.max === 0;
      const maxed = !isMystery && owned >= u.max;
      const reqIdx = u.req != null ? u.req : (uIdx > 0 ? uIdx - 1 : -1);
      const prereqMet = reqIdx < 0 || (S.f[branch.upgrades[reqIdx].id] || 0) >= 1;
      const afford = !isMystery && prereqMet && S.fame >= u.cost && !maxed;
      const locked = isMystery || !prereqMet;

      // Draw line from parent node (or hub) to this node
      const fromX = reqIdx < 0 ? HUB.x : positions[reqIdx].x + NW;
      const fromY = reqIdx < 0 ? HUB.y : positions[reqIdx].y + NH;
      const toX = pos.x + NW;
      const toY = pos.y + NH;
      drawLine(fromX, fromY, toX, toY, color, locked && !owned);

      // Node
      const node = document.createElement('div');
      node.className = 'st-node';
      node.style.setProperty('--bc', color);
      node.style.left = pos.x + 'px';
      node.style.top = pos.y + 'px';
      if (owned > 0) node.classList.add('owned');
      if (maxed) node.classList.add('maxed');
      if (locked) node.classList.add('locked');
      else if (!afford) node.classList.add('no');
      if (isMystery) node.style.borderStyle = 'dashed';

      let costText = isMystery ? t('unknown') : maxed ? t('maxLvl') : u.cost + ' ' + t('fame');
      let lvlText = isMystery ? '' : owned > 0 ? 'Lv ' + owned + (u.max > 1 ? '/' + u.max : '') : '';

      node.innerHTML = '<div class="st-node-name">' + ta('ft_'+bIdx+'_'+uIdx+'_name', u.name) + '</div>'
        + '<div class="st-node-desc">' + ta('ft_'+bIdx+'_'+uIdx+'_desc', u.desc) + '</div>'
        + '<div class="st-node-cost">' + costText + '</div>'
        + (lvlText ? '<div class="st-node-lvl">' + lvlText + '</div>' : '');

      if (!locked && !maxed && !isMystery) {
        node.addEventListener('click', () => {
          buyFame(bIdx, uIdx);
          openSkillTree(); // rebuild
        });
      }

      graph.appendChild(node);
    });
  });

  ov.appendChild(graph);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
}

function buyFame(bIdx, uIdx) {
  const branch = FAME_TREE[bIdx];
  if (!branch) return;
  const u = branch.upgrades[uIdx];
  if (!u || u.max === 0) return;
  if (S.f[u.id] >= u.max || S.fame < u.cost) return;
  const reqIdx = u.req != null ? u.req : (uIdx > 0 ? uIdx - 1 : -1);
  if (reqIdx >= 0 && (S.f[branch.upgrades[reqIdx].id] || 0) < 1) return;
  S.fame -= u.cost;
  S.f[u.id]++;
  markDirty();
  const fName = ta('ft_'+bIdx+'_'+uIdx+'_name', u.name);
  toast(t('unlocked') + ': ' + fName);
  log(t('logSkill') + ': ' + fName + (u.max > 1 ? ' (Lv ' + S.f[u.id] + ')' : ''));
  playSfx('buy');
}

function ship() {
  if (S.tLoc < shipAt()) return;
  const year = currentYear();
  const lm = getLandmark(year);
  const name = lm.parody;
  const gain = fameGain();
  S.games.push({ name, year, cat: lm.cat, fame: gain, target: shipAt() });
  // Unlock code base upgrade for new category
  if (!S.catsSeen.includes(lm.cat)) {
    S.catsSeen.push(lm.cat);
    if (S.cb < CODE_BASE.length) {
      S.cb++;
      const cbName = ta('cb_'+(S.cb-1)+'_name', CODE_BASE[S.cb - 1].name);
      toast(t('cbUnlocked') + ': ' + cbName);
      log('\uD83D\uDCDA ' + t('cbUnlocked') + ': ' + cbName);
    }
  }
  S.fame += gain; S.tFame += gain;
  S.shipped++;
  // Golden Parachute: keep 5%×Lv of total LoC
  const keepLoc = S.f.goldenParachute ? S.tLoc * 0.15 * S.f.goldenParachute : 0;
  S.loc = 0;
  S.tLoc = 0;
  S.g = GEN.map(() => 0);
  S.eu = GEN.map(() => EMP_UPS.map(() => 0));
  S.c = CLK.map(() => 0);
  S.ss = SUPPORT.map(() => 0);
  S.ru = RECRUITER_UPS.map(() => 0);
  S.fu = FACILITY_UPS.map(() => 0);
  markDirty();
  napTimer = 0; buyerTimer = 0; facilityTimer = 0; managerTimer = 0; trainerTimer = 0; nytShown = false;
  ctReset(); streakMul = 1; lastClickTime = 0;
  if (S.f.engine) { S.g[0] = 10; S.g[1] = 5; S.g[2] = 3; }
  // Venture Capital: start with 1000×Lv LoC
  if (S.f.ventureCapital) { const vc = Math.floor(shipAt() * 0.02 * S.f.ventureCapital); S.loc += vc; S.tLoc += vc; }
  // Golden Parachute: carry over LoC
  if (keepLoc > 0) { S.loc += keepLoc; S.tLoc += keepLoc; }
  isShipping = true;
  showYearTransition(year, name, lm.cat);
  toast(name + ' ' + t('toastShipped') + ' +' + gain + ' ' + t('fame'));
  log('\uD83D\uDE80 ' + name + ' ' + t('toastShipped') + ' +' + gain + ' ' + t('fame'));
  playSfx('ship');
}

// ========== EVENT DELEGATION ==========
$('G').addEventListener('click', e => {
  ensureAudio();
  if (e.target.closest('#mon')) return doClick(e);
  // Quantity selector
  const qBtn = e.target.closest('.qty-btn');
  if (qBtn) {
    buyQty = qBtn.dataset.q === 'Infinity' ? Infinity : +qBtn.dataset.q;
    document.querySelectorAll('.qty-btn').forEach(b => b.classList.toggle('active', b === qBtn));
    return;
  }
  // Pause toggle for support staff
  const pauseBtn = e.target.closest('.pause-toggle');
  if (pauseBtn) {
    e.stopPropagation();
    const idx = +pauseBtn.dataset.sp;
    S.sp[idx] = S.sp[idx] ? 0 : 1;
    pauseBtn.textContent = S.sp[idx] ? '\u25B6' : '\u23F8';
    pauseBtn.classList.toggle('paused', !!S.sp[idx]);
    return;
  }
  // Coder equipment toggle
  const tog = e.target.closest('.eu-toggle');
  if (tog) {
    e.stopPropagation();
    // Recruiter training toggle
    if (tog.classList.contains('ru-toggle')) {
      const sub = document.getElementById('ru-sub');
      const opening = !sub.classList.contains('show');
      document.querySelectorAll('.eu-sub.show').forEach(s => {
        s.classList.remove('show');
        const ot = s.previousElementSibling.querySelector('.eu-toggle');
        if (ot) { ot.classList.remove('open'); ot.textContent = '+'; }
      });
      sub.classList.toggle('show', opening);
      tog.classList.toggle('open', opening);
      tog.textContent = opening ? '−' : '+';
      if (opening) updateRUSub();
      return;
    }
    // Facility Director training toggle
    if (tog.classList.contains('fu-toggle')) {
      const sub = document.getElementById('fu-sub');
      const opening = !sub.classList.contains('show');
      document.querySelectorAll('.eu-sub.show').forEach(s => {
        s.classList.remove('show');
        const ot = s.previousElementSibling.querySelector('.eu-toggle');
        if (ot) { ot.classList.remove('open'); ot.textContent = '+'; }
      });
      sub.classList.toggle('show', opening);
      tog.classList.toggle('open', opening);
      tog.textContent = opening ? '−' : '+';
      if (opening) updateFUSub();
      return;
    }
    const gi = +tog.dataset.gi;
    const sub = document.getElementById('eu-sub-' + gi);
    const opening = !sub.classList.contains('show');
    // Close any other open submenu first
    if (opening) {
      document.querySelectorAll('.eu-sub.show').forEach(s => {
        s.classList.remove('show');
        const otherTog = s.previousElementSibling.querySelector('.eu-toggle');
        if (otherTog) { otherTog.classList.remove('open'); otherTog.textContent = '+'; }
      });
    }
    sub.classList.toggle('show', opening);
    tog.classList.toggle('open', opening);
    tog.textContent = opening ? '−' : '+';
    if (opening) updateEUSub(gi);
    return;
  }
  // Recruiter training buy
  const ruRow = e.target.closest('.ru-row');
  if (ruRow) {
    buyRU(+ruRow.dataset.ui);
    updateRUSub();
    return;
  }
  // Facility Director training buy
  const fuRow = e.target.closest('.fu-row');
  if (fuRow) {
    buyFU(+fuRow.dataset.ui);
    updateFUSub();
    return;
  }
  // Coder equipment buy
  const euRow = e.target.closest('.eu-row');
  if (euRow) {
    const gi = +euRow.dataset.gi, ui = +euRow.dataset.ui;
    buyEU(gi, ui);
    updateEUSub(gi);
    return;
  }
  const up = e.target.closest('.up');
  if (up) {
    const a = up.dataset.a;
    if (a === 'g') buyGen(+up.dataset.i);
    else if (a === 'c') buyClk(+up.dataset.i);
    else if (a === 'ss') buySS(+up.dataset.i);
    else if (a === 'f') buyFame(+up.dataset.b, +up.dataset.u);
    return;
  }
  if (e.target.id === 'shipBtn') {
    const cf = document.getElementById('shipConfirm');
    document.getElementById('shipWarnText').textContent = t('shipWarn');
    document.getElementById('shipYes').textContent = t('shipConfirm');
    document.getElementById('shipNo').textContent = t('shipCancel');
    cf.classList.toggle('show');
    return;
  }
  if (e.target.id === 'shipYes') { document.getElementById('shipConfirm').classList.remove('show'); ship(); return; }
  if (e.target.id === 'shipNo') { document.getElementById('shipConfirm').classList.remove('show'); return; }
});

function updateEUSub(gi) {
  const sub = document.getElementById('eu-sub-' + gi);
  if (!sub || !sub.classList.contains('show')) return;
  const rows = sub.querySelectorAll('.eu-row');
  rows.forEach((r, ui) => {
    const tier = S.eu[gi][ui];
    const maxTier = EMP_UPS[ui].tiers.length;
    const maxed = tier >= maxTier;
    const nextTier = maxed ? null : EMP_UPS[ui].tiers[tier];
    const c = maxed ? Infinity : euCost(gi, ui);
    const afford = !maxed && S.loc >= c && S.g[gi] >= 1;
    r.querySelector('.eu-row-name').textContent = maxed ? ta('eu_'+ui+'_'+(maxTier-1)+'_name', EMP_UPS[ui].tiers[maxTier - 1].name) : ta('eu_'+ui+'_'+tier+'_name', nextTier.name);
    r.querySelector('.eu-row-desc').textContent = maxed ? t('maxLvl') : ta('eu_'+ui+'_'+tier+'_desc', nextTier.desc);
    r.querySelector('.eu-row-cost').textContent = maxed ? '' : fmt(c);
    r.querySelector('.eu-row-lvl').textContent = tier > 0 ? '\u2605'.repeat(tier) : '';
    r.classList.toggle('no', !afford && !maxed);
    r.style.opacity = maxed ? '.6' : '';
    r.style.cursor = maxed ? 'default' : '';
  });
}

// ========== GAME LOOP ==========
let last = performance.now(), saveAcc = 0;

function tick(now) {
  const dt = Math.min((now - last) / 1000, 1); // cap dt to prevent huge jumps
  last = now;

  recalcIfDirty();
  const sa = shipAt(); // cache for this frame

  // Random events
  tickEvents(dt);
  acTick();

  // Click streak system
  const nowMs = performance.now();
  const cutoff = nowMs - STREAK_WINDOW;
  ctTrim(cutoff);
  const cps = _ctN / STREAK_DIV;
  if (S.f.streakUnlock) {
    const sMax = 2 + S.f.streakPower + 2 * S.f.streakTurbo;
    const growRate = S.f.streakMastery ? STREAK_GROW * 2 : STREAK_GROW;
    let decayRate = S.f.streakMastery ? STREAK_DECAY / 2 : STREAK_DECAY;
    // Second Wind: streak decays 50% slower per level
    if (S.f.streakSecondWind) decayRate *= (0.5 ** S.f.streakSecondWind);
    const streakFloor = S.f.streakTranscend ? 1.5 : 1; // Transcendence: min floor
    if (cps >= 3) {
      streakMul = Math.min(sMax, streakMul + dt * growRate);
    } else if (nowMs - lastClickTime > STREAK_DECAY_DELAY && streakMul > streakFloor) {
      streakMul = Math.max(streakFloor, streakMul - dt * decayRate);
    }
  } else {
    streakMul = 1;
  }
  // The Zone: at max streak, +25% production per level
  const zoneMul = (S.f.streakZone && S.f.streakUnlock && streakMul >= (2 + S.f.streakPower + 2 * S.f.streakTurbo) * 0.99) ? (1 + 0.25 * S.f.streakZone) : 1;

  // Nap Pod burst (every NAP_INTERVAL s)
  if (S.c[P.NAP] > 0) {
    napTimer += dt;
    // Hackathon: burst interval shorter by 50% per level (more frequent bursts)
    const napInterval = NAP_INTERVAL / (1 + 0.5 * S.f.clickHackathon);
    if (napTimer >= napInterval) {
      napTimer = 0;
      const burst = lps() * NAP_BURST_MUL * S.c[P.NAP] * (S.f.clickFrenzy ? 5 : 1) * streakMul * zoneMul * acPenalty();
      S.loc += burst; S.tLoc += burst;
      toast(t('napBurst') + ' +' + fmt(burst) + ' ' + t('loc'));
    }
  }
  // Caffeine IV: auto-clicks advance nap timer faster
  if (S.f.clickCaffeine && S.c[P.NAP] > 0) {
    const acTicks = (S.f.autoClick + S.f.autoBotnet * 2 + petAutoClick());
    if (acTicks > 0) napTimer += dt * acTicks * 0.3;
  }

  // Production
  const rate = lps();
  const acRate = (S.f.autoClick + S.f.autoBotnet * 2 + petAutoClick()) * clickPow();
  const totalProd = (rate + acRate) * dt * streakMul * zoneMul * acPenalty();
  S.loc += totalProd;
  S.tLoc += totalProd;

  // Pet dog animation
  if (!_petEl) _petEl = document.getElementById('petDog');
  const petEl = _petEl;
  if (petEl) {
    const hasPet = petAutoClick() > 0;
    petEl.classList.toggle('active', hasPet);
    if (hasPet) {
      petPawTimer += dt;
      if (petPawTimer >= 1) {
        petPawTimer = 0;
        petEl.classList.remove('paw');
        requestAnimationFrame(() => { if (petEl) petEl.classList.add('paw'); });
        // Dog adds a code line to the screen
        codeVisible.push(CODE_LINES[codeIdx % CODE_LINES.length]);
        codeIdx++;
        if (codeVisible.length > 10) codeVisible.shift();
        scr.textContent = codeVisible.join('\n');
      }
    }
  }

  // Era & perk visuals
  updateDeskScene();
  updateMusic();

  // Auto-ship
  if (S.f.publisher && S.tLoc >= sa) ship();

  // Update top bar
  dYear.textContent = currentYear();
  dCat.textContent = getLandmark(currentYear()).cat;
  dLoc.textContent = fmt(S.loc);
  dLps.textContent = fmt(rate + acRate) + '/s';
  dFame.textContent = S.fame + (S.tFame > S.fame ? ' /' + S.tFame : '');
  dCp.textContent = '+' + fmt(clickPow()) + ' ' + t('locPerClick');
  const fm = fameMul();
  const parts = [];
  if (fm > 1) parts.push(t('fame') + ' \u00d7' + fm.toFixed(1));
  if (S.c[P.NAP] > 0) parts.push(t('napIn') + ' ' + Math.ceil(NAP_INTERVAL - napTimer) + 's');
  if (activeEvent && !activeEvent.pending) parts.push(activeEvent.name + ' ' + Math.ceil(activeEvent.remaining) + 's');
  else if (activeEvent && activeEvent.pending) parts.push(activeEvent.name + ' ' + t('choose'));
  dFm.textContent = parts.join(' \u2022 ');
  updateThermo();

  // Progress bar
  const pct = Math.min(S.tLoc / sa, 1);
  pFill.style.transform = 'scaleX(' + pct + ')';
  pTxt.textContent = '';
  const gain = fameGain();
  const lm = getLandmark(currentYear());
  shipBtn.textContent = t('shipVerb') + ' ' + lm.parody + '! (+' + gain + ' ' + t('fame') + ')';
  shipBtn.classList.toggle('show', S.tLoc >= sa && !S.f.publisher);

  // Find best-value coder (requires Secretary)
  let bestIdx = -1, bestEff = 0;
  if (S.ss[SS.SECRETARY] >= 1) {
    for (let i = 0; i < GEN.length; i++) {
      const eff = GEN[i].rate * euMul(i) / gCost(i);
      if (eff > bestEff) { bestEff = eff; bestIdx = i; }
    }
  }

  // Recruiter auto-hires best coder
  const hiringInterval = (S.ru[1] >= 1 ? RECRUITER_FAST : RECRUITER_SLOW) / (1 + 0.02 * ((S.trainerSSLvl && S.trainerSSLvl[SS.RECRUITER]) || 0));
  if (S.ss[SS.RECRUITER] >= 1 && bestIdx >= 0 && !S.sp[SS.RECRUITER]) {
    buyerTimer += dt;
    if (buyerTimer >= hiringInterval) {
      buyerTimer = 0;
      if (S.ss[SS.TRAINER] && S.trainerSSCount) { S.trainerSSCount[SS.RECRUITER] = (S.trainerSSCount[SS.RECRUITER]||0)+1; if (S.trainerSSCount[SS.RECRUITER]>=3){S.trainerSSCount[SS.RECRUITER]=0;S.trainerSSLvl[SS.RECRUITER]=(S.trainerSSLvl[SS.RECRUITER]||0)+1;} }
      const hireCount = S.ru[0] >= 1 ? 2 : 1;
      // Headhunter: hire top 3 best-value types
      if (S.ru[2] >= 1) {
        const ranked = [];
        for (let i = 0; i < GEN.length; i++) {
          ranked.push({ i, eff: GEN[i].rate * euMul(i) / gCost(i) });
        }
        ranked.sort((a, b) => b.eff - a.eff);
        const top = ranked.slice(0, 3);
        for (const tgt of top) {
          let hired = 0;
          for (let h = 0; h < hireCount; h++) {
            const c = gCost(tgt.i);
            if (S.loc >= c) { S.loc -= c; S.g[tgt.i]++; hired++; markDirty(); }
          }
          if (hired) log('\uD83E\uDD16 ' + t('recruiterHired') + (hired > 1 ? ' ' + hired + '\u00d7 ' : ': ') + ta('gen_'+tgt.i+'_name', GEN[tgt.i].name));
        }
      } else {
        let hired = 0;
        for (let h = 0; h < hireCount; h++) {
          const c = gCost(bestIdx);
          if (S.loc >= c) { S.loc -= c; S.g[bestIdx]++; hired++; markDirty(); }
        }
        if (hired) log('\uD83E\uDD16 ' + t('recruiterHired') + (hired > 1 ? ' ' + hired + '\u00d7 ' : ': ') + ta('gen_'+bestIdx+'_name', GEN[bestIdx].name));
      }
    }
  }
  // Update recruiter progress bar
  if (!_rFill) _rFill = document.getElementById('recruiterFill');
  const rFill = _rFill;
  if (rFill) {
    if (S.ss[SS.RECRUITER] >= 1 && !S.sp[SS.RECRUITER]) {
      rFill.style.width = Math.min(buyerTimer / hiringInterval * 100, 100) + '%';
    } else {
      rFill.style.width = '0%';
    }
  }

  // Update facility director progress bar
  const facilityInterval = (S.fu[0] >= 1 ? FACILITY_FAST : FACILITY_SLOW) / (1 + 0.02 * ((S.trainerSSLvl && S.trainerSSLvl[SS.FACILITY]) || 0));
  if (!_fFill) _fFill = document.getElementById('facilityFill');
  const fFill = _fFill;
  if (fFill) {
    if (S.ss[SS.FACILITY] >= 1 && !S.sp[SS.FACILITY]) {
      fFill.style.width = Math.min(facilityTimer / facilityInterval * 100, 100) + '%';
    } else {
      fFill.style.width = '0%';
    }
  }

  // Facility Director auto-buys equipment (with training upgrades)
  if (S.ss[SS.FACILITY] >= 1 && !S.sp[SS.FACILITY]) {
    facilityTimer += dt;
    if (facilityTimer >= facilityInterval) {
      facilityTimer = 0;
      if (S.ss[SS.TRAINER] && S.trainerSSCount) { S.trainerSSCount[SS.FACILITY] = (S.trainerSSCount[SS.FACILITY]||0)+1; if (S.trainerSSCount[SS.FACILITY]>=3){S.trainerSSCount[SS.FACILITY]=0;S.trainerSSLvl[SS.FACILITY]=(S.trainerSSLvl[SS.FACILITY]||0)+1;} }
      const buyCount = S.fu[1] >= 1 ? 2 : 1;
      for (let b = 0; b < buyCount; b++) {
        let best = null, bestScore = S.fu[2] >= 1 ? 0 : Infinity;
        for (let gi = 0; gi < GEN.length; gi++) {
          if (S.g[gi] < 1) continue;
          for (let ui = 0; ui < EMP_UPS.length; ui++) {
            const tier = S.eu[gi][ui];
            if (tier >= EMP_UPS[ui].tiers.length) continue;
            const c = euCost(gi, ui);
            if (S.fu[2] >= 1) {
              // Contractor: best value (mult gain per cost)
              const curMul = tier > 0 ? EMP_UPS[ui].tiers[tier - 1].mult : 1;
              const nextMul = EMP_UPS[ui].tiers[tier].mult;
              const val = (nextMul / curMul - 1) / c;
              if (val > bestScore) { bestScore = val; best = { gi, ui, c }; }
            } else {
              // Default: cheapest
              if (c < bestScore) { bestScore = c; best = { gi, ui, c }; }
            }
          }
        }
        if (best && S.loc >= best.c) {
          S.loc -= best.c;
          const tier = S.eu[best.gi][best.ui];
          S.eu[best.gi][best.ui]++;
          markDirty();
          log('\uD83E\uDD16 ' + t('logUpgraded') + ' ' + ta('gen_'+best.gi+'_name', GEN[best.gi].name) + ' \u2192 ' + ta('eu_'+best.ui+'_'+tier+'_name', EMP_UPS[best.ui].tiers[tier].name));
        }
      }
    }
  }

  // Office Manager auto-buys cheapest office perk
  if (S.ss[SS.MANAGER] >= 1 && !S.sp[SS.MANAGER]) {
    managerTimer += dt;
    if (managerTimer >= MANAGER_INTERVAL / (1 + 0.02 * ((S.trainerSSLvl && S.trainerSSLvl[SS.MANAGER]) || 0))) {
      managerTimer = 0;
      if (S.ss[SS.TRAINER] && S.trainerSSCount) { S.trainerSSCount[SS.MANAGER] = (S.trainerSSCount[SS.MANAGER]||0)+1; if (S.trainerSSCount[SS.MANAGER]>=3){S.trainerSSCount[SS.MANAGER]=0;S.trainerSSLvl[SS.MANAGER]=(S.trainerSSLvl[SS.MANAGER]||0)+1;} }
      let cheapIdx = -1, cheapCost = Infinity;
      for (let i = 0; i < CLK.length; i++) {
        if (S.c[i] >= 1) continue;
        const c = cCost(i);
        if (c < cheapCost) { cheapCost = c; cheapIdx = i; }
      }
      if (cheapIdx >= 0 && S.loc >= cheapCost) {
        S.loc -= cheapCost;
        S.c[cheapIdx] = 1;
        markDirty();
        const mName = ta('clk_'+cheapIdx+'_name', CLK[cheapIdx].name);
        toast(t('managerBought') + ': ' + mName);
        log('\uD83E\uDD16 ' + t('managerBought') + ': ' + mName);
      }
    }
  }
  // Update manager progress bar
  if (!_mFill) _mFill = document.getElementById('managerFill');
  const mFill = _mFill;
  if (mFill) {
    if (S.ss[SS.MANAGER] >= 1 && !S.sp[SS.MANAGER]) {
      mFill.style.width = Math.min(managerTimer / MANAGER_INTERVAL * 100, 100) + '%';
    } else {
      mFill.style.width = '0%';
    }
  }

  // Trainer: level up random owned coder every 30s
  if (S.ss[SS.TRAINER] >= 1 && !S.sp[SS.TRAINER]) {
    trainerTimer += dt;
    if (trainerTimer >= 30) {
      trainerTimer = 0;
      const owned = [];
      for (let i = 0; i < GEN.length; i++) if (S.g[i] > 0) owned.push(i);
      if (owned.length > 0) {
        const pick = owned[Math.floor(Math.random() * owned.length)];
        S.trainerLvl[pick] = (S.trainerLvl[pick] || 0) + 1;
        markDirty();
        log('🏋️ ' + t('trainerLvlUp') + ': ' + ta('g'+pick, GEN[pick].name) + ' Lv' + S.trainerLvl[pick]);
      }
    }
  }

  // NYT headline at 25% ship progress (random pick from 5)
  if (!nytShown && pct >= 0.25) {
    nytShown = true;
    const yr = currentYear();
    const hls = NYT_HEADLINES[yr];
    if (hls) showNYTBanner(yr, hls[Math.floor(Math.random() * hls.length)]);
  }

  // Milestone checks (alongside achievements)
  achCheckAcc += dt;
  if (achCheckAcc >= ACH_CHECK_INTERVAL) {
    achCheckAcc = 0;
    checkAchievements();
    for (let mi = 0; mi < MILESTONES.length; mi++) {
      const m = MILESTONES[mi];
      if (!S.milestones.includes(m.id) && S.tLoc >= m.threshold) {
        S.milestones.push(m.id);
        const msMsg = ta('ms_'+mi, m.msg);
        toast('\u{1F3C6} ' + t('milestone') + ': ' + msMsg);
        log('\u{1F3C6} ' + t('milestone') + ': ' + msMsg);
        playSfx('milestone');
      }
    }
  }

  // Offline progress toast (deferred from load)
  if (pendingOfflineMsg) {
    toast(pendingOfflineMsg);
    pendingOfflineMsg = null;
  }

  // Update upgrade rows
  for (let r = 0; r < upRefs.length; r++) {
    const ref = upRefs[r];
    const { action: a, el, costEl, ownEl } = ref;
    let cost, owned, afford, locked = false, maxed = false;

    if (a === 'g') {
      const i = ref.idx;
      const gUnlocked = 3 + Math.floor(S.shipped / 2);
      const isNext = i === gUnlocked && i < GEN.length;
      locked = i > gUnlocked;
      if (isNext) {
        afford = false;
        costEl.textContent = '';
        ownEl.textContent = '\u{1F512}';
        if (ref.rateEl) ref.rateEl.textContent = '';
        el.classList.remove('best');
      } else if (i < gUnlocked) {
        const n = effectiveQty(gMax, i);
        const strictBulk = buyQty !== Infinity && buyQty > 1;
        cost = strictBulk ? gBulkCost(i, buyQty) : (n > 0 ? gBulkCost(i, n) : gCost(i));
        owned = S.g[i]; afford = strictBulk ? (n >= buyQty && S.loc >= cost) : (n > 0 && S.loc >= cost);
        costEl.textContent = fmt(cost);
        const tLv = (S.trainerLvl && S.trainerLvl[i]) || 0;
        ownEl.textContent = owned ? '×' + owned + (tLv > 0 ? ' Lv' + tLv : '') : '';
        if (ref.rateEl) {
          const perUnit = GEN[i].rate * euMul(i) * genSpeedMul() * genSynergyMul() * prodMul();
          ref.rateEl.textContent = owned ? fmt(perUnit * owned) + '/s (+' + fmt(perUnit) + ')' : '+' + fmt(perUnit) + '/s';
        }
        el.classList.toggle('best', i === bestIdx);
      }
    } else if (a === 'c') {
      const i = ref.idx;
      const cUnlocked = 3 + Math.floor(S.shipped / 2);
      const isNext = i === cUnlocked && i < CLK.length;
      locked = i > cUnlocked;
      if (isNext) {
        afford = false;
        costEl.textContent = '';
        ownEl.textContent = '\u{1F512}';
      } else if (i < cUnlocked) {
        owned = S.c[i]; maxed = owned >= 1;
        cost = cCost(i); afford = !maxed && S.loc >= cost;
        costEl.textContent = maxed ? '' : fmt(cost);
        ownEl.textContent = maxed ? '\u2713' : '';
      }
    } else if (a === 'ss') {
      const i = ref.idx;
      const ssUnlocked = 1 + Math.floor(S.shipped / 2);
      const isNext = i === ssUnlocked && i < SUPPORT.length;
      locked = i > ssUnlocked;
      if (isNext) {
        afford = false;
        costEl.textContent = '';
        ownEl.textContent = '\u{1F512}';
      } else if (i < ssUnlocked) {
        owned = S.ss[i]; maxed = owned >= 1;
        cost = ssCost(i); afford = !maxed && S.loc >= cost;
        costEl.textContent = maxed ? '' : fmt(cost);
        const ssLv = (S.trainerSSLvl && S.trainerSSLvl[i]) || 0;
        ownEl.textContent = maxed ? '\u2713' + (ssLv > 0 ? ' Lv' + ssLv : '') : '';
      }
    } else if (a === 'cb') {
      const i = ref.idx;
      const unlocked = i < S.cb;
      const isNext = i === S.cb;
      owned = unlocked ? 1 : 0; maxed = unlocked;
      afford = false; locked = !unlocked && !isNext;
      ownEl.textContent = unlocked ? '\u2713' : isNext ? '\u{1F512}' : '';
    }

    el.classList.toggle('no', !afford && !maxed);
    el.classList.toggle('maxed', maxed);
    el.classList.toggle('hide', locked);
  }

  // Update Max button label on hover
  if (maxBtn) maxBtn.textContent = hoveredGen >= 0 ? '×' + gMax(hoveredGen) : t('max');

  // Update open coder/recruiter/facility submenus
  for (let gi = 0; gi < GEN.length; gi++) updateEUSub(gi);
  updateRUSub();
  updateFUSub();

  // Autosave every 30s
  saveAcc += dt;
  if (saveAcc >= AUTOSAVE_INTERVAL) { saveAcc = 0; save(); }

  requestAnimationFrame(tick);
}

// ========== SLOT SCREEN ==========
const slotRow = $('slotRow');
const slotsEl = $('slots');
const gameEl = $('G');

function buildSlots() {
  slotRow.innerHTML = '';
  for (let n = 1; n <= 3; n++) {
    const btn = document.createElement('div');
    btn.className = 'slot-btn';
    btn.dataset.slot = n;
    const data = peekSlot(n);
    let info = t('empty');
    if (data) {
      const parts = [];
      if (data.fame) parts.push(data.fame + ' ' + t('fame'));
      if (data.shipped) parts.push(data.shipped + ' ' + t('softwareShipped'));
      if (!parts.length) parts.push(t('inProgress'));
      info = parts.join(' \u2022 ');
    }
    let html = '<div class="slot-num">' + n + '</div><div class="slot-info">' + info + '</div>';
    if (data) {
      html += '<button class="slot-new" data-reset="' + n + '">' + t('newGame') + '</button>';
      html += '<div class="slot-confirm" id="confirm-' + n + '">' + t('eraseSave') + '<div class="slot-confirm-btns">'
        + '<button class="slot-yes" data-wipe="' + n + '">' + t('yes') + '</button>'
        + '<button class="slot-no" data-cancel="' + n + '">' + t('no') + '</button></div></div>';
    }
    btn.innerHTML = html;
    slotRow.appendChild(btn);
  }
}
function applyLang() {
  // Update slot screen
  document.querySelector('.slot-title').textContent = t('slotTitle');
  document.querySelector('.slot-sub').textContent = t('slotSub');
  // Highlight active flag
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  buildSlots();
  // Update top bar labels
  const labels = document.querySelectorAll('.stat-lbl');
  if (labels.length >= 5) {
    labels[0].textContent = t('year');
    labels[1].textContent = t('developing');
    labels[2].textContent = t('linesOfCode');
    labels[3].textContent = t('locSec');
    labels[4].textContent = t('fame');
  }
  // Update click area
  const ci = document.querySelector('.click-info');
  if (ci) ci.textContent = t('clickInfo');
  // Rebuild game UI if in-game
  if (!gameEl.classList.contains('hidden')) {
    upRefs.length = 0;
    maxBtn = null;
    buildUI();
  }
}

// Flag click handler
document.getElementById('langBar').addEventListener('click', e => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  lang = btn.dataset.lang;
  localStorage.setItem('gdc_lang', lang);
  applyLang();
});

buildSlots();
applyLang();

slotRow.addEventListener('click', e => {
  // New Game button — show confirmation
  const resetBtn = e.target.closest('.slot-new');
  if (resetBtn) {
    e.stopPropagation();
    const n = resetBtn.dataset.reset;
    const conf = document.getElementById('confirm-' + n);
    if (conf) conf.classList.add('show');
    resetBtn.style.display = 'none';
    return;
  }
  // Confirm wipe
  const wipeBtn = e.target.closest('.slot-yes');
  if (wipeBtn) {
    e.stopPropagation();
    const n = wipeBtn.dataset.wipe;
    localStorage.removeItem('gdc_save_' + n);
    buildSlots();
    return;
  }
  // Cancel wipe
  const cancelBtn = e.target.closest('.slot-no');
  if (cancelBtn) {
    e.stopPropagation();
    const n = cancelBtn.dataset.cancel;
    const conf = document.getElementById('confirm-' + n);
    if (conf) conf.classList.remove('show');
    const rb = slotRow.querySelector('.slot-new[data-reset="' + n + '"]');
    if (rb) rb.style.display = '';
    return;
  }
  // Load slot
  const btn = e.target.closest('.slot-btn');
  if (!btn) return;
  KEY = 'gdc_save_' + btn.dataset.slot;
  S = defaults();
  load();
  slotsEl.classList.add('hidden');
  gameEl.classList.remove('hidden');
  buildUI();
  eventCooldown = 135 + Math.random() * 135;
  achCheckAcc = 0;
  last = performance.now();
  requestAnimationFrame(tick);
});

window.addEventListener('beforeunload', () => { if (!gameEl.classList.contains('hidden')) save(); });

// ========== MOBILE TAB SYSTEM ==========
(function initMobileTabs() {
  const mq = window.matchMedia('(max-width:768px)');
  const tabs = document.createElement('div');
  tabs.className = 'mob-tabs';
  const tabDefs = [
    { key:'desk', icon:'\u{1F5A5}\uFE0F' },
    { key:'coders', icon:'\u{1F465}' },
    { key:'upgrades', icon:'\u{1F527}', labelKey:'officePerks' },
    { key:'log', icon:'\u{1F4CB}', labelKey:'activityLog' }
  ];
  tabDefs.forEach(td => {
    const btn = document.createElement('button');
    btn.className = 'mob-tab';
    btn.dataset.tab = td.key;
    const ico = document.createElement('span');
    ico.className = 'mob-tab-icon';
    ico.textContent = td.icon;
    const lbl = document.createElement('span');
    lbl.textContent = t(td.labelKey || td.key);
    btn.append(ico, lbl);
    tabs.appendChild(btn);
  });
  document.body.appendChild(tabs);

  function activate(key) {
    gameEl.dataset.tab = key;
    tabs.querySelectorAll('.mob-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === key));
  }
  tabs.addEventListener('click', e => {
    const btn = e.target.closest('.mob-tab');
    if (btn) activate(btn.dataset.tab);
  });

  function onResize(e) {
    if (e.matches) {
      if (!gameEl.dataset.tab) activate('desk');
    } else {
      delete gameEl.dataset.tab;
    }
  }
  mq.addEventListener('change', onResize);
  onResize(mq);
})();

// ========== VERSION CHECK ==========
(function versionCheck() {
  let dismissed = false;
  function check() {
    if (dismissed) return;
    fetch('version.json?_=' + Date.now())
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data || !data.version) return;
        if (data.version !== GAME_VERSION) showUpdateBanner(data.version);
      })
      .catch(() => {});  // silently ignore network errors
  }
  function showUpdateBanner(newVer) {
    if (document.querySelector('.update-banner')) return;
    const bar = document.createElement('div');
    bar.className = 'update-banner';
    bar.innerHTML = '\u26A1 A new version (v' + newVer + ') is available!';
    const refreshBtn = document.createElement('button');
    refreshBtn.style.cssText = 'margin-left:8px;padding:4px 12px;background:#fff;color:#1f6feb;border:none;border-radius:4px;font-weight:700;font-size:.8rem;cursor:pointer';
    refreshBtn.textContent = 'Refresh';
    refreshBtn.onclick = function(e) { e.stopPropagation(); location.reload(); };
    bar.appendChild(refreshBtn);
    const close = document.createElement('button');
    close.className = 'ub-close';
    close.textContent = '\u2715';
    close.onclick = function(e) { e.stopPropagation(); bar.remove(); dismissed = true; };
    bar.appendChild(close);
    document.body.appendChild(bar);
  }
  check();
  setInterval(check, 60000);
})();
</script>
