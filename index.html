<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Dev Clicker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;height:100vh;overflow:hidden;user-select:none}

.game{display:flex;flex-direction:column;height:100vh}

/* Top Bar */
.top-bar{position:relative;display:flex;justify-content:space-around;align-items:center;padding:10px 20px;background:#161b22;border-bottom:1px solid #30363d}
.stat{text-align:center}
.stat-val{font-size:1.4rem;font-weight:700;color:#58a6ff;font-variant-numeric:tabular-nums}
#dCat{font-size:1rem;color:#8b949e}
.stat-lbl{font-size:.7rem;color:#8b949e;text-transform:uppercase;letter-spacing:.05em}
.fame .stat-val{color:#f0883e}

/* Main Layout */
.main{display:flex;flex:1;overflow:hidden}
.left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow:hidden}
.left-panel{width:300px;min-width:180px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;padding:10px;flex-shrink:1;position:relative;z-index:2}
.right{width:500px;min-width:400px;background:#161b22;border-left:1px solid #30363d;display:flex;flex-shrink:1;position:relative;z-index:2}
.right-log{flex:1;min-width:0;display:flex;flex-direction:column;padding:10px;border-right:1px solid #21262d}
.right-coders{flex:1;min-width:0;overflow-y:auto;padding:10px}

/* Desk Scene */
.desk-scene{position:relative;display:flex;flex-direction:column;align-items:center;transform:scale(2);transform-origin:top center;margin-bottom:200px}
.monitor{cursor:pointer;position:relative;z-index:2}
.monitor:active .screen{transform:scale(.96)}
.computer-housing{position:relative;display:inline-block}
.computer-extra{display:none}
.screen{width:220px;height:150px;background:#1c2128;border:3px solid #444c56;border-radius:10px 10px 6px 6px;display:flex;align-items:flex-end;justify-content:flex-start;font-family:'Cascadia Code','Fira Code',monospace;font-size:.65rem;color:#7ee787;padding:8px 10px;line-height:1.4;white-space:pre;overflow:hidden;transition:transform .1s,box-shadow .15s}
.screen.pulse{box-shadow:0 0 20px #58a6ff55}
.stand{width:50px;height:14px;background:linear-gradient(#444c56,#3a424b);margin:0 auto}
.base{width:90px;height:5px;background:#444c56;margin:0 auto;border-radius:0 0 3px 3px}

/* Desk */
.desk{width:320px;height:10px;background:linear-gradient(180deg,#6b4226,#5a3520);border-radius:2px;margin-top:-1px;z-index:1;position:relative;box-shadow:0 3px 8px rgba(0,0,0,.4)}
.desk::after{content:'';display:block;width:300px;height:5px;background:linear-gradient(180deg,#5a3520,#4a2a18);margin:0 auto;border-radius:0 0 2px 2px}
.desk-scene.has-standing .desk{height:14px}
.desk-scene.has-standing .desk::before{content:'';position:absolute;top:100%;left:40px;width:6px;height:36px;background:linear-gradient(90deg,#5a3520,#4a2a18);border-radius:0 0 2px 2px}
.desk-scene.has-standing .desk::after{position:absolute;top:100%;right:40px;left:auto;width:6px;height:36px;margin:0;border-radius:0 0 2px 2px}

/* Era: Apple II (1979-1984) */
.era-apple2 .computer-housing{background:#d4c8a0;border:3px solid #b8a878;border-radius:8px;padding:10px 12px 6px}
.era-apple2 .screen{border-color:#2a2a1a;border-radius:6px}
.era-apple2 .stand{display:none}
.era-apple2 .base{width:248px;height:18px;background:linear-gradient(180deg,#c8bc90,#b8a878);border-radius:0 0 4px 4px}
.era-apple2 .base::before{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:180px;height:3px;background:#a89868;border-radius:1px}
/* Era: Macintosh Classic (1985-1993) */
.era-mac .computer-housing{background:#e8dcc8;border:3px solid #d0c4a8;border-radius:6px 6px 0 0;padding:14px 16px 8px;position:relative}
.era-mac .computer-housing::after{content:'';position:absolute;bottom:5px;right:14px;width:26px;height:3px;background:#888;border-radius:1px}
.era-mac .screen{border-color:#333;border-radius:8px}
.era-mac .stand{width:256px;height:6px;background:#d0c4a8;margin:0 auto}
.era-mac .base{width:256px;height:18px;background:linear-gradient(180deg,#e0d4b8,#d0c4a8);border-radius:0 0 4px 4px}
/* Era: Beige PC + CRT (1994-1998) */
.era-beige-pc .computer-housing{background:#d8d0b8;border:4px solid #c0b898;border-radius:10px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.era-beige-pc .screen{border-color:#555;border-radius:8px}
.era-beige-pc .stand{width:60px;height:16px;background:linear-gradient(#c0b898,#b0a888);margin:0 auto}
.era-beige-pc .base{width:120px;height:5px;background:#b0a888;border-radius:0 0 3px 3px}
.era-beige-pc .computer-extra{display:block;position:absolute;right:-52px;bottom:0;width:34px;height:88px;background:linear-gradient(90deg,#d8d0b8,#c8c0a8);border:2px solid #b0a888;border-radius:2px;z-index:1}
.era-beige-pc .computer-extra::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:14px;height:3px;background:#555;border-radius:1px}
.era-beige-pc .computer-extra::after{content:'';position:absolute;top:20px;left:50%;transform:translateX(-50%);width:5px;height:5px;background:#2a2;border-radius:50%}
/* Era: iMac G3 (1999-2005) */
.era-imac-g3 .computer-housing{background:linear-gradient(160deg,rgba(58,138,170,.6),rgba(42,122,154,.5));border:3px solid #4a9aba;border-radius:16px;padding:10px;box-shadow:0 0 14px #4a9aba33,inset 0 0 20px rgba(255,255,255,.08)}
.era-imac-g3 .screen{border-color:#2a6a8a;border-radius:10px}
.era-imac-g3 .stand{display:none}
.era-imac-g3 .base{width:220px;height:28px;background:linear-gradient(180deg,rgba(58,138,170,.4),rgba(42,122,154,.3));border-radius:0 0 18px 18px;margin:0 auto}
/* Era: iMac Aluminum (2006-2014) */
.era-imac-alu .computer-housing{background:#c8c8c8;border:2px solid #aaa;border-radius:3px;padding:4px 5px 16px;position:relative}
.era-imac-alu .computer-housing::after{content:'';position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:16px;height:2px;background:#888;border-radius:1px}
.era-imac-alu .screen{border-color:#222;border-radius:1px;border-width:2px}
.era-imac-alu .stand{width:14px;height:26px;background:linear-gradient(90deg,#b0b0b0,#c0c0c0,#b0b0b0);margin:0 auto}
.era-imac-alu .base{width:68px;height:3px;background:linear-gradient(90deg,#a0a0a0,#b0b0b0,#a0a0a0);border-radius:0 0 2px 2px}
/* Era: Modern Ultrawide (2015+) */
.era-ultrawide .computer-housing{background:#111;border:2px solid #222;border-radius:4px;padding:3px 22px}
.era-ultrawide .screen{border-color:#1a1a1a;border-width:2px;border-radius:2px}
.era-ultrawide .stand{width:8px;height:26px;background:linear-gradient(90deg,#2a2a2a,#333,#2a2a2a);margin:0 auto}
.era-ultrawide .base{width:50px;height:3px;background:#2a2a2a;border-radius:2px}

/* Perk Items */
.perk-item{display:none;position:absolute;pointer-events:none;z-index:3;transition:opacity .3s}
.perk-item.active{display:block}
@keyframes perkPop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.perk-energy{top:2px;left:16px;font-size:1rem}
.perk-lunch{top:2px;right:16px;font-size:1.1rem}
.perk-daycare{bottom:-20px;left:-14px;font-size:1.3rem}
.perk-gym{bottom:-20px;right:-14px;font-size:1.2rem}
.perk-gameroom{top:2px;left:70px;font-size:1.1rem}
.perk-pto{top:-20px;right:-24px;font-size:1.5rem}
.perk-nap{bottom:-20px;right:30px;font-size:1.2rem}
.perk-retreat{top:2px;right:70px;font-size:1rem}

/* Pet dog auto-clicker */
.pet-dog{position:absolute;bottom:-16px;right:-56px;font-size:2.8rem;opacity:0;transition:opacity .4s;pointer-events:none;z-index:3}
.pet-dog.active{opacity:1}
.pet-dog.paw{animation:pawTap .3s ease}
@keyframes pawTap{0%{transform:scaleX(-1) translateY(0)}40%{transform:scaleX(-1) translateY(-6px)}100%{transform:scaleX(-1) translateY(0)}}
.click-info{color:#8b949e;font-size:1.6rem}
.lang-bar{display:flex;justify-content:center;gap:8px;margin-top:12px}
.lang-btn{background:none;border:2px solid transparent;border-radius:6px;font-size:1.4rem;cursor:pointer;padding:4px 8px;opacity:.6;transition:opacity .15s,border-color .15s}
.lang-btn:hover{opacity:.9}
.lang-btn.active{opacity:1;border-color:#58a6ff}
.click-power{color:#58a6ff;font-size:1.7rem;font-weight:600}
.fame-mult{color:#f0883e;font-size:1.5rem}

/* Floating +LoC */
.float{position:fixed;pointer-events:none;color:#7ee787;font-weight:700;font-size:1rem;z-index:50;animation:floatUp .7s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}

/* Upgrade Sections */
.sec{font-size:.7rem;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px;padding-bottom:3px;border-bottom:1px solid #30363d}
.streak-thermo{position:absolute;right:-38px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;transition:opacity .15s}
.thermo-label{font-size:.65rem;font-weight:700;color:#f0883e;white-space:nowrap}
.thermo-track{width:10px;height:80px;background:#21262d;border-radius:5px;border:1px solid #30363d;position:relative;overflow:hidden}
.thermo-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,#f04040,#f07030,#f0883e,#f0c040);border-radius:0 0 4px 4px;transition:height .08s}
.thermo-tick{position:absolute;left:0;right:0;height:1px;background:#484f5866}
.thermo-bulb{width:16px;height:16px;border-radius:50%;background:#f04040;border:1px solid #30363d;box-shadow:0 0 0 0 #f0404000;transition:background .3s,box-shadow .3s}
.thermo-bulb.hot{background:#f04040;box-shadow:0 0 8px 2px #f0404066}
.thermo-bulb.warm{background:#f0883e;box-shadow:0 0 6px 1px #f0883e44}
.thermo-bulb.cool{background:#484f58}
.sec:first-child{margin-top:0}

/* Upgrade Rows */
.up{display:flex;align-items:center;gap:8px;padding:7px 8px;margin:3px 0;background:#0d1117;border:1px solid #21262d;border-radius:6px;cursor:pointer;transition:border-color .15s,opacity .15s}
.up:hover{border-color:#58a6ff}
.up.no{opacity:.45;cursor:default}
.up.no:hover{border-color:#21262d}
.up.hide{display:none}
.up-info{flex:1;min-width:0}
.up-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.up-desc{font-size:.65rem;color:#8b949e;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.up-cost{font-size:.8rem;font-weight:600;color:#58a6ff;text-align:right;white-space:nowrap;min-width:36px;font-variant-numeric:tabular-nums}
.up-cost.fame{color:#f0883e}
.up-own{font-size:.7rem;color:#8b949e;min-width:20px;text-align:right;font-variant-numeric:tabular-nums}
.up-rate{font-size:.6rem;color:#7ee787;text-align:right;min-width:32px;white-space:nowrap;font-variant-numeric:tabular-nums}
.right-coders .up{flex-wrap:wrap}
.right-coders .up-info{flex-basis:100%;min-width:0}
.right-coders .up-cost{margin-left:auto}
.up.best{border-color:#2ea043;box-shadow:0 0 8px #2ea04355}
.up.maxed{opacity:.6;cursor:default;border-color:#2ea04366}
.up.maxed:hover{border-color:#2ea04366}
.up.maxed .up-own{color:#2ea043}

/* Buy Quantity Selector */
.qty-bar{display:flex;gap:4px;margin-bottom:8px}
.qty-btn{flex:1;padding:5px 0;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#8b949e;font-size:.7rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.qty-btn:hover{border-color:#58a6ff;color:#e6edf3}
.qty-btn.active{background:#58a6ff22;border-color:#58a6ff;color:#58a6ff}

/* Employee Upgrade Submenu */
.eu-toggle{width:20px;height:20px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
.eu-toggle:hover{background:#30363d;color:#e6edf3}
.eu-toggle.open{background:#30363d;color:#58a6ff}
.eu-sub{display:none;margin:2px 0 4px;padding:4px 0 4px 12px;border-left:2px solid #30363d}
.eu-sub.show{display:block}
.eu-row,.ru-row,.fu-row{display:flex;align-items:center;gap:6px;padding:4px 6px;margin:2px 0;background:#0d1117;border:1px solid #21262d;border-radius:4px;cursor:pointer;transition:border-color .15s,opacity .15s;font-size:.7rem}
.eu-row:hover,.ru-row:hover,.fu-row:hover{border-color:#58a6ff}
.eu-row.no,.ru-row.no,.fu-row.no{opacity:.45;cursor:default}
.eu-row.no:hover,.ru-row.no:hover,.fu-row.no:hover{border-color:#21262d}
.eu-row-name{font-weight:600;color:#e6edf3;min-width:60px}
.eu-row-desc{color:#8b949e;flex:1;font-size:.6rem}
.eu-row-cost{color:#58a6ff;font-weight:600;font-size:.7rem}
.eu-row-lvl{color:#8b949e;font-size:.65rem;min-width:20px;text-align:right}

/* Code Base Upgrades */
.cb-up{cursor:default}
.cb-locked{opacity:.35;cursor:default}
.cb-locked:hover{border-color:#21262d}
.cb-locked .up-name{color:#8b949e}

/* Pause Toggle */
.pause-toggle{background:none;border:1px solid #30363d;color:#8b949e;border-radius:4px;padding:1px 5px;font-size:.65rem;cursor:pointer;margin-left:4px;transition:color .15s,border-color .15s}
.pause-toggle:hover{border-color:#58a6ff;color:#58a6ff}
.pause-toggle.paused{color:#f0883e;border-color:#f0883e}

/* Recruiter Progress Bar */
.recruiter-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:#21262d;border-radius:0 0 6px 6px;overflow:hidden}
.recruiter-fill{height:100%;background:#58a6ff;width:0;transition:none;border-radius:0 0 0 6px}

/* Skill Tree Modal */
.st-btn,.ach-btn{display:block;width:100%;padding:10px;border-radius:6px;font-size:.85rem;font-weight:700;text-align:center;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:background .15s,transform .1s}
.st-btn:hover,.ach-btn:hover{transform:scale(1.02)}
.st-btn{margin:12px 0 4px;background:linear-gradient(135deg,#f0883e22,#58a6ff22);border:1px solid #f0883e;color:#f0883e}
.st-btn:hover{background:linear-gradient(135deg,#f0883e33,#58a6ff33)}
.st-ov{position:fixed;inset:0;z-index:160;display:flex;align-items:center;justify-content:center;background:rgba(13,17,23,.85)}
.st-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#8b949e;font-size:1.3rem;cursor:pointer;z-index:3}
.st-close:hover{color:#e6edf3}
.st-graph{position:relative;box-sizing:border-box;width:1550px;height:1070px;background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:16px;box-shadow:0 0 40px rgba(0,0,0,.6);max-width:96vw;max-height:94vh;overflow:auto}
.st-svg{position:absolute;inset:16px;width:calc(100% - 32px);height:calc(100% - 32px);pointer-events:none}
.st-hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#161b22;border:2px solid #f0883e;border-radius:10px;padding:12px 20px;text-align:center;z-index:2}
.st-hub-val{font-size:1.4rem;font-weight:800;color:#f0883e}
.st-hub-lbl{font-size:.65rem;color:#8b949e;text-transform:uppercase;letter-spacing:.06em}
.st-node{position:absolute;width:110px;background:#161b22;border:2px solid #30363d;border-radius:8px;padding:5px 7px;cursor:pointer;text-align:center;z-index:2;transition:border-color .15s,opacity .15s,box-shadow .15s}
.st-node:hover{box-shadow:0 0 10px var(--bc,#30363d)33}
.st-node-name{font-size:.7rem;font-weight:700;color:#e6edf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-node-desc{font-size:.55rem;color:#8b949e;margin:2px 0}
.st-node-cost{font-size:.65rem;font-weight:600;color:#f0883e}
.st-node-lvl{font-size:.55rem;color:#8b949e}
.st-node.owned{border-color:var(--bc);box-shadow:0 0 6px var(--bc)44}
.st-node.maxed{border-color:var(--bc);opacity:.7}
.st-node.maxed .st-node-cost{color:#8b949e}
.st-node.locked{opacity:.3;cursor:not-allowed}
.st-node.no{opacity:.55;cursor:default}
.st-branch-lbl{position:absolute;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;z-index:2}

/* Achievement Modal */
.ach-btn{margin:6px 0 4px;background:linear-gradient(135deg,#da363322,#f0883e22);border:1px solid #da3633;color:#da3633}
.ach-btn:hover{background:linear-gradient(135deg,#da363333,#f0883e33)}
/* Activity Log */
.log-hdr{font-size:.75rem;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 4px;padding-bottom:4px;border-bottom:1px solid #21262d}
.log-panel{flex:1;min-height:0;overflow-y:auto;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:6px;margin-top:4px}
.log-btns{padding-top:6px;flex-shrink:0}
.log-entry{font-size:.65rem;color:#8b949e;padding:2px 0;border-bottom:1px solid #161b22;line-height:1.4}
.log-year{color:#58a6ff;font-weight:700;margin-right:4px}
.ach-panel{width:400px;max-height:70vh;overflow-y:auto;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}
.ach-title{font-size:1.1rem;font-weight:800;color:#e6edf3;margin-bottom:12px;text-align:center}
.ach-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;border:1px solid #21262d;margin-bottom:6px;opacity:.35}
.ach-row.unlocked{opacity:1;border-color:#2ea04366;background:#2ea04311}
.ach-name{font-size:.8rem;font-weight:700;color:#e6edf3;min-width:100px}
.ach-desc{font-size:.7rem;color:#8b949e;flex:1}
.ach-reward{font-size:.7rem;font-weight:600;color:#f0883e;white-space:nowrap}

/* Event Banner */
.ev-banner{position:fixed;top:101px;left:50%;transform:translateX(-50%);z-index:90;display:none;align-items:center;gap:12px;padding:6px 18px;background:#238636;border-radius:0 0 8px 8px;color:#fff;font-size:.8rem;font-weight:600;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.ev-banner.ev-choice{flex-direction:column;padding:10px 18px;background:#1c3a5f}
.ev-banner.debuff{background:#da3633}
.ev-name{font-weight:800}
.ev-desc{opacity:.9}
.ev-time{font-weight:800;min-width:24px;text-align:right}
.ev-choices{display:flex;gap:8px;margin-top:6px}
.ev-opt{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.7rem;flex:1;text-align:center;transition:border-color .2s,background .2s}
.ev-opt:hover{border-color:#58a6ff;background:#161b22}
.ev-opt b{color:#58a6ff}

/* NYT Headline Banner */
.nyt-banner{position:fixed;top:101px;left:50%;transform:translateX(-50%);z-index:85;padding:10px 28px;background:#f5f0e8;color:#1a1a1a;border-bottom:2px solid #333;font-family:'Georgia',serif;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.35);border-radius:0 0 8px 8px;animation:nytIn .6s ease;max-width:600px}
.nyt-label{font-size:.55rem;letter-spacing:4px;text-transform:uppercase;opacity:.5;margin-bottom:2px;font-weight:400}
.nyt-year{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;opacity:.6}
.nyt-headline{font-size:.95rem;font-weight:700;font-style:italic;margin-top:4px;line-height:1.3}
@keyframes nytIn{from{opacity:0;transform:translateX(-50%) translateY(-100%)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Settings */
.settings-panel{width:320px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px}
.settings-title{font-size:1rem;font-weight:800;color:#e6edf3;margin-bottom:16px;text-align:center}
.settings-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.settings-label{font-size:.75rem;color:#8b949e;min-width:65px;text-transform:uppercase;letter-spacing:.04em}
.settings-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:#21262d;border-radius:3px;outline:none}
.settings-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#58a6ff;cursor:pointer;border:2px solid #161b22}
.settings-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#58a6ff;cursor:pointer;border:2px solid #161b22}
.settings-val{font-size:.7rem;color:#58a6ff;min-width:32px;text-align:right;font-variant-numeric:tabular-nums}

/* Stats Panel */
.stats-panel{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;width:480px;max-height:75vh;overflow-y:auto}
.stats-title{font-size:1.1rem;font-weight:800;color:#e6edf3;margin-bottom:12px;text-align:center}
.stats-summary{display:flex;gap:16px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.stats-stat{text-align:center;padding:6px 12px;background:#0d1117;border-radius:6px;border:1px solid #21262d}
.stats-stat-val{font-size:1rem;font-weight:700;color:#58a6ff}
.stats-stat-lbl{font-size:.6rem;color:#8b949e;text-transform:uppercase;letter-spacing:1px}
.stats-table{width:100%;border-collapse:collapse;font-size:.75rem}
.stats-table th{text-align:left;color:#8b949e;padding:6px 8px;border-bottom:1px solid #30363d;font-weight:600;text-transform:uppercase;font-size:.65rem;letter-spacing:1px}
.stats-table td{padding:5px 8px;border-bottom:1px solid #21262d;color:#e6edf3}
.stats-table tr:hover td{background:#21262d44}
.stats-section{margin-top:14px;padding-top:10px;border-top:1px solid #21262d}
.stats-sec-title{font-size:.7rem;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

/* Bottom Bar */
.prog-bar-top{padding:4px 20px;background:#161b22;border-bottom:1px solid #30363d}
.bot{padding:8px 20px;background:#161b22;border-top:1px solid #30363d}
.prog-wrap{position:relative;height:28px;background:#0d1117;border-radius:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#238636,#2ea043);transform-origin:left;transition:transform .25s}
.prog-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600}
.ship{display:none;width:100%;padding:9px;margin-top:8px;background:linear-gradient(135deg,#f0883e,#d29922);color:#0d1117;border:none;border-radius:6px;font-size:.95rem;font-weight:700;cursor:pointer;transition:transform .1s}
.ship:hover{transform:scale(1.02)}
.ship.show{display:block}
.ship-confirm{display:none;width:100%;margin-top:6px;padding:8px;background:#1c2128;border:1px solid #da3633;border-radius:6px;text-align:center}
.ship-confirm.show{display:block}
.ship-confirm p{color:#f85149;font-size:.8rem;font-weight:600;margin:0 0 8px}
.ship-confirm-btns{display:flex;gap:8px;justify-content:center}
.ship-confirm-btns button{padding:6px 16px;border:none;border-radius:5px;font-weight:700;font-size:.8rem;cursor:pointer}
.ship-yes{background:#da3633;color:#fff}
.ship-yes:hover{background:#f85149}
.ship-no{background:#30363d;color:#c9d1d9}
.ship-no:hover{background:#484f58}

/* Update Banner */
.update-banner{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;background:#1f6feb;color:#fff;font-size:.85rem;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,.5);cursor:pointer;animation:ubIn .4s ease}
.update-banner:hover{background:#388bfd}
.update-banner .ub-close{margin-left:8px;background:none;border:none;color:rgba(255,255,255,.7);font-size:1.1rem;cursor:pointer;padding:0 4px}
.update-banner .ub-close:hover{color:#fff}
@keyframes ubIn{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* Toasts */
.toasts{position:fixed;top:105px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
.toast{padding:6px 14px;background:#238636;color:#fff;border-radius:6px;font-size:.8rem;font-weight:600;animation:tIn .25s ease,tOut .3s ease 1.8s forwards}
@keyframes tIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@keyframes tOut{to{opacity:0;transform:translateY(-8px)}}

/* Ship Overlay */
.ship-ov{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,17,23,.9);animation:shipIn 13.3s ease forwards}
@keyframes shipIn{0%{opacity:0}4%{opacity:1}100%{opacity:1}}
.ship-year{font-size:3rem;font-weight:800;color:#58a6ff;margin-bottom:20px;text-shadow:0 0 30px #58a6ff44;animation:yearPop 2.7s ease 1.3s both}
@keyframes yearPop{from{opacity:0;transform:scale(1.4)}to{opacity:1;transform:scale(1)}}
.ship-dismiss{margin-top:20px;padding:10px 28px;background:linear-gradient(135deg,#238636,#2ea043);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;opacity:0;animation:dismissIn 1s ease 4s forwards;transition:transform .1s,box-shadow .15s;letter-spacing:.03em}
.ship-dismiss:hover{transform:scale(1.05);box-shadow:0 0 16px #2ea04366}
@keyframes dismissIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ship-scene{position:relative;width:260px;height:200px;display:flex;align-items:flex-end;justify-content:center}

/* --- 5.25" Floppy --- */
.media-floppy525{width:140px;height:140px;background:#1a1a1a;border:2px solid #333;border-radius:3px;position:relative;animation:mediaIn .6s ease both}
.media-floppy525::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:60px;height:12px;background:#555;border-radius:2px}
.media-floppy525::after{content:'';position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:50px;height:50px;background:#333;border-radius:50%;border:2px solid #444}
.floppy525-label{position:absolute;top:30px;left:14px;right:14px;height:40px;background:#c0a060;border-radius:2px}
.floppy525-notch{position:absolute;bottom:6px;left:6px;width:10px;height:16px;background:#0d1117;border-radius:2px}
/* --- 3.5" Floppy --- */
.media-floppy35{width:110px;height:114px;background:#2244aa;border:2px solid #3355cc;border-radius:4px;position:relative;animation:mediaIn .6s ease both}
.media-floppy35::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:44px;height:14px;background:#999;border-radius:0 0 2px 2px}
.media-floppy35::after{content:'';position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:52px;height:36px;background:#1a1a3a;border-radius:2px}
.floppy35-label{position:absolute;top:22px;left:10px;right:10px;height:32px;background:#e8e0d0;border-radius:2px}
.floppy35-arrow{position:absolute;bottom:4px;right:8px;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #1a1a5a}
/* --- CD-ROM --- */
.media-cd{width:130px;height:130px;background:radial-gradient(circle,#0000 14px,#e8e8f0 14px,#e0e0e8 16px,linear-gradient(135deg,#d0d0e8,#c8c8e0,#e0d8f0,#d0d8e8) 16px);border-radius:50%;position:relative;animation:mediaIn .6s ease both;box-shadow:0 0 20px #58a6ff22}
.media-cd::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#d8d0e800,#d8d0f844,#e0d8f000,#d0d0e844,#d8d0e800);pointer-events:none}
.media-cd::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:#0d1117;border-radius:50%;border:2px solid #444}
.cd-ring{position:absolute;inset:18px;border:1px solid #c0c0d044;border-radius:50%}
/* --- DVD --- */
.media-dvd{width:130px;height:130px;background:radial-gradient(circle,#0000 14px,#f0e8d8 14px,#e8e0d0 16px,#ddd8c8 16px);border-radius:50%;position:relative;animation:mediaIn .6s ease both;box-shadow:0 0 20px #f0883e22}
.media-dvd::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 45deg,#e8dcc800,#f0e0c844,#e0d8c000,#f0dcc844,#e8dcc800);pointer-events:none}
.media-dvd::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:#0d1117;border-radius:50%;border:2px solid #444}
.dvd-ring{position:absolute;inset:18px;border:1px solid #d0c8b044;border-radius:50%}
/* --- Digital Download --- */
.media-dl{width:120px;height:120px;position:relative;animation:mediaIn .6s ease both}
.dl-cloud{width:100px;height:50px;background:#30363d;border-radius:25px;position:absolute;top:10px;left:10px}
.dl-cloud::before{content:'';position:absolute;top:-18px;left:18px;width:36px;height:36px;background:#30363d;border-radius:50%}
.dl-cloud::after{content:'';position:absolute;top:-26px;left:42px;width:30px;height:30px;background:#30363d;border-radius:50%}
.dl-arrow{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:4px;height:40px;background:#58a6ff;animation:dlPulse 1.2s ease infinite}
.dl-arrow::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:12px solid #58a6ff}
.dl-bar-wrap{position:absolute;bottom:0;left:10px;right:10px;height:6px;background:#0d1117;border-radius:3px;overflow:hidden}
.dl-bar{height:100%;background:#238636;border-radius:3px;animation:dlFill 3.5s ease forwards}
@keyframes mediaIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes dlPulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes dlFill{0%{width:0}100%{width:100%}}
.ship-scene *[class*="media"]{animation-duration:1.6s}
.dl-bar{animation-duration:9.3s}
/* Ship Software Name */
.ship-name{font-size:1.6rem;font-weight:800;color:#e6edf3;margin-bottom:4px;animation:yearPop 4s ease 1.6s both}
.ship-cat{font-size:.9rem;color:#8b949e;margin-bottom:16px;animation:yearPop 4s ease 2.1s both}
.ship-media-label{font-size:.75rem;color:#58a6ff;margin-top:12px;animation:yearPop 4s ease 3.2s both}

/* Cart/Disc label */
.cart-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.35rem;color:#ddd;font-weight:700;text-align:center;line-height:1.2;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 0 2px #000}
.disc-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.3rem;color:#333;font-weight:700;text-align:center;max-width:28px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Name Prompt */

/* Scrollbar */
.right::-webkit-scrollbar{width:6px}
.right::-webkit-scrollbar-track{background:transparent}
.right::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}

/* Slot Select */
.slot-screen{position:fixed;inset:0;background:#0d1117;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.slot-screen.hidden{display:none}
.slot-title{font-size:1.6rem;font-weight:700;color:#e6edf3}
.slot-sub{font-size:.85rem;color:#8b949e;margin-top:-12px}
.slot-row{display:flex;gap:16px}
.slot-btn{width:160px;padding:20px 16px;background:#161b22;border:2px solid #30363d;border-radius:10px;cursor:pointer;transition:border-color .2s,transform .1s;text-align:center}
.slot-btn:hover{border-color:#58a6ff;transform:translateY(-2px)}
.slot-new{margin-top:8px;padding:4px 10px;background:none;border:1px solid #da3633;border-radius:4px;color:#da3633;font-size:.65rem;font-weight:600;cursor:pointer;transition:background .15s,color .15s}
.slot-new:hover{background:#da3633;color:#fff}
.slot-confirm{display:none;margin-top:6px;font-size:.65rem;color:#da3633;text-align:center}
.slot-confirm.show{display:block}
.slot-confirm-btns{display:flex;gap:6px;justify-content:center;margin-top:4px}
.slot-yes,.slot-no{padding:3px 10px;border-radius:4px;font-size:.65rem;font-weight:600;cursor:pointer;border:1px solid #30363d}
.slot-yes{background:#da3633;color:#fff;border-color:#da3633}
.slot-yes:hover{background:#f85149}
.slot-no{background:none;color:#8b949e}
.slot-no:hover{border-color:#58a6ff;color:#58a6ff}
.slot-num{font-size:2rem;font-weight:700;color:#58a6ff}
.slot-info{font-size:.7rem;color:#8b949e;margin-top:6px;line-height:1.4}
.game.hidden{display:none}

/* ===== MOBILE RESPONSIVE ===== */
.mob-tabs{display:none}

@media(max-width:768px){
  /* Tab bar */
  .mob-tabs{display:flex;position:fixed;bottom:0;left:0;right:0;height:52px;background:#161b22;border-top:1px solid #30363d;z-index:100}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:none;border:none;color:#8b949e;font-size:.55rem;cursor:pointer;padding:4px 0;gap:2px;-webkit-tap-highlight-color:transparent}
  .mob-tab.active{color:#58a6ff}
  .mob-tab-icon{font-size:1.3rem}

  /* Game container */
  .game{height:100dvh;height:100vh;padding-bottom:52px}

  /* Main layout: show one panel at a time */
  .main{flex-direction:column;overflow:hidden}

  /* Default: hide all, desk tab shows center */
  .game .left-panel,.game .right{display:none;overflow-y:auto}
  .game .left{display:flex;flex:1;overflow-y:auto}

  .game[data-tab="desk"] .left{display:flex;flex:1}
  .game[data-tab="desk"] .left-panel,.game[data-tab="desk"] .right{display:none}

  .game[data-tab="coders"] .left,.game[data-tab="coders"] .left-panel{display:none}
  .game[data-tab="coders"] .right{display:flex;flex-direction:column;flex:1;width:100%;min-width:0;overflow-y:auto}
  .game[data-tab="coders"] .right-log{display:none}
  .game[data-tab="coders"] .right-coders{display:block;flex:1;overflow-y:auto;border:none}

  .game[data-tab="upgrades"] .left,.game[data-tab="upgrades"] .right{display:none}
  .game[data-tab="upgrades"] .left-panel{display:block;flex:1;width:100%;min-width:0;overflow-y:auto;border:none}

  .game[data-tab="log"] .left,.game[data-tab="log"] .left-panel{display:none}
  .game[data-tab="log"] .right{display:flex;flex-direction:column;flex:1;width:100%;min-width:0;overflow-y:auto}
  .game[data-tab="log"] .right-log{display:block;flex:1;overflow-y:auto;border:none}
  .game[data-tab="log"] .right-coders{display:none}

  /* Top bar: wrap on small screens */
  .top-bar{flex-wrap:wrap;padding:6px 10px;gap:2px 10px;justify-content:center}
  .stat-val{font-size:1.1rem}
  .stat-lbl{font-size:.6rem}
  #dCat{font-size:.85rem}
  .prog-bar-top{padding:3px 10px}

  /* Desk scene: scale down */
  .desk-scene{transform:scale(1.3);margin-bottom:60px}
  .left{justify-content:flex-start;padding-top:12px}
  .click-info{font-size:1.1rem}
  .click-power{font-size:1.2rem}
  .fame-mult{font-size:1.1rem}

  /* Panel overrides */
  .left-panel{width:100%;min-width:0;border-right:none;padding:10px}
  .right{width:100%;min-width:0;border-left:none}
  .right-log{border-right:none}
  .right-coders{border:none}

  /* Touch targets: upgrade rows */
  .up{padding:12px 10px;gap:10px}
  .up-name{font-size:.85rem}
  .up-desc{font-size:.7rem}
  .up-cost{font-size:.85rem}

  /* Touch targets: buttons */
  .eu-toggle,.fu-toggle{width:36px;height:36px;font-size:.9rem}
  .pause-toggle{padding:6px 10px;font-size:.8rem}
  .qty-btn{padding:10px 0;font-size:.8rem}
  .qty-bar{gap:6px;margin-bottom:10px}

  /* Touch targets: training sub-rows */
  .eu-row,.ru-row,.fu-row{padding:10px 8px;font-size:.8rem;gap:8px}

  /* Modals: fame tree fullscreen */
  .st-graph{width:100vw;height:100vh;max-width:100vw;max-height:100vh;border-radius:0;padding:12px;-webkit-overflow-scrolling:touch}
  .st-close{position:fixed;top:8px;right:12px;font-size:2rem;padding:10px;z-index:170}
  .st-node{width:100px;padding:6px}
  .st-node .st-name{font-size:.6rem}

  /* Modals: panels responsive */
  .ach-panel{width:calc(100vw - 24px);max-width:400px;max-height:85vh}
  .ach-row{padding:10px;gap:8px}
  .stats-panel{width:calc(100vw - 24px);max-width:480px;max-height:85vh}
  .stats-table{font-size:.65rem}
  .stats-table th,.stats-table td{padding:4px 3px}
  .settings-panel{width:calc(100vw - 24px);max-width:320px}

  /* Banners & toasts: above tab bar */
  .ev-banner{top:auto;bottom:60px;max-width:calc(100vw - 20px);font-size:.75rem}
  .ev-opt{padding:10px 12px;font-size:.75rem}
  .nyt-banner{top:auto;bottom:60px;max-width:calc(100vw - 20px);font-size:.7rem}
  .toasts{top:auto;bottom:120px}
  .toast{font-size:.75rem}

  /* Ship button */
  .bot{padding:6px 10px}

  /* Slot screen: stack vertically */
  .slot-row{flex-direction:column;gap:10px;align-items:center}
  .slot-btn{width:280px;max-width:90vw}

  /* Log panel adjustments */
  .log-panel{max-height:none}
  .log-hdr{font-size:.85rem}
  .log-entry{font-size:.7rem;padding:4px 0}
}

@media(max-width:480px){
  .desk-scene{transform:scale(1.1);margin-bottom:40px}
  .stat-val{font-size:1rem}
  #dCat{font-size:.75rem}
  .top-bar{padding:4px 8px;gap:1px 8px}
  .click-info{font-size:.9rem}
  .click-power{font-size:1rem}
  .fame-mult{font-size:.9rem}
}
</style>
</head>
<body>
<div class="slot-screen" id="slots">
  <div class="slot-title">Software Dev Clicker</div>
  <div class="slot-sub">Select a career save</div>
  <div class="slot-row" id="slotRow"></div>
  <div class="lang-bar" id="langBar">
    <button class="lang-btn" data-lang="en">&#x1F1EC;&#x1F1E7;</button>
    <button class="lang-btn" data-lang="es">&#x1F1EA;&#x1F1F8;</button>
    <button class="lang-btn" data-lang="pt">&#x1F1E7;&#x1F1F7;</button>
    <button class="lang-btn" data-lang="fr">&#x1F1EB;&#x1F1F7;</button>
    <button class="lang-btn" data-lang="de">&#x1F1E9;&#x1F1EA;</button>
    <button class="lang-btn" data-lang="gz">&#x1F480;</button>
  </div>
</div>
<div class="game hidden" id="G">
  <div class="prog-bar-top">
    <div class="prog-wrap">
      <div class="prog-fill" id="pFill" style="transform:scaleX(0)"></div>
      <div class="prog-txt" id="pTxt"></div>
    </div>
  </div>
  <div class="top-bar">
    <div class="stat"><div class="stat-val" id="dYear">1979</div><div class="stat-lbl">Year</div></div>
    <div class="stat"><div class="stat-lbl">Currently Developing</div><div class="stat-val" id="dCat">-</div></div>
    <div class="stat"><div class="stat-val" id="dLoc">0</div><div class="stat-lbl">Lines of Code</div></div>
    <div class="stat"><div class="stat-val" id="dLps">0/s</div><div class="stat-lbl">LoC / sec</div></div>
    <div class="stat fame"><div class="stat-val" id="dFame">0</div><div class="stat-lbl">Fame</div></div>
  </div>
  <div class="main">
    <div class="left-panel" id="ups2"></div>
    <div class="left">
      <div class="desk-scene" id="deskScene">
        <div class="monitor" id="mon">
          <div class="computer-housing">
            <div class="screen" id="scr"></div>
          </div>
          <div class="stand"></div>
          <div class="base"></div>
          <div class="computer-extra"></div>
        </div>
        <div class="desk" id="deskEl"></div>
        <div class="pet-dog" id="petDog">&#x1F415;</div>

        <div class="thermo-label" id="streakVal">1.0x</div>

          <div class="thermo-fill" id="streakFill"></div>
          <div class="thermo-tick" style="bottom:0%"></div>
          <div class="thermo-tick" style="bottom:25%"></div>
          <div class="thermo-tick" style="bottom:50%"></div>
          <div class="thermo-tick" style="bottom:75%"></div>
          <div class="thermo-tick" style="bottom:100%"></div>

        <button class="ship-no" id="shipNo">Keep Working</button>
      </div>

  </div>
  <div class="toasts" id="toasts"></div>
</div>
<script>
// ========== TRANSLATION ==========
let lang = localStorage.getItem('gdc_lang') || 'en';
const T={en:{

function loadSlot(raw) {
  try {
    const d = JSON.parse(raw);
    if (!d || d.v !== 1) return;
    const df = defaults();
    for (const k in df) if (!(k in d)) d[k] = df[k];
    while (d.g.length < GEN.length) d.g.push(0);
    while (d.c.length < CLK.length) d.c.push(0);
    if (!d.eu) d.eu = GEN.map(() => EMP_UPS.map(() => 0));
    while (d.eu.length < GEN.length) d.eu.push(EMP_UPS.map(() => 0));
    d.eu.forEach(a => { while (a.length < EMP_UPS.length) a.push(0); });
    const dfF = defaults().f;
    for (const k in dfF) if (!(k in d.f)) d.f[k] = dfF[k];
    if (!d.ss) d.ss = SUPPORT.map(() => 0);
    while (d.ss.length < SUPPORT.length) d.ss.push(0);
    // v3.8 migration: swap Energy Drinks (was idx 0) and Catered Lunches (was idx 1)
    if (!d._perkSwap) { const tmp = d.c[0]; d.c[0] = d.c[1]; d.c[1] = tmp; d._perkSwap = 1; }
    if (!d.ru) d.ru = RECRUITER_UPS.map(() => 0);
    if (!d.sp) d.sp = SUPPORT.map(() => 0);
    while (d.sp.length < SUPPORT.length) d.sp.push(0);
    if (d.cb === undefined) d.cb = 0;
    if (!d.catsSeen || (d.catsSeen.length === 0 && d.games && d.games.length > 0)) {
      const seen = new Set();
      d.games.forEach(g => { if (g.cat) seen.add(g.cat); });
      d.catsSeen = [...seen];
      d.cb = Math.min(d.catsSeen.length, CODE_BASE.length);
    }
    if (!d.ach) d.ach = [];
    if (!d.games) d.games = [];
    if (d.tFame === undefined) d.tFame = d.fame || 0;
    // Migrate perk order: old [E,L,D,DC,GR,NAP,PET,GYM,PTO,R] → new [E,L,D,DC,PET,GYM,GR,PTO,NAP,R]
    if (!d.perkMigrated && d.c.length >= 10) {
      const old = [...d.c];
      d.c[4] = old[6]; d.c[5] = old[7]; d.c[6] = old[4]; d.c[7] = old[8]; d.c[8] = old[5];
      d.perkMigrated = true;
    }
    // v3.8 migrations
    if (!d.fu) d.fu = FACILITY_UPS.map(() => 0);
    if (!d.milestones) d.milestones = [];
    // v3.9.4 migration: swap support staff indices 2↔3 (Office Manager before Facility Director)
    if (!d._supSwap) {
      if (d.ss && d.ss.length >= 4) { const tmp = d.ss[2]; d.ss[2] = d.ss[3]; d.ss[3] = tmp; }
      if (d.sp && d.sp.length >= 4) { const tmp = d.sp[2]; d.sp[2] = d.sp[3]; d.sp[3] = tmp; }
      d._supSwap = 1;
    }
    // v4 migration: trainer arrays + 5th support staff slot
    if (!d.trainerLvl) d.trainerLvl = GEN.map(() => 0);
    if (!d.trainerSSLvl) d.trainerSSLvl = SUPPORT.map(() => 0);
    if (!d.trainerSSCount) d.trainerSSCount = SUPPORT.map(() => 0);
    while (d.ss.length < SUPPORT.length) d.ss.push(0);
    while (d.sp.length < SUPPORT.length) d.sp.push(0);
    while (d.trainerLvl.length < GEN.length) d.trainerLvl.push(0);
    while (d.trainerSSLvl.length < SUPPORT.length) d.trainerSSLvl.push(0);
    while (d.trainerSSCount.length < SUPPORT.length) d.trainerSSCount.push(0);
    // Apply state first, then calculate offline progress using cached multipliers
    S = d;
    markDirty();
    recalcIfDirty();
    if (d._lastSave) {
      const elapsed = Math.min((Date.now() - d._lastSave) / 1000, OFFLINE_CAP);
      if (elapsed > 10) {
        const passiveRate = lps();
        const earned = Math.floor(passiveRate * elapsed);

          S.tLoc += earned;
          pendingOfflineMsg = t('welcomeBack') + ' ' + fmt(earned) + ' ' + t('whileAway') + ' (' + Math.floor(elapsed / 60) + 'm)';
        }

    }
  } catch {}
}

// ========== HELPERS ==========
function fmt(n) {
  if (n < 0) return '0';
  if (n < 1000) return n < 10 && n % 1 ? n.toFixed(1) : Math.floor(n).toLocaleString();
  const s = ['','K','M','B','T','Qa','Qi','Sx','Sp','Oc'];
  const i = Math.min(Math.floor(Math.log10(Math.max(n,1)) / 3), s.length - 1);
  const v = n / 10 ** (i * 3);
  return (v < 10 ? v.toFixed(2) : v < 100 ? v.toFixed(1) : v.toFixed(0)) + s[i];
}

// ========== MULTIPLIER CACHE ==========
let _dirty = true;
const _C = { prodMul:1, genSpeedMul:1, genSynergyMul:1, fameMul:1, clickPow:1, lps:0, shipAt:0, hireCostMul:1, euMul:[] };
function markDirty() { _dirty = true; }
function recalcIfDirty() {
  if (!_dirty) return;
  _dirty = false;
  _C.fameMul = 1 + 0.12 * S.tFame;
  let pm = energyPerkMul() * daycareMul() * gymMul() * retreatMul() * _C.fameMul * (1 + cbBonus('prod'));
  // Open Source: +5% production per shipped game per level
  if (S.f.genOpenSource) pm *= (1 + 0.05 * S.f.genOpenSource * S.shipped);
  _C.prodMul = pm;
  _C.hireCostMul = (0.9 ** S.f.genCheap) * (0.85 ** S.f.genAcquihire) * deskDiscount() * ptoDiscount() * (1 - cbBonus('cheap'));
  _C.genSpeedMul = (1 + 0.25 * S.f.genSpeed) * (1 + 0.15 * S.f.genThreads) * (1 + cbBonus('speed'));
  // Count coder types owned (used by synergy + code review)
  let _types = 0; for (let i = 0; i < GEN.length; i++) if (S.g[i] > 0) _types++;
  let synMul = S.f.genSynergy ? (1 + 0.03 * _types) : 1;
  if (S.f.genReview) synMul *= (1 + 0.05 * _types);
  _C.genSynergyMul = synMul;
  // Pair Programming: ×1.5 coder production
  const pairMul = S.f.genPair ? 1.5 : 1;
  for (let i = 0; i < GEN.length; i++) {
    let m = 1;
    for (let u = 0; u < EMP_UPS.length; u++) { const tier = S.eu[i][u]; if (tier > 0) m *= EMP_UPS[u].tiers[tier - 1].mult; }
    // Trainer: +1% per trainer level for this coder type
    const tLvl = (S.trainerLvl && S.trainerLvl[i]) || 0;
    _C.euMul[i] = m * pairMul * (1 + 0.01 * tLvl);
  }
  const evMul = (activeEvent && !activeEvent.pending) ? activeEvent.mul : 1;
  const evClk = (activeEvent && !activeEvent.pending) ? activeEvent.clickMul : 1;
  let lpsVal = 0;
  for (let i = 0; i < GEN.length; i++) lpsVal += GEN[i].rate * S.g[i] * _C.euMul[i];
  _C.lps = lpsVal * _C.genSpeedMul * _C.genSynergyMul * _C.prodMul * evMul;
  _C.clickPow = (1 + lunchBonus()) * gameRoomMul() * (1 + S.f.clickDouble) * _C.prodMul * evClk * (1 + cbBonus('click'));
  _C.shipAt = Math.floor(1e6 * 10 ** S.shipped * (0.9 ** S.f.franchise));
}

// --- SFX ---
function playSfx(type) {
  if (!audioCtx || S.sfxVol === 0) return;
  const t0 = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(sfxGain);
  function osc(freq, wave, start, end, vol) {
    const o = audioCtx.createOscillator();
    const og = audioCtx.createGain();
    o.type = wave;
    o.frequency.value = freq;
    og.gain.setValueAtTime(vol || 0.3, t0 + start);
    og.gain.exponentialRampToValueAtTime(0.001, t0 + end);
    o.connect(og);
    og.connect(g);
    o.start(t0 + start);
    o.stop(t0 + end + 0.01);
  }
  switch (type) {
    case 'click':
      osc(880, 'square', 0, 0.06, 0.15);
      break;
    case 'buy':
      osc(440, 'triangle', 0, 0.12, 0.25);
      osc(660, 'triangle', 0.08, 0.2, 0.25);
      break;
    case 'ship':
      osc(523, 'sawtooth', 0, 0.25, 0.2);
      osc(659, 'sawtooth', 0.15, 0.4, 0.2);
      osc(784, 'sawtooth', 0.3, 0.6, 0.25);
      osc(1047, 'sawtooth', 0.45, 0.9, 0.15);
      break;
    case 'event':
      osc(600, 'square', 0, 0.1, 0.2);
      osc(800, 'square', 0.12, 0.22, 0.2);
      osc(600, 'square', 0.24, 0.34, 0.2);
      osc(800, 'square', 0.36, 0.46, 0.2);
      break;
    case 'achieve':
      [N.C5, N.D5, N.E5, N.G5, N.A5].forEach((f, i) => {
        const dur = i === 4 ? 0.4 : 0.1;
        osc(f, 'triangle', i * 0.09, i * 0.09 + dur, 0.25);
      });
      break;
    case 'milestone':
      [N.C4, N.E4, N.G4, N.C5].forEach((f, i) => {
        osc(f, 'triangle', i * 0.12, i * 0.12 + 0.3, 0.2);
      });
      break;
  }
  g.gain.setValueAtTime(1, t0);
}

function schedNotes(dest, wave, notes, t0, vol) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = wave;
  o.connect(g);
  g.connect(dest);
  let t = t0;
  notes.forEach(n => {
    if (n.f > 0) {
      o.frequency.setValueAtTime(n.f, t);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + n.d * 0.95);
    } else {
      g.gain.setValueAtTime(0.001, t);
    }
    t += n.d;
  });
  o.start(t0);
  o.stop(t + 0.05);
  return { nodes: [o, g], duration: t - t0 };
}

  const melody = [
    {f:N.A4,d:.3},{f:N.G4,d:.3},{f:N.E4,d:.3},{f:N.D4,d:.3},
    {f:N.C4,d:.6},{f:0,d:.3},
    {f:N.D4,d:.3},{f:N.E4,d:.3},{f:N.G4,d:.3},{f:N.A4,d:.3},
    {f:N.G4,d:.6},{f:0,d:.3},
    {f:N.E4,d:.3},{f:N.G4,d:.6},{f:N.A4,d:.3},
    {f:N.C5,d:.6},{f:N.A4,d:.3},{f:N.G4,d:.6},{f:0,d:.3},
  ];
  // FM: modulator oscillates carrier's frequency
  const carrier = ctx.createOscillator();
  const modulator = ctx.createOscillator();
  const modGain = ctx.createGain();
  const cGain = ctx.createGain();
  carrier.type = 'sine';
  modulator.type = 'sine';
  modulator.frequency.value = 280;
  modGain.gain.value = 150;
  modulator.connect(modGain);
  modGain.connect(carrier.frequency);
  carrier.connect(cGain);
  cGain.connect(dest);
  let t = t0;
  melody.forEach(n => {
    if (n.f > 0) {
      carrier.frequency.setValueAtTime(n.f, t);
      modulator.frequency.setValueAtTime(n.f * 0.5, t);
      cGain.gain.setValueAtTime(0.08, t);
      cGain.gain.exponentialRampToValueAtTime(0.001, t + n.d * 0.9);
    } else {
      cGain.gain.setValueAtTime(0.001, t);
    }
    t += n.d;
  });
  carrier.start(t0); carrier.stop(t + 0.05);
  modulator.start(t0); modulator.stop(t + 0.05);
  all.push(carrier, modulator, modGain, cGain);
  const dur = t - t0;
  // Bass line
  const bass = [
    {f:N.A3,d:.6},{f:0,d:.6},{f:N.A3,d:.3},{f:N.E3,d:.3},
    {f:N.D3,d:.6},{f:0,d:.6},{f:N.D3,d:.3},{f:N.G3,d:.3},
    {f:N.C3,d:.6},{f:0,d:.3},{f:N.A3,d:.3},
    {f:N.G3,d:.6},{f:N.C3,d:.6},{f:0,d:.3},
  ];
  const rb = schedNotes(dest, 'triangle', bass, t0, 0.08);
  all.push(...rb.nodes);
  return { nodes: all, duration: Math.max(dur, rb.duration) };
}

// Era 5: 1999-2003 - CD-ROM ambient pads
function buildMusic_cd(ctx, dest, t0) {
  const all = [];
  const chords = [
    { notes: [N.C3, N.E3, N.G3], dur: 3 },
    { notes: [N.A3, N.C4, N.E4], dur: 3 },
    { notes: [N.F3, N.A3, N.C4], dur: 3 },
    { notes: [N.G3, N.B3, N.D4], dur: 3 },
  ];
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 800;
  filter.Q.value = 1;
  filter.connect(dest);
  all.push(filter);
  let t = t0;
  chords.forEach(ch => {
    ch.notes.forEach(freq => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.value = freq;
      o.connect(g);
      g.connect(filter);
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.04, t + 0.8);
      g.gain.linearRampToValueAtTime(0.03, t + ch.dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.001, t + ch.dur);
      o.start(t);
      o.stop(t + ch.dur + 0.05);
      all.push(o, g);
    });
    t += ch.dur;
  });
  return { nodes: all, duration: t - t0 };
}

// Era 6: 2004-2008 - Modern electronic
function buildMusic_modern(ctx, dest, t0) {
  const all = [];
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  filter.Q.value = 5;
  filter.connect(dest);
  all.push(filter);
  // Filter sweep
  filter.frequency.setValueAtTime(400, t0);
  filter.frequency.linearRampToValueAtTime(2000, t0 + 4);
  filter.frequency.linearRampToValueAtTime(400, t0 + 8);
  // Synth lead
  const lead = [
    {f:N.A4,d:.25},{f:0,d:.25},{f:N.E4,d:.25},{f:N.G4,d:.25},
    {f:N.A4,d:.5},{f:N.C5,d:.25},{f:N.B4,d:.25},
    {f:N.G4,d:.25},{f:0,d:.25},{f:N.E4,d:.25},{f:N.D4,d:.25},
    {f:N.C4,d:.5},{f:0,d:.5},
    {f:N.E4,d:.25},{f:N.G4,d:.25},{f:N.A4,d:.5},
    {f:N.G4,d:.25},{f:N.E4,d:.25},{f:N.D4,d:.5},
    {f:N.C4,d:.5},{f:N.E4,d:.5},{f:0,d:.5},
  ];
  const rl = schedNotes(filter, 'sawtooth', lead, t0, 0.08);
  all.push(...rl.nodes);
  // Kick pattern (sine pitch drop)
  for (let i = 0; i < 16; i++) {
    const kt = t0 + i * 0.5;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, kt);
    o.frequency.exponentialRampToValueAtTime(40, kt + 0.15);
    g.gain.setValueAtTime(0.15, kt);
    g.gain.exponentialRampToValueAtTime(0.001, kt + 0.2);
    o.connect(g); g.connect(dest);
    o.start(kt); o.stop(kt + 0.25);
    all.push(o, g);
  }
  return { nodes: all, duration: 8 };
}

// Era 7: 2009-2013 - Indie chiptune revival
function buildMusic_indie(ctx, dest, t0) {
  const all = [];
  // Chiptune melody
  const melody = [
    {f:N.C5,d:.2},{f:N.E5,d:.2},{f:N.G5,d:.2},{f:N.E5,d:.2},
    {f:N.C5,d:.2},{f:N.D5,d:.4},{f:0,d:.2},
    {f:N.A4,d:.2},{f:N.C5,d:.2},{f:N.E5,d:.4},
    {f:N.D5,d:.2},{f:N.C5,d:.2},{f:N.A4,d:.4},{f:0,d:.2},
    {f:N.G4,d:.2},{f:N.A4,d:.2},{f:N.C5,d:.4},
    {f:N.E5,d:.2},{f:N.D5,d:.2},{f:N.C5,d:.4},{f:0,d:.4},
  ];
  const r1 = schedNotes(dest, 'square', melody, t0, 0.08);
  all.push(...r1.nodes);
  // Filtered pad behind
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 600;
  filter.connect(dest);
  all.push(filter);
  const padNotes = [
    {notes:[N.C3,N.E3,N.G3],dur:2.5},{notes:[N.A3,N.C4,N.E4],dur:2.5},
    {notes:[N.F3,N.A3,N.C4],dur:2.5},{notes:[N.G3,N.B3,N.D4],dur:2.5},
  ];
  let t = t0;
  padNotes.forEach(ch => {
    ch.notes.forEach(freq => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.value = freq;
      o.connect(g); g.connect(filter);
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.03, t + 0.5);
      g.gain.exponentialRampToValueAtTime(0.001, t + ch.dur);
      o.start(t); o.stop(t + ch.dur + 0.05);
      all.push(o, g);
    });
    t += ch.dur;
  });
  return { nodes: all, duration: Math.max(r1.duration, t - t0) };
}

// Era 8: 2014+ - Lo-fi beats
function buildMusic_lofi(ctx, dest, t0) {
  const all = [];
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 1200;
  filter.Q.value = 0.7;
  filter.connect(dest);
  all.push(filter);
  // Soft melody
  const melody = [
    {f:N.E4,d:.5},{f:N.G4,d:.5},{f:N.A4,d:.75},{f:0,d:.25},
    {f:N.B4,d:.5},{f:N.A4,d:.5},{f:N.G4,d:.75},{f:0,d:.5},
    {f:N.E4,d:.5},{f:N.D4,d:.5},{f:N.C4,d:.75},{f:0,d:.25},
    {f:N.D4,d:.5},{f:N.E4,d:.5},{f:N.G4,d:.75},{f:0,d:.5},
    {f:N.A4,d:.75},{f:N.G4,d:.5},{f:N.E4,d:.75},{f:0,d:.5},
    {f:N.D4,d:.5},{f:N.C4,d:.75},{f:0,d:.75},
  ];
  const rm = schedNotes(filter, 'triangle', melody, t0, 0.08);
  all.push(...rm.nodes);
  // Sine bass
  const bass = [
    {f:N.C3,d:1},{f:0,d:.5},{f:N.A3,d:1},{f:0,d:.5},
    {f:N.F3,d:1},{f:0,d:.5},{f:N.G3,d:1},{f:0,d:.5},
    {f:N.C3,d:1},{f:0,d:.5},{f:N.G3,d:1},{f:0,d:.5},
  ];
  const rb = schedNotes(filter, 'sine', bass, t0, 0.1);
  all.push(...rb.nodes);
  // Vinyl crackle noise
  const bufLen = ctx.sampleRate * 2;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.015;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  noise.loop = true;
  const nf = ctx.createBiquadFilter();
  nf.type = 'highpass'; nf.frequency.value = 1000;
  noise.connect(nf); nf.connect(dest);
  const dur = Math.max(rm.duration, rb.duration);
  noise.start(t0); noise.stop(t0 + dur + 0.05);
  all.push(noise, nf);
  return { nodes: all, duration: dur };
}

// --- MUSIC CONTROLLER ---
function cleanupMusic() {
  musicNodes.forEach(n => { try { n.stop?.(); } catch {} try { n.disconnect(); } catch {} });
  musicNodes = [];
}
function stopMusic() {
  if (musicLoopId) { clearTimeout(musicLoopId); musicLoopId = null; }
  cleanupMusic();
  curMusicEra = null;
}
function startMusicLoop(era) {
  if (!audioCtx || S.musicVol === 0) return;
  const r = era.build(audioCtx, musicGain, audioCtx.currentTime);
  musicNodes = r.nodes;
  musicLoopId = setTimeout(() => {
    cleanupMusic();
    startMusicLoop(era);
  }, (r.duration - 0.1) * 1000);
}
function updateMusic() {
  if (!audioCtx || S.musicVol === 0) { if (curMusicEra) stopMusic(); return; }
  const year = currentYear();
  const era = MUSIC_ERAS.find(e => year <= e.max) || MUSIC_ERAS[MUSIC_ERAS.length - 1];
  if (era.id === curMusicEra) return;
  // Crossfade
  if (curMusicEra) {
    const vol = S.musicVol;
    musicGain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    setTimeout(() => {
      stopMusic();
      curMusicEra = era.id;
      musicGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
      musicGain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.5);
      startMusicLoop(era);
    }, 500);
  } else {
    curMusicEra = era.id;
    startMusicLoop(era);
  }
}

// ========== EVENT SYSTEM ==========
let evBanner = null;
function startRandomEvent() {
  const eIdx = Math.floor(Math.random() * EVENTS.length);
  const e = EVENTS[eIdx];
  activeEvent = { name: ta('ev_'+eIdx+'_name', e.name), choices: e.choices, pending: true, eIdx };
  log('\u26A1 ' + activeEvent.name + ' ' + t('choose'));
  showChoiceBanner(e, eIdx);
  playSfx('event');
}
function tickEvents(dt) {
  if (isShipping) return;
  if (activeEvent) {
    if (activeEvent.pending) return; // waiting for player choice
    activeEvent.remaining -= dt;
    updateEventBanner();
    if (activeEvent.remaining <= 0) { activeEvent = null; markDirty(); hideEventBanner(); }
  } else {
    eventCooldown -= dt;
    if (eventCooldown <= 0) { startRandomEvent(); eventCooldown = 135 + Math.random() * 135; }
  }
}
function ensureEvBanner() {
  if (!evBanner) {
    evBanner = document.createElement('div');
    evBanner.id = 'evBanner';
    evBanner.className = 'ev-banner';
    evBanner.addEventListener('click', ev => {
      const btn = ev.target.closest('.ev-opt');
      if (!btn || !activeEvent || !activeEvent.pending) return;
      const ci = +btn.dataset.choice;
      const c = activeEvent.choices[ci];
      const ei = activeEvent.eIdx;
      const cLabel = ta('ev_'+ei+'_'+ci+'_label', c.label);
      const cDesc = ta('ev_'+ei+'_'+ci+'_desc', c.desc);
      const evName = activeEvent.name;
      activeEvent = { name: evName + ': ' + cLabel, desc: cDesc, remaining: c.dur, mul: c.mul, clickMul: c.clickMul };
      markDirty();
      showEventBanner(); updateEventBanner();
      toast(activeEvent.name + ' \u2014 ' + cDesc);
      log('\u26A1 ' + evName + ' \u2192 ' + cLabel);
    });
    document.body.appendChild(evBanner);
  }
}
function showEventBanner() {
  ensureEvBanner();
  evBanner.classList.remove('ev-choice');
  evBanner.style.display = 'flex';
}
function showChoiceBanner(e, eIdx) {
  ensureEvBanner();
  evBanner.classList.add('ev-choice');
  evBanner.style.display = 'flex';
  let html = '<span class="ev-name">' + ta('ev_'+eIdx+'_name', e.name) + '</span><div class="ev-choices">';
  e.choices.forEach((c, ci) => {
    html += '<button class="ev-opt" data-choice="' + ci + '"><b>' + ta('ev_'+eIdx+'_'+ci+'_label', c.label) + '</b><br>' + ta('ev_'+eIdx+'_'+ci+'_desc', c.desc) + '</button>';
  });
  html += '</div>';
  evBanner.innerHTML = html;
}
function updateEventBanner() {
  if (!evBanner || !activeEvent || activeEvent.pending) return;
  const debuff = activeEvent.mul < 1 || activeEvent.clickMul < 1;
  evBanner.classList.toggle('debuff', debuff);
  evBanner.innerHTML = '<span class="ev-name">' + activeEvent.name + '</span><span class="ev-desc">' + activeEvent.desc + '</span><span class="ev-time">' + Math.ceil(activeEvent.remaining) + 's</span>';
}
function hideEventBanner() {
  if (evBanner) evBanner.style.display = 'none';
}

// ========== AUTOCLICKER DETECTION ==========
const _ac = {
  times: [],        // last N click timestamps
  positions: [],    // last N click {x, y}
  untrusted: 0,     // count of isTrusted===false clicks
  strikes: 0,       // accumulated suspicion
  infested: false,   // currently penalized?
  infestEnd: 0,     // when penalty ends (performance.now)
  cooldown: 0,      // grace period after infestation ends
  WINDOW: 40,       // clicks to analyze
  INTERVAL_CV_THRESH: 0.03,  // coefficient of variation below this = bot
  POS_STD_THRESH: 1.5,       // pixel std dev below this = bot
  UNTRUSTED_THRESH: 5,       // untrusted clicks in window = bot
  STRIKE_THRESH: 5,          // strikes before infestation triggers
  INFEST_DUR: 30000,         // 30s penalty
};

function acRecord(e) {
  const now = performance.now();
  _ac.times.push(now);
  _ac.positions.push({ x: e.clientX, y: e.clientY });
  if (_ac.times.length > _ac.WINDOW) _ac.times.shift();
  if (_ac.positions.length > _ac.WINDOW) _ac.positions.shift();
  if (!e.isTrusted) _ac.untrusted++; else _ac.untrusted = Math.max(0, _ac.untrusted - 1);
}

function acCheck() {
  if (_ac.infested || _ac.times.length < _ac.WINDOW) return false;
  const now = performance.now();
  if (_ac.cooldown > now) return false;

  let dominated = false;

  // 1. isTrusted check
  if (_ac.untrusted >= _ac.UNTRUSTED_THRESH) dominated = true;

  // 2. Click interval variance (coefficient of variation)
  if (!dominated) {
    const intervals = [];
    for (let i = 1; i < _ac.times.length; i++) intervals.push(_ac.times[i] - _ac.times[i - 1]);
    const mean = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    if (mean > 0) {
      const variance = intervals.reduce((a, v) => a + (v - mean) ** 2, 0) / intervals.length;
      const cv = Math.sqrt(variance) / mean;
      if (cv < _ac.INTERVAL_CV_THRESH) dominated = true;
    }
  }

  // 3. Click position clustering
  if (!dominated) {
    const xs = _ac.positions.map(p => p.x);
    const ys = _ac.positions.map(p => p.y);
    const mx = xs.reduce((a, b) => a + b, 0) / xs.length;
    const my = ys.reduce((a, b) => a + b, 0) / ys.length;
    const stdX = Math.sqrt(xs.reduce((a, v) => a + (v - mx) ** 2, 0) / xs.length);
    const stdY = Math.sqrt(ys.reduce((a, v) => a + (v - my) ** 2, 0) / ys.length);
    if (stdX < _ac.POS_STD_THRESH && stdY < _ac.POS_STD_THRESH) dominated = true;
  }

  if (dominated) {
    _ac.strikes++;
    if (_ac.strikes >= _ac.STRIKE_THRESH) {
      acTriggerInfestation();
      return true;
    }
  } else {
    _ac.strikes = Math.max(0, _ac.strikes - 1);
  }
  return false;
}

function acTriggerInfestation() {
  _ac.infested = true;
  _ac.infestEnd = performance.now() + _ac.INFEST_DUR;
  _ac.strikes = 0;
  _ac.times.length = 0;
  _ac.positions.length = 0;
  _ac.untrusted = 0;
  log('\uD83D\uDC1B Bug Infestation! Production halted \u2014 bugs are eating your code!');
  toast('\uD83D\uDC1B Bug Infestation! -90% production for 30s');
  playSfx('event');
}

function acTick() {
  if (!_ac.infested) return;
  if (performance.now() >= _ac.infestEnd) {
    _ac.infested = false;
    _ac.cooldown = performance.now() + 15000; // 15s grace after recovery
    log('\uD83D\uDEE0\uFE0F Bugs exterminated! Production restored.');
    toast('\uD83D\uDEE0\uFE0F Bugs exterminated!');
  }
}

function acPenalty() { return _ac.infested ? 0.1 : 1; }

function doClick(e) {
  acRecord(e);
  if (acCheck()) return; // infestation just triggered, swallow click
  ensureAudio();
  playSfx('click');
  let pw = clickPow() * streakMul * acPenalty();
  // Precision Click: +1% of LoC/s per click per level
  if (S.f.clickPrecision) pw += lps() * 0.01 * S.f.clickPrecision * acPenalty();
  // Combo Breaker: +0.1% LoC/s per click per streak per level
  if (S.f.streakCombo) pw += lps() * 0.001 * S.f.streakCombo * Math.floor(streakMul) * acPenalty();
  // Lucky Click: 8% chance per level of 15× click
  if (S.f.clickLucky && Math.random() < 0.08 * S.f.clickLucky) { pw *= 15; float(e.clientX + 10, e.clientY - 40, '\u2728 LUCKY!'); }
  S.loc += pw;
  S.tLoc += pw;
  const nowClick = performance.now();
  ctPush(nowClick);
  lastClickTime = nowClick;
  // Immediate streak response on click
  ctTrim(nowClick - STREAK_WINDOW);
  if (S.f.streakUnlock && _ctN / STREAK_DIV >= 3) {
    const sMax = 2 + S.f.streakPower + 2 * S.f.streakTurbo;
    streakMul = Math.min(sMax, streakMul + 0.08);
    updateThermo();
  }
  scr.classList.add('pulse');
  setTimeout(() => scr.classList.remove('pulse'), 150);
  float(e.clientX - 15, e.clientY - 20, '+' + fmt(pw));
  // Add a line of code to the screen
  codeVisible.push(CODE_LINES[codeIdx % CODE_LINES.length]);
  codeIdx++;
  if (codeVisible.length > 10) codeVisible.shift();
  scr.textContent = codeVisible.join('\n');
}

let buyQty = 1; // 1, 5, 25, or Infinity (max)

function bulkCost(baseFn, owned, n) {
  let total = 0;
  for (let k = 0; k < n; k++) total += baseFn(owned + k);
  return total;
}
function gBulkCost(i, n) { return bulkCost(k => gCostAt(i, k), S.g[i], n); }
function cBulkCost(i, n) { return bulkCost(k => Math.floor(CLK[i].base * CLK[i].gr ** k), S.c[i], n); }
function maxAfford(costFn, owned) {
  let n = 0, total = 0;
  while (true) {
    const c = costFn(owned + n);
    if (total + c > S.loc) break;
    total += c; n++;
  }
  return n;
}
function gMax(i) { return maxAfford(k => gCostAt(i, k), S.g[i]); }
function cMax(i) { return maxAfford(k => Math.floor(CLK[i].base * CLK[i].gr ** k), S.c[i]); }
function effectiveQty(maxFn, i) { return buyQty === Infinity ? maxFn(i) : Math.min(buyQty, maxFn(i)); }

function buyGen(i) {
  let n = effectiveQty(gMax, i);
  if (buyQty !== Infinity && buyQty > 1 && n < buyQty) return;
  if (n < 1) return;
  const c = gBulkCost(i, n);
  if (S.loc < c) return;
  S.loc -= c;
  const wasZero = S.g[i] === 0;
  S.g[i] += n;
  markDirty();
  const gName = ta('gen_'+i+'_name', GEN[i].name);
  if (wasZero) toast(t('hired') + ': ' + gName);
  else if (n > 1) toast(t('hired') + ' ' + n + '× ' + gName);
  log(t('hired') + (n > 1 ? ' ' + n + '× ' : ': ') + gName);
  playSfx('buy');
}

function buyClk(i) {
  if (S.c[i] >= 1) return;
  const c = cCost(i);
  if (S.loc < c) return;
  S.loc -= c;
  S.c[i] = 1;
  markDirty();
  const cName = ta('clk_'+i+'_name', CLK[i].name);
  toast(t('unlocked') + ': ' + cName);
  log(t('unlocked') + ': ' + cName);
  playSfx('buy');
}

function ssCost(i) { return Math.floor(SUPPORT[i].base * SUPPORT[i].gr ** S.ss[i] * shipInflation()); }
function buySS(i) {
  if (S.ss[i] >= 1) return;
  const c = ssCost(i);
  if (S.loc < c) return;
  S.loc -= c;
  S.ss[i] = 1;
  markDirty();

  toast(t('hired') + ': ' + sName);

}

function ruCost(ui) { return Math.floor(RECRUITER_UPS[ui].baseCost * RECRUITER_UPS[ui].gr ** S.ru[ui] * shipInflation()); }
